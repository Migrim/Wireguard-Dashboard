<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WG-Quick · WireGuard Dashboard</title>
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='icons/favicon.ico') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   WG-Quick — warm cream/terracotta, refined. Dense layout.
============================================================ */
:root {
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;

  /* Light */
  --bg: #F5EEE2;
  --bg-2: #EFE7D8;
  --card: #FBF6EC;
  --card-raised: #FFFCF4;
  --ink: #2A2520;
  --ink-2: #4A4238;
  --muted: #8A7F72;
  --muted-2: #A89C8C;
  --border: #E6DCC8;
  --border-strong: #D6C9B0;
  --accent: oklch(62% 0.14 45);
  --accent-soft: oklch(88% 0.06 45);
  --accent-2: oklch(55% 0.09 150);
  --success: oklch(58% 0.12 150);
  --warn: oklch(68% 0.14 70);
  --danger: oklch(56% 0.17 25);
  --success-soft: oklch(90% 0.06 150);
  --warn-soft: oklch(92% 0.07 70);
  --danger-soft: oklch(92% 0.05 25);
  --shadow-sm: 0 1px 2px rgba(80, 60, 30, 0.04), 0 1px 0 rgba(255,255,255,0.5) inset;
  --shadow: 0 1px 3px rgba(80, 60, 30, 0.06), 0 4px 14px rgba(80, 60, 30, 0.04), 0 1px 0 rgba(255,255,255,0.7) inset;
  --shadow-lg: 0 2px 4px rgba(80, 60, 30, 0.08), 0 16px 40px rgba(80, 60, 30, 0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
}

[data-theme="dark"] {
  --bg: #1A1613;
  --bg-2: #221C17;
  --card: #211B16;
  --card-raised: #2A231C;
  --ink: #EFE6D8;
  --ink-2: #C8BEAE;
  --muted: #8A7F72;
  --muted-2: #6B6256;
  --border: #332A22;
  --border-strong: #433628;
  --accent: oklch(70% 0.14 45);
  --accent-soft: oklch(32% 0.08 45);
  --accent-2: oklch(70% 0.10 150);
  --success: oklch(72% 0.13 150);
  --success-soft: oklch(30% 0.07 150);
  --warn-soft: oklch(32% 0.08 70);
  --danger-soft: oklch(30% 0.07 25);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 4px 14px rgba(0,0,0,0.3);
  --shadow-lg: 0 2px 4px rgba(0,0,0,0.4), 0 16px 40px rgba(0,0,0,0.5);
}

.accent-forest { --accent: oklch(55% 0.11 150); --accent-soft: oklch(88% 0.05 150); }
[data-theme="dark"].accent-forest { --accent: oklch(70% 0.12 150); --accent-soft: oklch(30% 0.08 150); }
.accent-ink { --accent: oklch(40% 0.04 250); --accent-soft: oklch(85% 0.02 250); }
[data-theme="dark"].accent-ink { --accent: oklch(75% 0.04 250); --accent-soft: oklch(28% 0.03 250); }
.accent-plum { --accent: oklch(48% 0.12 330); --accent-soft: oklch(88% 0.05 330); }
[data-theme="dark"].accent-plum { --accent: oklch(70% 0.13 330); --accent-soft: oklch(30% 0.08 330); }
.accent-amber { --accent: oklch(70% 0.15 75); --accent-soft: oklch(92% 0.06 75); }
[data-theme="dark"].accent-amber { --accent: oklch(75% 0.15 75); --accent-soft: oklch(30% 0.09 75); }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  background-image:
    radial-gradient(1200px 600px at 15% -10%, color-mix(in oklab, var(--accent) 8%, transparent), transparent 60%),
    radial-gradient(900px 500px at 100% 10%, color-mix(in oklab, var(--accent-2) 6%, transparent), transparent 60%);
}

.app {
  max-width: 1440px;
  margin: 0 auto;
  padding: 22px 28px 60px;
}

.density-compact { font-size: 12px; }
.density-compact .kpi-tile { padding: 12px 14px; }
.density-compact .peers-row { padding: 8px 16px; }
.density-spacious { font-size: 14px; }
.density-spacious .kpi-tile { padding: 22px 22px; }
.density-spacious .peers-row { padding: 16px 20px; }

/* TOPBAR */
.topbar {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 24px;
  margin-bottom: 20px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 36px; height: 36px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: grid; place-items: center;
  color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.brand-name {
  font-family: var(--serif);
  font-size: 22px;
  letter-spacing: -0.01em;
  line-height: 1;
  color: var(--ink);
}
.live-pulse {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
  margin: 0 3px 0 1px;
  box-shadow: 0 0 0 0 color-mix(in oklab, var(--success) 60%, transparent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--success) 45%, transparent); }
  70% { box-shadow: 0 0 0 4px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}

.topbar-center { display: flex; justify-content: center; }
.search {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 0 12px;
  border-radius: 10px;
  width: 100%;
  max-width: 520px;
  height: 38px;
  color: var(--muted);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.15s;
}
.search:focus-within { border-color: var(--accent); }
.search input {
  flex: 1; border: none; background: none; outline: none;
  font-family: var(--sans);
  font-size: 13px; color: var(--ink);
}
.search input::placeholder { color: var(--muted); }
.kbd {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 6px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 12px; height: 34px;
  font-family: var(--sans); font-size: 12.5px; font-weight: 500;
  color: var(--ink);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.12s;
  box-shadow: var(--shadow-sm);
}
.btn:hover { background: var(--card-raised); border-color: var(--border-strong); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost { background: transparent; }
.btn-primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
[data-theme="dark"] .btn-primary { background: var(--ink); color: var(--bg); }
.btn-primary:hover { background: var(--ink-2); }
.btn-danger { color: var(--danger); border-color: color-mix(in oklab, var(--danger) 30%, var(--border)); }
.btn-danger:hover { background: var(--danger-soft); }

.icon-btn {
  width: 34px; height: 34px;
  display: grid; place-items: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  color: var(--ink-2);
  transition: all 0.12s;
  box-shadow: var(--shadow-sm);
}
.icon-btn:hover { background: var(--card-raised); color: var(--ink); }
.icon-btn-sm {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.12s;
}
.icon-btn-sm:hover { background: var(--card); color: var(--ink); border-color: var(--border-strong); }

/* KPI ROW */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 14px;
}
.kpi-tile {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex; flex-direction: column;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  min-height: 138px;
}
.kpi-head {
  display: flex; align-items: center; justify-content: space-between;
}
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 500;
}
.kpi-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 99px;
}
.kpi-badge.badge-ok { color: var(--success); border-color: color-mix(in oklab, var(--success) 25%, var(--border)); background: var(--success-soft); }
.pulse-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--success);
  animation: pulse 1.6s infinite;
}
.kpi-body {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 12px;
  flex: 1;
}
.kpi-body-radial { justify-content: center; align-items: center; }
.kpi-number {
  display: flex; align-items: baseline; gap: 4px;
  line-height: 1;
}
.kpi-big {
  font-family: var(--serif);
  font-size: 44px;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-weight: 400;
  font-variant-numeric: tabular-nums;
}
.kpi-unit {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.02em;
}
.kpi-mini { flex: 1; max-width: 160px; opacity: 0.9; }
.kpi-foot {
  display: flex; justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  padding-top: 8px;
  border-top: 1px dashed var(--border);
}
.kpi-clickable { cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
.kpi-clickable:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.kpi-clickable:hover .kpi-link { color: var(--accent); }
.kpi-link { color: var(--muted); transition: color 0.15s; }

.svc-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
  background: var(--bg-2);
}
.svc-stat { padding: 6px 10px; border-right: 1px solid var(--border); }
.svc-stat:last-child { border-right: none; }
.svc-stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }
.svc-stat-val { font-size: 12px; color: var(--ink); margin-top: 1px; font-weight: 500; }

.svc-buttons {
  display: flex; gap: 6px;
}
.svc-btn {
  flex: 1;
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  height: 30px;
  font-family: var(--sans);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--ink);
  background: var(--card-raised);
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.12s;
}
.svc-btn:hover:not(.disabled):not(:disabled) { background: var(--bg-2); border-color: var(--border-strong); }
.svc-btn.disabled, .svc-btn:disabled { color: var(--muted); opacity: 0.5; cursor: not-allowed; }
.svc-btn svg { color: var(--muted); }
.svc-btn:not(.disabled):not(:disabled):hover svg { color: var(--accent); }

/* Budget drawer */
.budget-hero { display: flex; flex-direction: column; gap: 18px; padding: 18px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; }
.budget-hero-nums { display: flex; align-items: center; gap: 20px; }
.budget-used { flex: 1; }
.budget-big { font-family: var(--serif); font-size: 32px; letter-spacing: -0.02em; color: var(--ink); line-height: 1; font-variant-numeric: tabular-nums; }
.budget-unit { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-left: 4px; letter-spacing: 0.02em; }
.budget-lbl { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }
.budget-divider { width: 1px; align-self: stretch; background: var(--border); }
.budget-bar-wrap { display: flex; flex-direction: column; gap: 6px; }
.budget-bar { position: relative; height: 8px; background: var(--card); border-radius: 4px; overflow: visible; border: 1px solid var(--border); }
.budget-bar-fill { height: 100%; border-radius: 4px 0 0 4px; transition: width 0.6s ease, background 0.3s; }
.budget-marker { position: absolute; top: -3px; bottom: -3px; width: 1px; background: var(--muted); opacity: 0.4; }
.budget-bar-labels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); }
.peer-usage-list { display: flex; flex-direction: column; gap: 8px; }
.peer-usage-row { display: grid; grid-template-columns: 100px 1fr 70px; gap: 12px; align-items: center; font-size: 12px; }
.peer-usage-name { color: var(--ink); font-weight: 500; }
.peer-usage-bar { height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
.peer-usage-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.peer-usage-val { text-align: right; color: var(--muted); }
.settings-list { display: flex; flex-direction: column; }
.setting-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 12px 0; border-top: 1px solid var(--border); }
.setting-row:first-child { border-top: none; padding-top: 4px; }
.setting-title { font-size: 13px; color: var(--ink); font-weight: 500; }
.setting-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.stepper { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 7px; padding: 2px; }
.stepper button { width: 26px; height: 24px; border: none; background: transparent; cursor: pointer; color: var(--muted); border-radius: 4px; font-size: 14px; }
.stepper button:hover { background: var(--card); color: var(--ink); }
.stepper span { min-width: 52px; text-align: center; font-size: 12px; color: var(--ink); }
.select-input { font-family: var(--mono); font-size: 12px; padding: 6px 10px; background: var(--bg-2); border: 1px solid var(--border); color: var(--ink); border-radius: 7px; cursor: pointer; }
.toggle { width: 38px; height: 22px; border-radius: 99px; background: var(--border); border: none; position: relative; cursor: pointer; transition: background 0.2s; padding: 0; }
.toggle.on { background: var(--accent); }
.toggle-knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: var(--card); border-radius: 50%; transition: transform 0.2s; box-shadow: var(--shadow-sm); }
.toggle.on .toggle-knob { transform: translateX(16px); }

/* Port check drawer */
.pc-hero { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.pc-hero-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.pc-progress { height: 4px; background: var(--card); border-radius: 2px; overflow: hidden; position: relative; }
.pc-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; box-shadow: 0 0 8px color-mix(in oklab, var(--accent) 40%, transparent); }
.pc-progress-glow { position: absolute; top: -3px; bottom: -3px; width: 16px; transform: translateX(-50%); background: radial-gradient(circle, color-mix(in oklab, var(--accent) 80%, transparent), transparent 70%); transition: left 0.4s ease; animation: glowPulse 1s ease-in-out infinite; }
@keyframes glowPulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
.pc-summary { display: flex; gap: 14px; margin-top: 12px; font-family: var(--mono); font-size: 10.5px; }
.pc-stat { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); }
.pc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.pc-ok .pc-dot { background: var(--success); }
.pc-warn .pc-dot { background: var(--warn); }
.pc-fail .pc-dot { background: var(--danger); }
.pc-steps { position: relative; padding-left: 0; }
.pc-line { position: absolute; left: 17px; top: 6px; bottom: 6px; width: 2px; background: var(--border); border-radius: 1px; }
.pc-line-fill { position: absolute; left: 17px; top: 6px; width: 2px; background: var(--accent); border-radius: 1px; transition: height 0.5s ease; box-shadow: 0 0 6px color-mix(in oklab, var(--accent) 50%, transparent); }
.pc-step { position: relative; display: grid; grid-template-columns: 36px 1fr; gap: 12px; padding: 10px 0; align-items: start; }
.pc-marker { width: 32px; height: 32px; border-radius: 50%; background: var(--card); border: 2px solid var(--border); display: grid; place-items: center; color: var(--muted); transition: all 0.25s; z-index: 1; flex-shrink: 0; box-sizing: border-box; margin-left: 2px; }
.pc-marker svg { display: block; }
.pc-step.active .pc-marker { border-color: var(--accent); color: var(--accent); background: var(--card-raised); box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 15%, transparent); }
.pc-step.result-ok .pc-marker { border-color: var(--success); color: var(--success); background: var(--success-soft); }
.pc-step.result-warn .pc-marker { border-color: var(--warn); color: var(--warn); background: var(--warn-soft); }
.pc-step.result-fail .pc-marker { border-color: var(--danger); color: var(--danger); background: var(--danger-soft); }
.pc-idle-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); opacity: 0.5; }
.pc-spinner { width: 12px; height: 12px; border: 2px solid color-mix(in oklab, var(--accent) 25%, transparent); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.pc-step-body { padding-top: 4px; min-width: 0; }
.pc-tip { margin-top: 4px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; }
.pc-tip-icon { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: color-mix(in oklab, var(--warn) 18%, var(--card)); color: var(--warn); display: grid; place-items: center; }
.pc-tip.pc-tip-ok .pc-tip-icon { background: var(--success-soft); color: var(--success); }
.pc-tip-body { flex: 1; min-width: 0; }
.pc-tip-title { font-size: 12.5px; font-weight: 600; color: var(--ink); letter-spacing: 0.01em; }
.pc-tip-desc { font-size: 12px; color: var(--ink-2); margin-top: 4px; line-height: 1.5; }
.pc-tip-cmd { margin-top: 10px; font-family: var(--mono); font-size: 11px; background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; color: var(--ink); white-space: pre; overflow-x: auto; position: relative; }
.pc-tip-cmd .cmd-prompt { color: var(--muted); user-select: none; }
.pc-tip-cmd .cmd-copy { position: absolute; top: 5px; right: 5px; background: var(--bg-2); border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 9.5px; padding: 2px 6px; border-radius: 5px; cursor: pointer; letter-spacing: 0.08em; }
.pc-tip-cmd .cmd-copy:hover { color: var(--ink); border-color: var(--border-strong); }
.pc-step-title { font-size: 13px; color: var(--ink); font-weight: 500; }
.pc-step.active .pc-step-title { color: var(--accent); }
.pc-step:not(.done):not(.active) .pc-step-title { color: var(--muted); }
.pc-step-detail { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.pc-typing { display: inline-block; animation: blink 0.9s steps(1) infinite; }
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
.pc-badge { display: inline-block; margin-top: 6px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 99px; }
.pc-badge-ok { background: var(--success-soft); color: var(--success); }
.pc-badge-warn { background: var(--warn-soft); color: var(--warn); }
.pc-badge-fail { background: var(--danger-soft); color: var(--danger); }
.mono { font-family: var(--mono); font-size: 11.5px; }
.arrow-up { color: var(--accent); }

/* MAIN GRID */
.main-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.hero-card, .logs-card, .peers-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.hero-card { padding: 20px 22px 16px; }
.hero-head {

    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
  }

  .data-row > div {
    min-width: 0;
  }

  .peer-name-cell {
    grid-area: identity;
    gap: 8px;
    min-width: 0;
  }
  .row-action {
    grid-area: action;
    align-self: start;
  }
  .peer-status-cell { grid-area: status; }
  .peer-address-cell { grid-area: address; }
  .peer-bytes-in-cell { grid-area: bytesin; }
  .peer-bytes-out-cell { grid-area: bytesout; }
  .peer-handshake-cell { grid-area: handshake; }

  .peer-address-cell,
  .peer-bytes-in-cell,
  .peer-bytes-out-cell,
  .peer-handshake-cell {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 10px;
  }

  .peer-address-cell::before,
  .peer-bytes-in-cell::before,
  .peer-bytes-out-cell::before,
  .peer-handshake-cell::before {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .peer-address-cell::before { content: "Address"; }
  .peer-bytes-in-cell::before { content: "Inbound"; }
  .peer-bytes-out-cell::before { content: "Outbound"; }
  .peer-handshake-cell::before { content: "Last Handshake"; }

  .peer-name {
    font-size: 13px;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .peer-address-cell,
  .peer-handshake-cell,
  .peer-bytes-in-cell,
  .peer-bytes-out-cell {
    font-size: 11px;
    line-height: 1.35;
  }

  .peer-address-cell {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .peer-bytes-in-cell,
  .peer-bytes-out-cell {
    text-align: left;
    justify-self: stretch !important;
  }

  .num,
  .peers-row > div.num {
    text-align: left;
    justify-self: stretch;
  }

  .peer-avatar-sm {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    font-size: 10px;
  }

  .status-pill {
    font-size: 10px;
    padding: 3px 8px 3px 6px;
  }

  .row-action .icon-btn-sm {
    width: 28px;
    height: 28px;
  }

  .drawer {
    width: 100vw;
    max-width: 100vw;
    border-left: none;
  }

  .drawer-head {
    position: sticky;
    top: 0;
    z-index: 3;
    background: var(--card);
    padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
  }

  .drawer-head-left {
    min-width: 0;
  }

  .drawer-title {
    font-size: 22px;
  }

  .drawer-body {
    padding: 16px 14px calc(28px + env(safe-area-inset-bottom));
    gap: 18px;
  }

  .stats-grid,
  .log-stats {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .kv {
    grid-template-columns: 1fr;
    row-gap: 4px;
  }

  .kv dt {
    margin-top: 8px;
  }

  .kv dd {
    margin-bottom: 6px;
  }

  .peer-usage-row {
    grid-template-columns: 1fr;
    gap: 6px;
  }

  .peer-usage-val {
    text-align: left;
  }

  .budget-hero {
    padding: 14px;
  }

  .budget-divider {
    width: auto;
    height: 1px;
  }

  .setting-row {
    flex-direction: column;
    align-items: stretch;
  }

  .stepper,
  .select-input {
    width: 100%;
  }

  .action-row {
    display: grid;
    grid-template-columns: 1fr;
  }

  .action-row .btn {
    width: 100%;
    justify-content: center;
  }

  .tweaks-panel {
    left: 12px;
    right: 12px;
    bottom: calc(12px + env(safe-area-inset-bottom));
    width: auto;
  }
}

@media (max-width: 480px) {
  .app {
    padding-left: 10px;
    padding-right: 6px;
  }

  .topbar-right {
    grid-template-columns: 1fr 40px;
  }

  .btn {
    padding: 0 10px;
    font-size: 12px;
  }

  .kpi-big {
    font-size: 30px;
  }

  .hero-unit,
  .kpi-unit {
    font-size: 11px;
  }

  .data-row {
    padding: 12px;
  }

  .peers-table {
    padding: 0 10px;
  }

  .peer-address-cell,
  .peer-bytes-in-cell,
  .peer-bytes-out-cell,
  .peer-handshake-cell {
    padding: 8px 9px;
  }

  .drawer-body {
    padding-left: 12px;
    padding-right: 12px;
  }

  .stats-grid,
  .log-stats,
  .st-metrics {
    grid-template-columns: 1fr;
  }

  .range-pills {
    grid-template-columns: 1fr;
  }

  .svc-buttons,
  .svc-stats {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}
</style>
</head>
<body data-base="{{ request.script_root or '' }}">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="{{ url_for('static', filename='js/data.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='js/charts.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='js/drawer.jsx') }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='js/app.jsx') }}"></script>

<script type="text/babel">
  const THEME_KEY = 'WG_THEME';
  const TWEAKS_DEFAULTS = {
    theme: localStorage.getItem(THEME_KEY) || 'light',
    density: 'compact',
    accent: 'terracotta',
    _tweaksOpen: false,
  };

  function Root() {
    const [tweaks, setTweaks] = React.useState({ ...TWEAKS_DEFAULTS });

    React.useEffect(() => {
      document.documentElement.setAttribute('data-theme', tweaks.theme || 'light');
      localStorage.setItem(THEME_KEY, tweaks.theme || 'light');
    }, [tweaks.theme]);

    return <App tweaks={tweaks} setTweaks={setTweaks} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
