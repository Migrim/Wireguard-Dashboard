.up-footnote { font-size: 10px; color: var(--muted); margin-top: 10px; }

/* ============================================================
   BudgetComposition — part-to-whole bar of today's traffic by peer.
   Used by the DATA TODAY tile and the budget drawer hero.

   The five fills are steps along the *selected* accent's own hue, so they track
   --accent through every accent theme. Each theme picks its own direction:
   light steps up in lightness, dark steps down, because a lighter step that
   reads on cream disappears on espresso. Chroma drops as lightness travels so
   the pale end stays a tint rather than a wash.
============================================================ */
:root {
  --bcomp-0: var(--accent);
  --bcomp-1: color-mix(in oklch, var(--accent) 72%, var(--accent-soft));
  --bcomp-2: color-mix(in oklch, var(--accent) 50%, var(--accent-soft));
  --bcomp-3: color-mix(in oklch, var(--accent) 30%, var(--accent-soft));
  --bcomp-4: color-mix(in oklch, var(--accent) 12%, var(--accent-soft));
}
@supports (color: oklch(from white l c h)) {
  :root {
    --bcomp-1: oklch(from var(--accent) calc(l + 0.09) calc(c * 0.88) h);
    --bcomp-2: oklch(from var(--accent) calc(l + 0.17) calc(c * 0.74) h);
    --bcomp-3: oklch(from var(--accent) calc(l + 0.25) calc(c * 0.58) h);
    --bcomp-4: oklch(from var(--accent) calc(l + 0.32) calc(c * 0.42) h);
  }
  [data-theme="dark"] {
    --bcomp-1: oklch(from var(--accent) calc(l - 0.10) calc(c * 0.92) h);
    --bcomp-2: oklch(from var(--accent) calc(l - 0.19) calc(c * 0.82) h);
    --bcomp-3: oklch(from var(--accent) calc(l - 0.27) calc(c * 0.70) h);
    --bcomp-4: oklch(from var(--accent) calc(l - 0.34) calc(c * 0.58) h);
  }
}

.bcomp-wrap { position: relative; display: flex; flex-direction: column; gap: 10px; width: 100%; }
.bcomp-bar { display: flex; gap: 2px; }
.bcomp-seg { min-width: 3px; border-radius: 2px; transition: width 0.6s ease, opacity 0.18s ease; }
.bcomp-seg:first-child { border-radius: 5px 2px 2px 5px; }
.bcomp-seg:last-child { border-radius: 2px 5px 5px 2px; }
.bcomp-seg:only-child { border-radius: 5px; }
/* Dim the rest on hover so the hovered share reads against the whole. */
.bcomp-bar.is-hovering .bcomp-seg { opacity: 0.35; }
.bcomp-bar.is-hovering .bcomp-seg.on { opacity: 1; }
.bcomp-legend { display: flex; flex-wrap: wrap; gap: 4px 14px; font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
.bcomp-legend-sm { gap: 3px 10px; font-size: 9.5px; }
.bcomp-item { display: flex; align-items: center; gap: 6px; transition: opacity 0.18s ease; }
.bcomp-legend.is-hovering .bcomp-item { opacity: 0.4; }
.bcomp-legend.is-hovering .bcomp-item.on { opacity: 1; }
.bcomp-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.bcomp-name { color: var(--ink-2); max-width: 12ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bcomp-empty { border-radius: 5px; border: 1px dashed var(--border-strong); }
.bcomp-tip { position: absolute; transform: translate(-50%, -100%); z-index: 6; }
.bcomp-tip-name { font-family: var(--mono); font-size: 10.5px; font-weight: 600; color: var(--ink); }
.bcomp-tip-val { font-family: var(--mono); font-size: 9.5px; color: var(--muted); }

/* Ping chart hover tooltip (PingBars — uptime + peer drawers) */
.pingbar-tip {
  position: absolute;
  transform: translate(-50%, -100%);
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  padding: 4px 9px;
  background: var(--card);
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  box-shadow: var(--shadow-lg);
  pointer-events: none;
  white-space: nowrap;
  z-index: 5;
  /* Glide between discrete sample slots rather than snapping to each one */
  transition: left 0.11s cubic-bezier(0.22, 1, 0.36, 1), top 0.11s cubic-bezier(0.22, 1, 0.36, 1);
}
@media (prefers-reduced-motion: reduce) { .pingbar-tip { transition: none; } }
.pingbar-tip-val { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--ink); }
.pingbar-tip-lbl { font-family: var(--mono); font-size: 9.5px; color: var(--muted); }
/* Multi-series variant (throughput charts): time header + one line-keyed row per series.
   Positioned by transform from the chart's RAF loop, so left/top stay pinned at 0
   and only the fade is left to CSS. */
.chart-tip { align-items: flex-start; gap: 3px; transition: opacity 0.12s ease; will-change: transform; }
.chart-tip-row { display: flex; align-items: center; gap: 6px; }
.chart-tip-key { display: inline-block; width: 10px; height: 2px; border-radius: 1px; flex-shrink: 0; }
.chart-tip-name { font-family: var(--mono); font-size: 9.5px; color: var(--muted); }

/* Port check drawer */
.pc-hero { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.pc-hero-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.pc-progress { height: 4px; background: var(--card); border-radius: 2px; overflow: hidden; position: relative; }
.pc-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; box-shadow: 0 0 8px color-mix(in oklab, var(--accent) 40%, transparent); }
.pc-progress-glow { position: absolute; top: -3px; bottom: -3px; width: 16px; transform: translateX(-50%); background: radial-gradient(circle, color-mix(in oklab, var(--accent) 80%, transparent), transparent 70%); transition: left 0.4s ease; animation: glowPulse 1s ease-in-out infinite; }
@keyframes glowPulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
.pc-summary { display: flex; gap: 14px; margin-top: 12px; font-family: var(--mono); font-size: 10.5px; }
.pc-stat { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); }
.pc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.pc-ok .pc-dot { background: var(--success); }
.pc-warn .pc-dot { background: var(--warn); }
.pc-fail .pc-dot { background: var(--danger); }
.pc-steps { position: relative; padding-left: 0; }
.pc-line { position: absolute; left: 17px; top: 6px; bottom: 6px; width: 2px; background: var(--border); border-radius: 1px; }
.pc-line-fill { position: absolute; left: 17px; top: 6px; width: 2px; background: var(--accent); border-radius: 1px; transition: height 0.5s ease; box-shadow: 0 0 6px color-mix(in oklab, var(--accent) 50%, transparent); }
.pc-step { position: relative; display: grid; grid-template-columns: 36px 1fr; gap: 12px; padding: 10px 0; align-items: start; }
.pc-marker { width: 32px; height: 32px; border-radius: 50%; background: var(--card); border: 2px solid var(--border); display: grid; place-items: center; color: var(--muted); transition: all 0.25s; z-index: 1; flex-shrink: 0; box-sizing: border-box; margin-left: 2px; }
.pc-marker svg { display: block; }
.pc-step.active .pc-marker { border-color: var(--accent); color: var(--accent); background: var(--card-raised); box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 15%, transparent); }
.pc-step.result-ok .pc-marker { border-color: var(--success); color: var(--success); background: var(--success-soft); }
.pc-step.result-warn .pc-marker { border-color: var(--warn); color: var(--warn); background: var(--warn-soft); }
.pc-step.result-fail .pc-marker { border-color: var(--danger); color: var(--danger); background: var(--danger-soft); }
.pc-idle-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); opacity: 0.5; }
.pc-spinner { width: 12px; height: 12px; border: 2px solid color-mix(in oklab, var(--accent) 25%, transparent); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pingFadeBlur { from { opacity: 0; filter: blur(8px); } to { opacity: 1; filter: blur(0); } }
@keyframes numFlyUp { from { opacity: 0; transform: translateY(4px); filter: blur(3px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
.ping-val-in { display: inline-block; animation: pingFadeBlur 0.45s ease-out forwards; }
.pc-step-body { padding-top: 4px; min-width: 0; }
.pc-tip { margin-top: 4px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; }
.pc-tip-icon { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: color-mix(in oklab, var(--warn) 18%, var(--card)); color: var(--warn); display: grid; place-items: center; }
.pc-tip.pc-tip-ok .pc-tip-icon { background: var(--success-soft); color: var(--success); }
.pc-tip-body { flex: 1; min-width: 0; }
.pc-tip-title { font-size: 12.5px; font-weight: 600; color: var(--ink); letter-spacing: 0.01em; }
.pc-tip-desc { font-size: 12px; color: var(--ink-2); margin-top: 4px; line-height: 1.5; }
.pc-tip-cmd { margin-top: 10px; font-family: var(--mono); font-size: 11px; background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; color: var(--ink); white-space: pre; overflow-x: auto; position: relative; }
.pc-tip-cmd .cmd-prompt { color: var(--muted); user-select: none; }
.pc-tip-cmd .cmd-copy { position: absolute; top: 5px; right: 5px; background: var(--bg-2); border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 9.5px; padding: 2px 6px; border-radius: 5px; cursor: pointer; letter-spacing: 0.08em; }
.pc-tip-cmd .cmd-copy:hover { color: var(--ink); border-color: var(--border-strong); }
.pc-step-title { font-size: 13px; color: var(--ink); font-weight: 500; }
.pc-step.active .pc-step-title { color: var(--accent); }
.pc-step:not(.done):not(.active) .pc-step-title { color: var(--muted); }
.pc-step-detail { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.pc-typing { display: inline-block; animation: blink 0.9s steps(1) infinite; }
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
.pc-badge { display: inline-block; margin-top: 6px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 99px; }
.pc-badge-ok { background: var(--success-soft); color: var(--success); }
.pc-badge-warn { background: var(--warn-soft); color: var(--warn); }
.pc-badge-fail { background: var(--danger-soft); color: var(--danger); }
.mono { font-family: var(--mono); font-size: 11.5px; }
.arrow-up { color: var(--accent); }

/* DynDNS drawer */
.dd-hero { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.25s; }
.dd-hero.dd-ok   { border-color: color-mix(in oklab, var(--success) 35%, var(--border)); }
.dd-hero.dd-warn { border-color: color-mix(in oklab, var(--warn) 40%, var(--border)); }
.dd-hero.dd-fail { border-color: color-mix(in oklab, var(--danger) 35%, var(--border)); }
.dd-hero-status { display: flex; align-items: center; gap: 12px; padding: 13px 15px; }
.dd-status-icon { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; background: var(--card); border: 1px solid var(--border); color: var(--muted); transition: all 0.25s; }
.dd-ok .dd-status-icon   { background: var(--success-soft); border-color: transparent; color: var(--success); }
.dd-warn .dd-status-icon { background: var(--warn-soft); border-color: transparent; color: var(--warn); }
.dd-fail .dd-status-icon { background: var(--danger-soft); border-color: transparent; color: var(--danger); }
.dd-hero-text { flex: 1; min-width: 0; }
.dd-hero-title { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.2; }
.dd-hero-sub { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
.dd-stat { background: var(--card); padding: 10px 15px; min-width: 0; }
.dd-stat-label { font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.dd-stat-val { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11.5px; color: var(--ink); min-height: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-stat-val.is-muted { color: var(--muted); }
.dd-stat-src { font-size: 9px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-provider-select { width: 100%; padding: 9px 12px; font-size: 12.5px; box-sizing: border-box; }
.dd-provider-fields { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }
.dd-push-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
.dd-push-info { flex: 1; min-width: 0; }
.dd-code { font-family: var(--mono); background: var(--bg-2); padding: 0 3px; border-radius: 3px; }
.dd-foot-note { font-size: 12px; color: var(--warn); font-family: var(--mono); display: inline-flex; align-items: center; gap: 7px; }
.dd-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dd-dot.ok { background: var(--success); } .dd-dot.warn { background: var(--warn); } .dd-dot.fail { background: var(--danger); }
.dd-field-status { display: flex; align-items: center; gap: 7px; margin-top: 8px; font-family: var(--mono); font-size: 10.5px; color: var(--muted); line-height: 1.4; min-width: 0; }
.dd-field-status > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-field-status.ok { color: var(--success); }
.dd-field-status.warn { color: var(--warn); }
.dd-field-status.fail { color: var(--danger); }
.dd-conf-pill { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 99px; display: inline-flex; align-items: center; gap: 4px; }
.dd-conf-pill.ok { background: var(--success-soft); color: var(--success); }
.dd-conf-pill.warn { background: var(--warn-soft); color: var(--warn); }

/* MAIN GRID */
.main-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.hero-card, .logs-card, .peers-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.hero-card { padding: 20px 22px 16px; }
.hero-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 14px;
  gap: 16px;
}
.hero-values {
  display: flex; gap: 28px;
  margin-top: 10px;
}
.hero-val {
  display: flex; align-items: baseline; gap: 4px;
  min-width: 220px;
}
.hero-num {
  font-family: var(--serif);
  font-size: 38px;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  display: inline-block;
  text-align: right;
}
.hero-unit {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  display: inline-block;
  min-width: 38px;
}
.hero-lbl {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-left: 10px;
  display: inline-flex; align-items: center; gap: 5px;
  text-transform: uppercase;
}
.legend-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
}
.range-pills {
  position: relative;
  display: flex; gap: 2px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 2px;
}
.range-pill {
  position: relative; z-index: 1;
  font-family: var(--mono);
  font-size: 10.5px;
  padding: 4px 10px;
  border: none; background: transparent;
  color: var(--muted);
  border-radius: 5px;
  cursor: pointer;
  transition: color 0.25s ease;
}
.range-pill.active { color: var(--ink); }
.range-pill-thumb {
  position: absolute;
  background: var(--card);
  border-radius: 5px;
  box-shadow: var(--shadow-sm);
  pointer-events: none;
  transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), top 0.3s cubic-bezier(0.4, 0, 0.2, 1),
              width 0.3s cubic-bezier(0.4, 0, 0.2, 1), height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme="dark"] .range-pills { background: var(--bg); border-color: var(--border); }
.hero-head-right { display: flex; align-items: stretch; gap: 6px; }
.chart-pause-btn {
  display: flex; align-items: center; justify-content: center;
  width: 27px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  cursor: pointer;
  flex-shrink: 0;
  padding: 0;
}
.chart-pause-btn:hover { color: var(--ink); }
.chart-pause-btn.active { color: var(--accent); }
[data-theme="dark"] .chart-pause-btn { background: var(--bg); }
.chart-pause-ico { position: relative; width: 10px; height: 10px; display: block; }
.chart-pause-ico svg {
  position: absolute; inset: 0;
  transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
}
.chart-pause-ico .ico-pause { opacity: 1; filter: blur(0); transform: scale(1); }
.chart-pause-ico .ico-play  { opacity: 0; filter: blur(3px); transform: scale(1.25); }
.chart-pause-btn.active .ico-pause { opacity: 0; filter: blur(3px); transform: scale(1.25); }
.chart-pause-btn.active .ico-play  { opacity: 1; filter: blur(0); transform: scale(1); }

/* LOGS PANEL */
.logs-card-shell { position: relative; }
.logs-card { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; }
.logs-card-clickable { cursor: pointer; transition: border-color 0.15s; }
.logs-card-clickable:hover { border-color: var(--border-strong); }
.logs-card-clickable:hover .log-expand-hint { color: var(--accent); }
.log-expand-hint { color: var(--muted); font-size: 10.5px; margin-left: 8px; transition: color 0.15s; display: inline-flex; align-items: center; gap: 2px; }
.log-expand-chev { flex-shrink: 0; transition: transform 0.15s; }
.logs-card-clickable:hover .log-expand-chev { transform: translateX(1px); }
.alerts-block { padding: 14px 16px 0; display: flex; flex-direction: column; gap: 8px; }
.alert {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  background: var(--warn-soft);
  border: 1px solid color-mix(in oklab, var(--warn) 25%, var(--border));
}
.alert-error { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger) 25%, var(--border)); }
.alert-icon { color: var(--warn); display: grid; place-items: center; margin-top: 1px; }
.alert-error .alert-icon { color: var(--danger); }
.alert-title { font-weight: 600; font-size: 12.5px; color: var(--ink); }
.alert-desc { font-size: 11.5px; color: var(--ink-2); margin-top: 1px; }
.alert-dismiss { margin-left: auto; flex-shrink: 0; background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px; border-radius: 4px; display: grid; place-items: center; opacity: 0.6; }
.alert-dismiss:hover { opacity: 1; color: var(--ink); }
.logs-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px 8px;
}
.log-meta {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
}
.drawer-wide { width: 640px; }
.logs-stream-tall { max-height: 320px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-2); padding: 10px 14px; }
.log-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.log-stats .log-stat { background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.log-stat-val { font-family: var(--serif); font-size: 22px; color: var(--ink); line-height: 1; }
.log-stat-lbl { font-family: var(--mono); font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
.log-toolbar { display: flex; gap: 10px; align-items: center; }
.logs-stream {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 16px 14px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.65;
  scroll-behavior: smooth;
}
.logs-stream-tall.logs-stream { max-height: 320px; padding: 10px 14px; }
.logs-stream.is-empty { display: flex; align-items: center; justify-content: center; overflow: hidden; }
.logs-empty {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: 44px 20px 40px; font-family: var(--sans);
}
.logs-empty-mini { padding: 12px 16px; }
.logs-empty-mini .logs-empty-icon { width: 36px; height: 36px; border-radius: 11px; margin-bottom: 10px; }
.logs-empty-mini .logs-empty-title { font-size: 12.5px; }
.logs-empty-mini .logs-empty-desc { font-size: 11px; max-width: 220px; }
.logs-empty-icon {
  width: 44px; height: 44px; border-radius: 13px;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center; margin-bottom: 13px;
}
.logs-empty-title { font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
.logs-empty-desc { font-size: 12px; color: var(--muted); line-height: 1.55; max-width: 260px; }
.logs-empty-btn { margin-top: 16px; height: 32px; }
.log-line {
  display: grid;
  grid-template-columns: 60px 48px 1fr;
  gap: 8px;
  padding: 1px 0;
  animation: logFadeIn 0.4s ease;
  min-width: 0;
}
@keyframes logFadeIn {
  from { opacity: 0; transform: translateX(-4px); }
  to { opacity: 1; transform: translateX(0); }
}
.log-time { color: var(--muted-2); font-variant-numeric: tabular-nums; }
.log-line.no-ts { grid-template-columns: 48px 1fr; }
.log-level {
  text-transform: uppercase;
  font-size: 9.5px;
  letter-spacing: 0.08em;
  padding: 0 4px;
  align-self: center;
  border-radius: 3px;
  height: 16px;
  line-height: 16px;
}
.log-info .log-level { background: color-mix(in oklab, var(--accent-2) 12%, transparent); color: var(--accent-2); }
.log-warn .log-level { background: var(--warn-soft); color: var(--warn); }
.log-error .log-level { background: var(--danger-soft); color: var(--danger); }
.log-msg {
  color: var(--ink-2);
  min-width: 0;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.log-error .log-msg { color: var(--ink); }

/* Logs drawer: allow horizontal scrolling of long lines */
.logs-stream-tall.logs-stream { overflow-x: auto; }
.logs-stream-tall .log-line { grid-template-columns: 60px 48px max-content; width: max-content; min-width: 100%; }
.logs-stream-tall .log-line.no-ts { grid-template-columns: 48px max-content; }
.logs-stream-tall .log-msg { overflow: visible; text-overflow: clip; }

/* PEERS TABLE */
.peers-card { padding: 2px 0 4px; }
.peers-empty-state {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: 40px 20px 36px; gap: 0;
}
.peers-empty-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center; margin-bottom: 14px;
}
.peers-empty-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.peers-empty-desc { font-size: 12px; color: var(--muted); line-height: 1.55; max-width: 280px; margin-bottom: 18px; }
.peers-empty-btn { height: 34px; gap: 6px; }

.peers-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px 12px;
}
.peers-count { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }
.peers-filters { display: flex; gap: 4px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 7px; padding: 2px; }
.filter-pill {
  padding: 4px 12px; font-size: 11.5px; font-family: var(--sans);
  color: var(--muted); background: transparent; border: none; border-radius: 5px; cursor: pointer;
}
.filter-pill.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }
.filter-pill-count { font-size: 10px; font-family: var(--mono); opacity: 0.6; margin-left: 4px; }
.filter-pill.active .filter-pill-count { opacity: 0.75; }
[data-theme="dark"] .peers-filters { background: var(--bg); border-color: var(--border); }

.peers-table {
  display: flex; flex-direction: column;
}
.peers-row {
  display: grid;
  grid-template-columns: 34px 1.4fr 1fr 130px 0.8fr 0.8fr 1.3fr 40px;
  gap: 14px;
  align-items: center;
  padding: 10px 20px;
  border-top: 1px solid var(--border);
  font-size: 12.5px;
}
.peers-head-row {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 20px;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.data-row { cursor: pointer; transition: background 0.12s; }
.data-row:hover { background: var(--bg-2); }
.row-offline { opacity: 0.75; }
.row-offline:hover { opacity: 1; }
.num { text-align: right; font-variant-numeric: tabular-nums; }
.peers-row > div.num { justify-self: end; }
.peer-bytes-out-cell,
.peers-head-row > div:nth-child(6) { padding-right: 16px; }

.status-dot-wrap {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.status-connected .status-dot {}

/* Status-dot hover tooltip — same shell as the chart tooltips, anchored to the
   dot's left edge so it never spills past the card on the first column. */
.peer-status-cell { position: relative; }
.status-tip {
  left: -1px; top: -6px;
  align-items: flex-start; gap: 2px;
  transform: translateY(calc(-100% + 3px));
  opacity: 0;
  transition: opacity 0.12s ease, transform 0.12s cubic-bezier(0.22, 1, 0.36, 1);
}
.peer-status-cell:hover .status-tip {
  opacity: 1;
  transform: translateY(-100%);
}
.status-tip-val { display: inline-flex; align-items: center; gap: 6px; }
.status-tip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
@media (prefers-reduced-motion: reduce) { .status-tip { transition: opacity 0.12s ease; } }

.peer-name-cell { display: flex; align-items: center; gap: 10px; }
.peer-avatar-sm {
  width: 28px; height: 28px;
  background: var(--avatar-bg);
  color: var(--avatar-color);
  border-radius: 7px;
  display: grid; place-items: center;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
  flex-shrink: 0;
}
.row-offline .peer-avatar-sm { background: var(--border-strong); color: var(--muted); }
/* Paused and throttled peers swap their initials for a glyph — the row's only cue
   besides the status dot, so it pulses to stay noticeable while scanning. Tint is
   what tells the two apart. */
.peer-avatar-sm.is-paused {
  background: color-mix(in oklch, var(--warn) 14%, transparent);
  color: var(--warn);
}
.peer-avatar-sm.is-throttled {
  background: color-mix(in oklch, var(--danger) 14%, transparent);
  color: var(--danger);
}
.peer-avatar-pause,
.peer-avatar-throttle { animation: avatarGlyphBlink 1.4s ease-in-out infinite; }
@keyframes avatarGlyphBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@media (prefers-reduced-motion: reduce) {
  .peer-avatar-pause,
  .peer-avatar-throttle { animation: none; }
}
.peer-name { font-weight: 500; color: var(--ink); line-height: 1.2; }
.peer-device { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
.handshake-cell { line-height: 1.3; }
.handshake-abs { font-size: 10px; color: var(--muted-2); }
.row-action { display: flex; justify-content: flex-end; }





/* DRAWER */
.drawer-scrim {
  position: fixed; inset: 0;
  background: rgba(20, 15, 10, 0.28);
  backdrop-filter: blur(2px);
  z-index: 40;
  animation: fadeIn 0.25s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 540px; max-width: 100vw;
  background: var(--card);
  border-left: 1px solid var(--border);
  z-index: 50;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
}
@keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.drawer-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 22px 18px;
  border-bottom: 1px solid var(--border);
}
.drawer-head-left { display: flex; gap: 14px; align-items: center; }
.drawer-head-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.peer-avatar {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: grid; place-items: center;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--avatar-color);
}
.drawer-title { font-family: var(--serif); font-size: 26px; margin: 0; color: var(--ink); line-height: 1; font-weight: 400; letter-spacing: -0.01em; }
.drawer-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }
.drawer-body { flex: 1; overflow-y: auto; overscroll-behavior: contain; padding: 20px 22px 40px; display: flex; flex-direction: column; gap: 24px; }
.drawer-section { }
.section-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.section-meta {
  font-family: var(--mono); font-size: 10.5px; color: var(--muted);
  display: inline-flex; align-items: center; gap: 10px;
}
.drawer-chart {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
}
.empty-chart {
  height: 180px;
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
}
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px;
}
.stat-cell {
  padding: 12px 12px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.stat-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
.stat-val { font-family: var(--serif); font-size: 22px; color: var(--ink); margin-top: 4px; letter-spacing: -0.01em; line-height: 1.1; }
.kv {
  margin: 0;
  display: grid; grid-template-columns: 130px 1fr;
  row-gap: 10px; column-gap: 12px;
  font-size: 12px;
}
.kv dt { color: var(--muted); font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase; align-self: center; }
.kv dd { margin: 0; color: var(--ink); }
.key-val {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 11px;
}
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.mini-btn {
  font-family: var(--mono); font-size: 10px;
  padding: 2px 8px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted); cursor: pointer;
}
.mini-btn:hover { color: var(--accent); border-color: var(--accent); }
.mini-btn-icon { display: inline-flex; align-items: center; justify-content: center; padding: 0; width: 22px; height: 20px; flex-shrink: 0; }
.action-row { display: flex; flex-wrap: wrap; gap: 8px; }
.logs-action-row { flex-wrap: nowrap; }
.logs-action-row .btn { flex: 0 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cs-grid { display: flex; flex-direction: column; gap: 6px; }
.cs-chip { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 9px 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; }
.cs-chip-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
.cs-chip-val { font-size: 12px; color: var(--ink); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.notes-block { background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; min-height: 44px; }
.notes-short { font-size: 13px; color: var(--ink); line-height: 1.5; }
.notes-long { font-size: 12px; color: var(--ink-2); line-height: 1.6; margin-top: 6px; white-space: pre-wrap; }
.notes-empty { font-family: var(--mono); font-size: 11px; color: var(--muted); font-style: italic; }

.seg {
  display: flex; background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 2px;
}
.seg button {
  font-family: var(--mono); font-size: 10.5px;
  padding: 3px 8px; border: none; background: transparent;
  color: var(--muted); border-radius: 4px; cursor: pointer;
  text-transform: lowercase;
}
.seg button.on { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }

/* Responsive */
@media (max-width: 1200px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .main-grid { grid-template-columns: 1fr; }
  .peers-row { grid-template-columns: 24px 1.2fr 0.9fr 100px 0.7fr 0.7fr 1fr 40px; gap: 10px; font-size: 12px; }
}
@media (max-width: 720px) {
  .topbar { grid-template-columns: auto auto; }
  .topbar-center { grid-column: 1 / -1; order: 3; }
  .kpi-row { grid-template-columns: 1fr; }
  .peers-row { grid-template-columns: 20px 1fr 70px 40px; gap: 8px; }
  .peers-row > div:nth-child(3), .peers-row > div:nth-child(4), .peers-row > div:nth-child(7) { display: none; }
  .drawer { width: 100vw; }
}

/* ============================================================
   Add Peer Modal — platform picker + QR success state
============================================================ */
.ap-platforms {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.ap-plat-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 8px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  transition: all 0.14s;
}
.ap-plat-btn:hover {
  background: var(--card);
  border-color: var(--border-strong);
  color: var(--ink);
}
.ap-plat-btn.ap-plat-active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.ap-input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--ink);
  padding: 9px 12px;
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.ap-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 14%, transparent);
}
.ap-error {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-top: 10px;
  padding: 8px 12px;
  background: var(--danger-soft);
  border: 1px solid color-mix(in oklab, var(--danger) 22%, transparent);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--danger);
}
.ap-qr-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
}
.ap-qr-img {
  border-radius: 8px;
  display: block;
  image-rendering: pixelated;
  background: white;
  padding: 10px;
}
.ap-qr-hint {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* Peer provisioning QR — modal above the drawer */
.qr-modal-scrim {
  position: fixed; inset: 0;
  background: rgba(20, 15, 10, 0.42);
  backdrop-filter: blur(3px);
  z-index: 80;
  animation: fadeIn 0.2s ease;
}
.qr-modal {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 81;
  width: 328px; max-width: calc(100vw - 32px);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  animation: qrModalIn 0.24s cubic-bezier(0.2, 0.9, 0.3, 1);
}
@keyframes qrModalIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
@media (prefers-reduced-motion: reduce) {
  .qr-modal, .qr-modal-scrim { animation: none; }
}
.qr-modal-head {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.qr-modal-title { font-size: 13.5px; font-weight: 600; color: var(--ink); }
.qr-modal-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.qr-modal-body { display: flex; flex-direction: column; align-items: center; padding: 18px 16px 16px; }
.qr-modal-stage { position: relative; width: 260px; height: 260px; display: grid; place-items: center; }
.qr-modal-skel {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border-radius: 8px;
  opacity: 1;
  transition: opacity 0.3s ease;
}
.qr-modal-skel.is-gone { opacity: 0; }
.qr-modal-img {
  position: absolute; inset: 0;
  opacity: 0;
  transform: scale(0.98);
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
}
.qr-modal-img.is-shown { opacity: 1; transform: scale(1); }
@media (prefers-reduced-motion: reduce) {
  .qr-modal-skel, .qr-modal-img { transition: none; }
  .qr-modal-img { transform: none; }
}
.qr-modal-err {
  font-family: var(--mono); font-size: 11px;
  color: var(--danger); text-align: center; padding: 0 16px;
}
.qr-modal-cap {
  margin-top: 14px;
  font-size: 12px;
  color: var(--ink-2);
  text-align: center;
}
.qr-modal-note {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
}
.qr-modal-note svg { flex-shrink: 0; }
.ap-conf-preview {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  max-height: 160px;
}
.ap-conf-text {
  margin: 0;
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-2);
  line-height: 1.6;
  overflow-y: auto;
  max-height: 160px;
  white-space: pre;
}

/* ============================================================
   Add Peer Drawer — v2
============================================================ */
.ap-avatar-ok { background: var(--success-soft) !important; color: var(--success) !important; }
.ap-label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; font-weight: 500; margin-bottom: 6px; }
.ap-label-opt { color: var(--muted-2); text-transform: lowercase; letter-spacing: 0; font-size: 10px; margin-left: 6px; }
.ap-input { width: 100%; font-family: var(--sans); font-size: 13px; padding: 9px 12px; background: var(--bg-2); border: 1px solid var(--border); color: var(--ink); border-radius: 7px; outline: none; transition: border-color 0.15s; box-sizing: border-box; }
.ap-input.mono { font-family: var(--mono); font-size: 12px; }
.ap-input:focus { border-color: var(--accent); background: var(--card-raised); }
.ap-input-err { border-color: var(--danger); }
.ap-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
.ap-err { color: var(--danger); }
.ap-device-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.ap-device { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 6px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; color: var(--muted); font-family: var(--sans); font-size: 11px; transition: all 0.12s; }
.ap-device:hover { color: var(--ink); border-color: var(--border-strong); }
.ap-device.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.ap-routing { display: flex; flex-direction: column; gap: 6px; }
.ap-routing-card { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; text-align: left; transition: all 0.12s; }
.ap-routing-card:hover { border-color: var(--border-strong); }
.ap-routing-card.on { background: var(--accent-soft); border-color: var(--accent); }
.ap-routing-radio { width: 16px; height: 16px; border: 2px solid var(--border-strong); border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; margin-top: 1px; }
.ap-routing-card.on .ap-routing-radio { border-color: var(--accent); }
.ap-routing-card.on .ap-routing-radio span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.ap-routing-t { font-size: 13px; color: var(--ink); font-weight: 500; }
.ap-routing-d { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
.ap-radio-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.ap-radio { padding: 8px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; color: var(--muted); font-family: var(--sans); font-size: 12px; }
.ap-radio:hover { color: var(--ink); border-color: var(--border-strong); }
.ap-radio.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.ap-dns-presets { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.ap-dns-presets .mini-btn.on, .ap-tag-presets .mini-btn.on { color: var(--accent); border-color: var(--accent); }
.ap-key-mini { display: flex; flex-direction: column; gap: 6px; }
.ap-key-tag { font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 2px 6px; background: var(--card); border: 1px solid var(--border); border-radius: 99px; flex-shrink: 0; }
.ap-config-block { font-family: var(--mono); font-size: 11.5px; line-height: 1.6; color: var(--ink); background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin: 0; white-space: pre-wrap; word-break: break-all; }
.ap-foot { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 22px; border-top: 1px solid var(--border); background: var(--card); }
.ap-tag-row { display: flex; flex-wrap: wrap; gap: 6px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 7px; padding: 6px 8px; min-height: 36px; align-items: center; }
.ap-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 4px 2px 8px; background: var(--accent-soft); color: var(--accent); border-radius: 99px; font-size: 11px; font-family: var(--mono); }
.ap-tag button { background: transparent; border: none; color: currentColor; cursor: pointer; font-size: 13px; padding: 0 4px; line-height: 1; opacity: 0.7; }
.ap-tag button:hover { opacity: 1; }
.ap-tag-input { flex: 1; min-width: 100px; border: none; background: transparent; outline: none; font-family: var(--sans); font-size: 12px; color: var(--ink); }
.ap-tag-presets { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.pseudo-qr { border: 1px solid var(--border); border-radius: 8px; }
.ap-body { gap: 20px; padding-bottom: 30px; }
.ap-kv-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ap-prov-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 9px; }
.ap-prov-tab { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 9px 8px; background: transparent; border: none; border-radius: 6px; cursor: pointer; font-family: var(--sans); font-size: 12.5px; color: var(--muted); transition: all 0.12s; }
.ap-prov-tab:hover { color: var(--ink-2); }
.ap-prov-tab.on { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }
.ap-prov-tab svg { color: currentColor; flex-shrink: 0; }
.ap-prov-hero { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 30px 24px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; text-align: center; }
.ap-prov-hero .pseudo-qr { box-shadow: var(--shadow); border-radius: 8px; margin-bottom: 14px; }
.ap-prov-hero-title { font-family: var(--serif); font-size: 22px; color: var(--ink); letter-spacing: -0.01em; line-height: 1.2; margin-top: 4px; }
.ap-prov-hero-sub { font-size: 12px; color: var(--muted); line-height: 1.5; max-width: 320px; }
.ap-file-icon { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--accent); margin-bottom: 14px; }
.ap-file-icon svg { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px; box-shadow: var(--shadow-sm); }
.ap-file-name { font-size: 11.5px; color: var(--ink-2); }
.ap-prov-text { display: flex; flex-direction: column; gap: 8px; }
.ap-prov-text-head { display: flex; justify-content: space-between; align-items: center; }
.ap-detail-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.ap-detail-strip-item { padding: 10px 14px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.ap-detail-strip-item:last-child { border-right: none; }
.ap-detail-lbl { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
.ap-detail-strip-item .mono { font-size: 11.5px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ap-warn-strip { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--warn-soft); border: 1px solid color-mix(in oklab, var(--warn) 25%, var(--border)); border-radius: 8px; font-size: 12px; color: var(--ink-2); }
.ap-warn-strip svg { color: var(--warn); flex-shrink: 0; }

/* Fullscreen mode */
.drawer-scrim.scrim-fs { background: rgba(20, 15, 10, 0.55); backdrop-filter: blur(5px); }
.drawer.drawer-fullscreen {
  width: min(1200px, 100vw);
  max-width: 100vw;
  border-radius: 0;
  height: 100dvh;
  top: 0;
}
.drawer.drawer-fullscreen .drawer-head { padding: 22px 40px 20px; }
.drawer.drawer-fullscreen .ap-foot { padding: 16px 40px; }
.ap-body-fs { padding: 0; }
.ap-fs-cols {
  display: grid;
  grid-template-columns: 1fr 340px;
  height: calc(100dvh - 65px - 65px);
  overflow: hidden;
}
.ap2-fs-form {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 26px;
  padding: 32px 44px 52px;
  min-width: 0;
}
.ap-fs-side {
  overflow-y: auto;
  border-left: 1px solid var(--border);
  padding: 28px 28px 40px;
  background: var(--bg-2);
}
.ap-fs-preview { position: sticky; top: 28px; display: flex; flex-direction: column; gap: 16px; }
.ap-fs-preview-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.ap-fs-preview-name { font-size: 11.5px; color: var(--ink-2); white-space: nowrap; }
.ap-fs-qr { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 22px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
.ap-fs-qr .pseudo-qr { box-shadow: var(--shadow-sm); border-radius: 8px; }
.ap-fs-qr-cap { font-family: var(--mono); font-size: 10px; letter-spacing: 0.07em; color: var(--muted); text-transform: uppercase; }
.ap-fs-config { max-height: 300px; overflow: auto; margin: 0; }
.ap-body-fs-created { align-items: center; padding-top: 38px; }
.ap-body-fs-created > * { width: 100%; max-width: 760px; }
@media (max-width: 800px) {
  .ap-fs-cols { grid-template-columns: 1fr; }
  .ap-fs-side { border-left: none; border-top: 1px solid var(--border); }
  .ap-fs-preview { position: static; }
}

/* ap2 sections */
.ap2-body { display: flex; flex-direction: column; gap: 26px; padding: 22px 22px 36px; }
.ap2-sec { display: flex; flex-direction: column; gap: 14px; }
.ap2-sec-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.ap2-sec-title { font-family: var(--serif); font-size: 19px; color: var(--ink); letter-spacing: -0.01em; line-height: 1; }
.ap2-sec-note { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; color: var(--muted); }
.ap2-field { display: flex; flex-direction: column; gap: 7px; }
.ap2-name-wrap { position: relative; display: flex; align-items: center; }
.ap2-name-wrap .ap-input { padding-left: 13px; }
.ap2-name-ok { position: absolute; right: 11px; color: var(--success); display: grid; place-items: center; }
.ap2-ip-row { display: flex; align-items: center; gap: 8px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 8px 8px 13px; }
.ap2-ip-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.ap2-ip-row input { flex: 1; min-width: 0; border: none; background: transparent; outline: none; font-family: var(--mono); font-size: 13px; color: var(--ink); }
.ap2-ip-row input.ap-err { color: var(--danger); }

/* Pro-options stack */
.ap2-pro { display: flex; flex-direction: column; gap: 8px; }
.ap2-pro-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 2px; }
.ap2-pro-head-left { display: flex; align-items: center; gap: 9px; }
.ap2-pro-kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.ap2-pro-count { font-family: var(--mono); font-size: 10px; color: var(--accent); background: var(--accent-soft); border-radius: 99px; padding: 2px 8px; }
.ap2-expand-all { font-family: var(--mono); font-size: 10.5px; color: var(--muted); background: transparent; border: none; cursor: pointer; padding: 2px 4px; }
.ap2-expand-all:hover { color: var(--accent); }

/* Collapsible cards */
.coll { border: 1px solid var(--border); border-radius: 11px; background: var(--bg-2); overflow: hidden; transition: border-color 0.16s, background 0.16s; }
.coll:hover { border-color: var(--border-strong); }
.coll.open { border-color: var(--border-strong); background: var(--card); box-shadow: var(--shadow-sm); }
.coll-head { width: 100%; display: flex; align-items: center; gap: 12px; padding: 11px 13px; background: transparent; border: none; cursor: pointer; text-align: left; }
.coll-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); display: grid; place-items: center; color: var(--ink-2); flex-shrink: 0; transition: all 0.16s; }
.coll.open .coll-icon { background: var(--accent-soft); border-color: color-mix(in oklab, var(--accent) 40%, var(--border)); color: var(--accent); }
.coll-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.coll-title { font-size: 13px; font-weight: 500; color: var(--ink); display: flex; align-items: center; gap: 7px; line-height: 1.2; }
.coll-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; box-shadow: 0 0 0 3px var(--accent-soft); }
.coll-sum { font-family: var(--mono); font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.coll.open .coll-sum { color: var(--muted-2); }
.coll-chev { color: var(--muted); flex-shrink: 0; transition: transform 0.22s ease; }
.coll.open .coll-chev { transform: rotate(90deg); color: var(--ink-2); }
.coll-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.24s cubic-bezier(0.3,0.8,0.4,1); }
.coll.open .coll-wrap { grid-template-rows: 1fr; }
.coll-wrap > .coll-inner { overflow: hidden; min-height: 0; }
.coll-body { padding: 4px 14px 16px; display: flex; flex-direction: column; gap: 16px; }
.coll-body::before { content: ""; display: block; height: 1px; background: var(--border); margin: 0 -14px 4px; }

/* Collapsible inner inputs */
.ap2-mini-grid { display: grid; gap: 10px; }
.ap2-mini-grid.c2 { grid-template-columns: 1fr 1fr; }
.ap2-mini-grid.c3 { grid-template-columns: 1fr 1fr 1fr; }
.ap2-textarea { width: 100%; box-sizing: border-box; font-family: var(--mono); font-size: 11.5px; line-height: 1.5; padding: 10px 12px; background: var(--bg-2); border: 1px solid var(--border); color: var(--ink); border-radius: 8px; outline: none; resize: vertical; min-height: 58px; }
.coll.open .ap2-textarea { background: var(--card-raised); }
.ap2-textarea:focus { border-color: var(--accent); }
.ap2-inline-toggle { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.ap2-inline-toggle .setting-title { font-size: 12.5px; }
.ap2-help { font-size: 11px; color: var(--muted); line-height: 1.45; }
.ap2-seg { display: inline-flex; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px; flex-wrap: wrap; }
.coll.open .ap2-seg { background: var(--card-raised); }
.ap2-seg button { font-family: var(--mono); font-size: 11px; padding: 5px 11px; border: none; background: transparent; color: var(--muted); border-radius: 6px; cursor: pointer; }
.ap2-seg button:hover { color: var(--ink-2); }
.ap2-seg button.on { background: var(--accent-soft); color: var(--accent); }

/* Footer chips */
.ap2-foot-chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-width: 0; }
.ap2-chip { font-family: var(--mono); font-size: 10.5px; color: var(--ink-2); background: var(--bg-2); border: 1px solid var(--border); border-radius: 99px; padding: 3px 9px; white-space: nowrap; }
.ap2-chip b { color: var(--muted); font-weight: 400; margin-right: 4px; }

/* Fullscreen form area */
.ap2-fs-form .ap2-body { padding: 0; }

/* Light-mode open-collapsible input overrides */
html:not([data-theme="dark"]) .coll.open .ap-input,
html:not([data-theme="dark"]) .coll.open .ap2-textarea { background: var(--card-raised); }
html:not([data-theme="dark"]) .coll.open .ap-input:focus { background: var(--card-raised); }

/* Dark-mode add-peer form: inputs/selectors use page bg for contrast against --card drawer */
[data-theme="dark"] .ap-input { background: var(--bg); }
[data-theme="dark"] .ap-input:focus { background: var(--bg); }
[data-theme="dark"] .ap2-textarea,
[data-theme="dark"] .coll.open .ap2-textarea { background: var(--bg); }
[data-theme="dark"] .ap2-ip-row { background: var(--bg); }
[data-theme="dark"] .ap-tag-row { background: var(--bg); }
[data-theme="dark"] .ap-config-block { background: var(--bg); }
[data-theme="dark"] .ap-device { background: var(--bg); }
[data-theme="dark"] .ap-routing-card { background: var(--bg); }
[data-theme="dark"] .ap-radio { background: var(--bg); }
[data-theme="dark"] .coll { background: var(--bg); }
[data-theme="dark"] .coll.open { background: var(--card); }
[data-theme="dark"] .select-input { background: var(--bg); }
.coll.coll-soon { opacity: 0.5; }
.coll.coll-soon .coll-head { cursor: not-allowed; }
.coll.coll-soon:hover { border-color: var(--border); }
.coll-soon-pill { font-size: 10px; font-weight: 500; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 20px; background: var(--border); color: var(--muted); line-height: 1.4; flex-shrink: 0; }

/* ============================================================
   Peer drawer — tabs + PeerSettings
============================================================ */
.drawer-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 22px;
  gap: 2px;
  flex-shrink: 0;
}
.drawer-tab {
  position: relative;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.14s, border-color 0.14s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.drawer-tab:hover { color: var(--ink-2); }
.drawer-tab.on { color: var(--ink); border-bottom-color: var(--accent); }
@keyframes dotPop { 0% { opacity: 0; transform: scale(0.3); } 65% { transform: scale(1.25); } 100% { opacity: 1; transform: scale(1); } }
.drawer-tab-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--warn);
  flex-shrink: 0;
  box-shadow: 0 0 0 2px var(--warn-soft);
  animation: dotPop 0.22s ease-out;
}
.drawer-tab-dot-live { background: var(--success); box-shadow: 0 0 0 2px color-mix(in oklch, var(--success) 22%, transparent); }

/* ─── DNS / visited-domain activity tab ─── */
.dns-privacy {
  display: flex; gap: 8px; align-items: flex-start;
  margin-top: 12px; padding: 10px 12px;
  border-radius: 8px;
  background: color-mix(in oklch, var(--accent) 6%, transparent);
  border: 1px solid var(--border);
  font-size: 11.5px; line-height: 1.5; color: var(--muted);
}
.dns-privacy svg { flex-shrink: 0; margin-top: 1px; color: var(--accent-2); }
.dns-privacy strong { color: var(--ink-2); font-weight: 600; }
.dns-note {
  padding: 10px 12px; border-radius: 8px;
  font-size: 12px; line-height: 1.5; color: var(--muted);
  border: 1px solid var(--border);
}
.dns-note code { font-family: var(--mono); font-size: 11px; background: var(--border); padding: 1px 5px; border-radius: 4px; color: var(--ink-2); }
.dns-note-warn {
  color: var(--warn);
  background: color-mix(in oklch, var(--warn) 10%, transparent);

/* ============================================================
   Login Screen
============================================================ */
.login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  background: var(--bg);
  background-image:
    radial-gradient(1200px 600px at 15% -10%, color-mix(in oklab, var(--accent) 8%, transparent), transparent 60%),
    radial-gradient(900px 500px at 100% 10%, color-mix(in oklab, var(--accent-2) 6%, transparent), transparent 60%);
  z-index: 9999;
  animation: loginFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.login-screen.exit {
  animation: loginFadeOut 0.45s cubic-bezier(0.4, 0, 1, 1) forwards;
  pointer-events: none;
}

.login-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 340px;
  animation: loginSlideIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) both;
}
.login-inner.exit {
  animation: loginSlideOut 0.45s cubic-bezier(0.4, 0, 1, 1) forwards;
}

.login-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 36px;
  text-align: center;
}
.login-brand-mark {
  width: 56px;
  height: 56px;
  background: var(--accent-soft);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
  box-shadow: 0 1px 2px color-mix(in oklab, var(--ink) 6%, transparent);
}
.login-brand-text { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.login-title {
  font-family: var(--serif);
  font-size: 30px;
  line-height: 1.1;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.login-subtitle {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
}
.login-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}
.login-input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--ink);
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.login-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
}
.login-input:disabled { opacity: 0.55; cursor: not-allowed; }

.login-input-wrap { position: relative; }
.login-input-wrap .login-input { padding-right: 42px; }

.ap-input-wrap { position: relative; }
.ap-input-wrap .ap-input { padding-right: 38px; }
.ap-input-wrap .login-eye { right: 8px; }
.login-eye {
  position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px;
  display: grid; place-items: center; transition: color 0.15s;
}
.login-eye:hover { color: var(--ink); }

.login-btn {
  width: 100%;
  justify-content: center;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  gap: 8px;
  transition: opacity 0.15s, transform 0.1s;
}
.login-btn:active { transform: scale(0.98); }

.login-spinner-sm {
  width: 14px;
  height: 14px;
  border: 2px solid color-mix(in oklab, currentColor 30%, transparent);
  border-top-color: currentColor;
  border-radius: 50%;
  display: inline-block;
  animation: loginSpin 0.65s linear infinite;
  flex-shrink: 0;
}

.login-checking-spinner {
  width: 30px;
  height: 30px;
  border: 2.5px solid color-mix(in oklab, var(--accent) 25%, transparent);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: loginSpin 0.7s linear infinite;
}

.login-checking-wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
}

.login-checking-label {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.01em;
}

.login-footer {
  position: absolute;
  bottom: 28px;
  left: 24px;
  right: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 12px;
  color: var(--muted);
  animation: loginFadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.login-meta-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-variant-numeric: tabular-nums;
}
.login-meta-sep { opacity: 0.5; user-select: none; }
.login-status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.login-status-dot.ok {
  background: var(--success);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--success) 20%, transparent);
}
.login-status-dot.down {
  background: var(--danger);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--danger) 20%, transparent);
}
.login-help {
  color: var(--muted);
  text-decoration: none;
  border-bottom: 1px solid color-mix(in oklab, var(--muted) 40%, transparent);
  transition: color 0.15s, border-color 0.15s;
}
.login-help:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

@keyframes loginFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes loginFadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}
@keyframes loginSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
@keyframes loginSlideOut {
  from { opacity: 1; transform: none; }
  to   { opacity: 0; transform: translateY(-8px); }
}
@keyframes loginSpin {
  to { transform: rotate(360deg); }
}

@media (max-width: 480px) {
  .login-screen {
    background-image: none;
    padding: 32px 24px;
  }
  .login-inner {
    animation: loginFadeIn 0.4s ease both;
  }
  .login-inner.exit {
    animation: loginFadeOut 0.35s ease forwards;
  }
  .login-brand { margin-bottom: 32px; }
  .login-input { padding: 13px 16px; }
  .login-btn   { padding: 13px 18px; font-size: 15px; }
  .login-footer { bottom: max(20px, env(safe-area-inset-bottom)); }
}

/* ====================================================
   TOAST NOTIFICATIONS
   ==================================================== */
.toaster {
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 10001;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-start;
  pointer-events: none;
  max-width: min(400px, calc(100vw - 48px));
}

.toast-item {
  pointer-events: all;
  width: max-content;
  max-width: min(400px, calc(100vw - 48px));
  background: var(--card-raised);
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  /* clip instead of hidden — avoids creating a Block Formatting Context,
     which causes a two-pass flex layout that makes text briefly wrap */
  overflow: clip;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transform: translateY(6px) scale(0.98);
  will-change: transform, opacity;
  backface-visibility: hidden;
  -webkit-font-smoothing: antialiased;
}
.toast-item.t-in {
  opacity: 1;
  transform: translateY(0) scale(1);
  transition: opacity 0.28s cubic-bezier(0.16, 1, 0.3, 1), transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
}
.toast-item.t-out {
  animation: toastOut 0.22s ease forwards;
  transition: none !important;
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(4px) scale(0.97); }
}

.toast-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 11px 10px 14px;
}

.toast-ico {
  flex-shrink: 0;
  display: grid;
  place-items: center;
  width: 18px;
  height: 18px;
  margin-top: 1px;
}
.toast-ico-success { color: var(--success); }
.toast-ico-error   { color: var(--danger); }
.toast-ico-warning,
.toast-ico-confirm { color: var(--warn); }
.toast-ico-pause   { color: var(--accent); }
.toast-ico-info,
.toast-ico-loading { color: var(--accent); }

@keyframes toastIcoBounce {
  0%   { transform: scale(1) translateY(0); }
  28%  { transform: scale(1.45) translateY(-3px); }
  55%  { transform: scale(0.88) translateY(2px); }
  78%  { transform: scale(1.15) translateY(-1px); }
  100% { transform: scale(1) translateY(0); }
}
.toast-ico.t-bounce {
  animation: toastIcoBounce 0.42s cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

.toast-spin {
  display: block;
  width: 15px; height: 15px;
  border: 2px solid color-mix(in oklab, var(--accent) 22%, transparent);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

.toast-txt  { flex: auto; min-width: 0; }
.toast-ttl  { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.toast-dsc  { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; white-space: pre-line; }
.toast-stats { display: flex; gap: 10px; margin-top: 5px; flex-wrap: wrap; }
.toast-stat  { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--ink-2); }
.toast-stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.toast-action-row { padding: 0 11px 10px 42px; }
.toast-action-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 6px;
  font-size: 11.5px; font-weight: 600; cursor: pointer;
  background: var(--bg-2); color: var(--ink);
  border: 1px solid var(--border);
  transition: background 0.12s, border-color 0.12s;
}
.toast-action-btn:hover { background: var(--card-raised); border-color: var(--border-strong); }
.toast-action-icon { display: grid; place-items: center; }

.toast-x {
  flex-shrink: 0;
  display: grid; place-items: center;
  width: 22px; height: 22px;
  background: none; border: none; border-radius: 5px;
  cursor: pointer; color: var(--muted-2);
  opacity: 0.5; margin: -2px -2px 0 4px;
  transition: opacity 0.12s, background 0.12s, color 0.12s;
}
.toast-x:hover { opacity: 1; background: var(--bg-2); color: var(--ink); }

/* Confirm action buttons */
.toast-actions {
  display: flex;
  gap: 6px;
  padding: 0 11px 10px 42px;
}
.toast-act {
  flex: 1;
  padding: 3px 10px;
  border: none;
  border-radius: 6px;
  font-size: 11.5px;
  font-weight: 600;
  cursor: pointer;
  transition: filter 0.12s, background 0.12s;
  line-height: 1;
}
.toast-act-cancel {
  background: var(--bg-2);
  color: var(--muted);
  border: 1px solid var(--border);
}
.toast-act-cancel:hover { background: var(--border); color: var(--ink); }
.toast-act-ok {
  background: var(--accent);
  color: #fff;
}
.toast-act-ok:hover { filter: brightness(0.88); }

/* Progress bar (shows remaining auto-dismiss time) */
.toast-bar { height: 2px; background: color-mix(in oklab, var(--border) 70%, transparent); border-radius: 0 0 12px 12px; overflow: hidden; }
.toast-bar-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.08s linear;
}

</style>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="{{ url_for('static', filename='js/charts.jsx') }}?v={{ app_version }}"></script>

<script type="text/babel" src="{{ url_for('static', filename='js/trafficmode.jsx') }}?v={{ app_version }}"></script>
<script type="text/babel" src="{{ url_for('static', filename='js/addpeer.jsx') }}?v={{ app_version }}"></script>

<script type="text/babel" src="{{ url_for('static', filename='js/toast.jsx') }}?v={{ app_version }}"></script>

<script type="text/babel">
  const THEME_KEY = 'WG_THEME';
  const DEV_UPDATES_KEY = 'WG_DEV_UPDATES';
  const ACCENT_KEY = 'WG_ACCENT';
  const SPLINE_CHART_KEY = 'WG_SPLINE_CHART';
  const REFRESH_INTERVAL_KEY = 'WG_REFRESH_INTERVAL';
  const SMOOTH_THROUGHPUT_KEY = 'WG_SMOOTH_THROUGHPUT';
  const SMOOTH_SCALE_KEY = 'WG_SMOOTH_SCALE';
  const SPLINE_TENSION_KEY = 'WG_SPLINE_TENSION';
  const TRAFFIC_MODE_KEY = 'WG_TRAFFIC_MODE';
  // One-time migration: smooth scrolling / smooth lines / smooth Y scaling
  // and 500ms polling became the defaults — override values persisted by
  // earlier versions, then let the user change them freely again.
  if (!localStorage.getItem('WG_TWEAKS_V2')) {
    localStorage.setItem(SPLINE_CHART_KEY, 'true');
    localStorage.setItem(SMOOTH_THROUGHPUT_KEY, 'true');
    localStorage.setItem(SMOOTH_SCALE_KEY, 'true');
    localStorage.setItem(REFRESH_INTERVAL_KEY, '500');
    localStorage.setItem('WG_TWEAKS_V2', '1');
  }
  const TWEAKS_DEFAULTS = {
    theme: localStorage.getItem(THEME_KEY) || 'light',
    density: 'compact',
    accent: localStorage.getItem(ACCENT_KEY) || 'terracotta',
    devUpdates: localStorage.getItem(DEV_UPDATES_KEY) === 'true',
    splineChart: localStorage.getItem(SPLINE_CHART_KEY) !== 'false',
    splineTension: parseFloat(localStorage.getItem(SPLINE_TENSION_KEY) || '1'),
    smoothThroughput: localStorage.getItem(SMOOTH_THROUGHPUT_KEY) !== 'false',
    smoothScale: localStorage.getItem(SMOOTH_SCALE_KEY) !== 'false',
    refreshInterval: parseInt(localStorage.getItem(REFRESH_INTERVAL_KEY) || '500', 10),
    trafficMode: localStorage.getItem(TRAFFIC_MODE_KEY) === 'true',
  };

  function Root() {
    const [tweaks, setTweaks] = React.useState({ ...TWEAKS_DEFAULTS });
    const themeMounted = React.useRef(false);
    const themeTimer = React.useRef(null);

    React.useEffect(() => {
      const theme = tweaks.theme || 'light';
      if (themeMounted.current) {
        document.documentElement.classList.add('theme-switching');
        window.clearTimeout(themeTimer.current);
        themeTimer.current = window.setTimeout(() => {
          document.documentElement.classList.remove('theme-switching');
        }, 360);
      } else {
        themeMounted.current = true;
      }

      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(THEME_KEY, theme);

      return () => window.clearTimeout(themeTimer.current);
    }, [tweaks.theme]);

    React.useEffect(() => {
      localStorage.setItem(DEV_UPDATES_KEY, tweaks.devUpdates ? 'true' : 'false');
    }, [tweaks.devUpdates]);

    React.useEffect(() => {
      const accent = tweaks.accent || 'terracotta';
      const root = document.documentElement;
      // The dark-mode accent overrides are keyed to [data-theme="dark"].accent-*,
      // so the class has to live on <html> alongside data-theme.
      Array.from(root.classList).forEach(c => { if (c.startsWith('accent-')) root.classList.remove(c); });
      root.classList.add('accent-' + accent);
      localStorage.setItem(ACCENT_KEY, accent);
    }, [tweaks.accent]);

    React.useEffect(() => {
      localStorage.setItem(SPLINE_CHART_KEY, tweaks.splineChart ? 'true' : 'false');
    }, [tweaks.splineChart]);

    React.useEffect(() => {
      localStorage.setItem(SMOOTH_THROUGHPUT_KEY, tweaks.smoothThroughput ? 'true' : 'false');
    }, [tweaks.smoothThroughput]);

    React.useEffect(() => {
      localStorage.setItem(SMOOTH_SCALE_KEY, tweaks.smoothScale ? 'true' : 'false');
    }, [tweaks.smoothScale]);

    React.useEffect(() => {
      localStorage.setItem(SPLINE_TENSION_KEY, String(tweaks.splineTension ?? 1));
    }, [tweaks.splineTension]);

    React.useEffect(() => {
      localStorage.setItem(REFRESH_INTERVAL_KEY, String(tweaks.refreshInterval || 1000));
    }, [tweaks.refreshInterval]);

    React.useEffect(() => {
      localStorage.setItem(TRAFFIC_MODE_KEY, tweaks.trafficMode ? 'true' : 'false');
    }, [tweaks.trafficMode]);

    React.useEffect(() => {
      return () => window.clearTimeout(themeTimer.current);
    }, []);

    return <AuthWrapper tweaks={tweaks} setTweaks={setTweaks} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
