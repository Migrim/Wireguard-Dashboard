<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#924f6f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WG Dashboard" />
<link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.json" />
<title>WG-Quick</title>
<script>
(function () {
  var t = localStorage.getItem('WG_THEME');
  if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
  var a = localStorage.getItem('WG_ACCENT');
  if (a && a !== 'terracotta') document.documentElement.classList.add('accent-' + a);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js', { scope: '/' }).catch(function () {});
  }
  function setAppH() {
    document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
  }
  setAppH();
  window.addEventListener('resize', setAppH);
}());
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  color-scheme: light;
  --bg:          #F5EEE2;
  --bg-2:        #EFE7D8;
  --card:        #FBF6EC;
  --card-raised: #FFFCF4;
  --ink:         #2A2520;
  --ink-2:       #4A4238;
  --muted:       #8A7F72;
  --muted-2:     #A89C8C;
  --border:      #E6DCC8;
  --border-strong: #D6C9B0;
  --accent:      oklch(59% 0.15 33);
  --accent-soft: oklch(89% 0.06 33);
  --accent-2:    oklch(55% 0.09 150);
  --success:     oklch(58% 0.12 150);
  --warn:        oklch(68% 0.14 70);
  --danger:      oklch(56% 0.17 25);
  --success-soft: oklch(90% 0.06 150);
  --warn-soft:   oklch(92% 0.07 70);
  --danger-soft: oklch(92% 0.05 25);
  --shadow:      0 1px 3px rgba(80,60,30,0.08), 0 4px 14px rgba(80,60,30,0.06);
  --shadow-sm:   0 1px 2px rgba(80,60,30,0.06);
  --radius:      12px;
  --nav-h:       60px;
  --safe-bot:    env(safe-area-inset-bottom, 0px);
  --safe-top:    env(safe-area-inset-top, 0px);
}
[data-theme="dark"] {
  color-scheme: dark;
  --bg:          #14100C;
  --bg-2:        #1C1611;
  --card:        #241D16;
  --card-raised: #2F2619;
  --ink:         #EFE6D8;
  --ink-2:       #C8BEAE;
  --muted:       #8A7F72;
  --muted-2:     #6B6256;
  --border:      #3A2F24;
  --border-strong: #4D3E2C;
  --accent:      oklch(68% 0.15 33);
  --accent-soft: oklch(32% 0.08 33);
  --accent-2:    oklch(70% 0.10 150);
  --success:     oklch(72% 0.13 150);
  --success-soft: oklch(30% 0.07 150);
  --warn:        oklch(72% 0.14 70);
  --warn-soft:   oklch(32% 0.08 70);
  --danger:      oklch(64% 0.17 25);
  --danger-soft: oklch(30% 0.07 25);
  --shadow:      0 1px 3px rgba(0,0,0,0.5), 0 4px 14px rgba(0,0,0,0.4);
  --shadow-sm:   0 1px 2px rgba(0,0,0,0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
#root { height: 100%; display: flex; flex-direction: column; }

/* ── App shell ── */
.m-app { display: flex; flex-direction: column; height: var(--app-h, 100dvh); background: var(--bg); }
.m-header {
  flex-shrink: 0;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.m-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--serif); font-size: 20px; color: var(--ink); line-height: 1;
}
.m-brand-mark {
  width: 32px; height: 32px;
  background: var(--accent-soft); color: var(--accent);
  border: 1px solid var(--border); border-radius: 8px;
  display: grid; place-items: center; flex-shrink: 0;
}
.m-status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 99px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
}
.m-status-pill.active   { background: var(--success-soft); color: var(--success); }
.m-status-pill.inactive { background: var(--danger-soft);  color: var(--danger); }
.m-status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.m-status-pill.active .m-status-dot { animation: mpulse 1.8s infinite; }
@keyframes mpulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.m-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.m-icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--card); border: 1px solid var(--border);
  display: grid; place-items: center; cursor: pointer; color: var(--ink-2);
  -webkit-tap-highlight-color: transparent;
}
.m-icon-btn:active { background: var(--bg-2); }

.m-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
.m-scroll-pad { padding-bottom: calc(var(--nav-h) + var(--safe-bot) + 16px); }

/* ── Bottom nav ── */
.m-nav {
  flex-shrink: 0;
  display: flex;
  height: calc(var(--nav-h) + var(--safe-bot));
  padding-bottom: var(--safe-bot);
  background: var(--card);
  border-top: 1px solid var(--border);
}
.m-nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: none; cursor: pointer; color: var(--muted);
  font-family: var(--sans); font-size: 10px; font-weight: 500; letter-spacing: 0.02em;
  -webkit-tap-highlight-color: transparent; transition: color 0.15s;
}
.m-nav-btn.on { color: var(--accent); }
.m-nav-btn svg { width: 22px; height: 22px; stroke: currentColor; }

/* ── Cards ── */
.m-section { padding: 0px 14px 0; }
.m-section:last-child { padding-bottom: 0; }
.m-section-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 8px;
}
.m-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden;
}
.m-card + .m-card { margin-top: 10px; }

/* ── Service card ── */
.m-svc-card { padding: 16px; }
.m-svc-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.m-svc-info { flex: 1; min-width: 0; }
.m-svc-name { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.m-svc-uptime { font-size: 13px; color: var(--ink-2); margin-top: 2px; }
.m-svc-btns { display: flex; gap: 6px; margin-top: 14px; }
.m-btn {
  flex: 1; height: 38px; border-radius: 9px; border: 1px solid var(--border);
  background: var(--bg-2); color: var(--ink); font-family: var(--sans);
  font-size: 13px; font-weight: 500; cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 6px;
  -webkit-tap-highlight-color: transparent; transition: background 0.1s;
}
.m-btn:active { background: var(--border); }
.m-btn:disabled { opacity: 0.4; pointer-events: none; }
.m-btn.danger { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger) 25%, var(--border)); color: var(--danger); }
.m-btn.success { background: var(--success-soft); border-color: color-mix(in oklab, var(--success) 25%, var(--border)); color: var(--success); }
.m-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* ── Stat grid ── */
.m-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.m-stat-card { padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
.m-stat-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.m-stat-val { font-family: var(--serif); font-size: 30px; color: var(--ink); letter-spacing: -0.02em; line-height: 1; margin-top: 6px; }
.m-stat-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Traffic chart card ── */
.m-traffic-card { padding: 16px 16px 0; overflow: hidden; }
.m-traffic-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.m-traffic-total { display: flex; align-items: baseline; gap: 5px; margin-bottom: 10px; }
.m-traffic-big { font-family: var(--serif); font-size: 42px; letter-spacing: -0.02em; color: var(--ink); font-weight: 400; line-height: 1; font-variant-numeric: tabular-nums; }
.m-traffic-unit { font-family: var(--mono); font-size: 13px; color: var(--muted); }
.m-traffic-breakdown { display: flex; gap: 18px; margin-bottom: 10px; }
.m-legend-item { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
.m-legend-sq { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.m-range-badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; color: var(--success); }

/* ── Budget bar ── */
.m-budget-card { padding: 16px; }
.m-budget-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.m-budget-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.m-budget-pct { font-family: var(--mono); font-size: 13px; color: var(--muted); }
.m-budget-bar-bg { height: 8px; background: var(--bg-2); border-radius: 4px; border: 1px solid var(--border); overflow: hidden; }
.m-budget-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease, background 0.3s; }
.m-budget-foot { display: flex; justify-content: space-between; margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* ── Peers ── */
.m-search-wrap {
  padding: 12px 14px 8px; position: sticky; top: 0; z-index: 2;
  background: var(--bg);
}
.m-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 0 12px; height: 40px;
  box-shadow: var(--shadow-sm);
}
.m-search svg { flex-shrink: 0; color: var(--muted); }
.m-search input {
  flex: 1; border: none; background: none; outline: none;
  font-family: var(--sans); font-size: 14px; color: var(--ink);
}
.m-search input::placeholder { color: var(--muted); }
.m-search-clear { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px; display: grid; place-items: center; }

.m-peer-list { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
.m-peer-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden;
  transition: border-color 0.15s;
}
.m-peer-card.expanded { border-color: var(--border-strong); }
.m-peer-head {
  padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.m-peer-avatar {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
}
.m-peer-avatar.offline { background: var(--border); color: var(--muted); }
.m-peer-avatar.paused { background: var(--warn-soft); color: var(--warn); }
.m-peer-main { flex: 1; min-width: 0; }
.m-peer-name { font-size: 14px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 7px; }
.m-peer-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.m-peer-status-dot.online { background: var(--success); }
.m-peer-status-dot.offline { background: var(--muted-2); }
.m-peer-status-dot.paused { background: var(--warn); animation: mpulse 1.4s steps(1) infinite; }
.m-peer-sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
.m-peer-chev { color: var(--muted); flex-shrink: 0; transition: transform 0.22s; }
.m-peer-chev.open { transform: rotate(180deg); }

.m-peer-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
.m-peer-stat { background: var(--card); padding: 10px 14px; }
.m-peer-stat-lbl { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.m-peer-stat-val { font-family: var(--mono); font-size: 13px; color: var(--ink); margin-top: 2px; font-weight: 500; }

.m-peer-expand { border-top: 1px solid var(--border); padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.m-peer-kv { display: flex; flex-direction: column; gap: 8px; }
.m-peer-kv-row { display: flex; gap: 10px; align-items: flex-start; }
.m-peer-kv-key { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); min-width: 72px; padding-top: 2px; flex-shrink: 0; }
.m-peer-kv-val { font-family: var(--mono); font-size: 12px; color: var(--ink); word-break: break-all; }
.m-peer-actions { display: flex; gap: 8px; }

/* ── Config modal ── */
.m-modal-scrim {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(20,15,10,0.5); backdrop-filter: blur(3px);
  display: flex; align-items: flex-end; padding: 0;
}
.m-modal {
  width: 100%; background: var(--card); border-radius: 20px 20px 0 0;
  border: 1px solid var(--border); border-bottom: none;
  padding: 20px 20px calc(20px + var(--safe-bot));
  max-height: 92dvh; display: flex; flex-direction: column;
  animation: slideUp 0.3s cubic-bezier(0.2,0.9,0.3,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.m-modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: -12px auto 16px; }
.m-modal-title { font-family: var(--serif); font-size: 22px; color: var(--ink); margin-bottom: 14px; }
.m-config-pre {
  flex: 1; overflow-y: auto; font-family: var(--mono); font-size: 12px; line-height: 1.6;
  color: var(--ink); background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; white-space: pre; margin-bottom: 14px;
}
.m-modal-btns { display: flex; gap: 8px; }

/* ── Logs ── */
.m-logs-wrap { padding: 14px; display: flex; flex-direction: column; gap: 0; height: 100%; box-sizing: border-box; }
.m-logs-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0; }
.m-logs-title { font-size: 14px; font-weight: 600; color: var(--ink); }
.m-logs-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.m-log-stream {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 12px; font-family: var(--mono); font-size: 11.5px; line-height: 1.65;
  flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.m-log-line { display: flex; gap: 8px; padding: 1px 0; animation: logIn 0.3s ease; }
@keyframes logIn { from { opacity: 0; } to { opacity: 1; } }
.m-log-time { color: var(--muted-2); white-space: nowrap; flex-shrink: 0; }
.m-log-lvl { font-size: 9.5px; letter-spacing: 0.08em; padding: 0 4px; border-radius: 3px; height: 16px; line-height: 16px; align-self: center; flex-shrink: 0; text-transform: uppercase; }
.m-log-info .m-log-lvl { background: var(--accent-soft); color: var(--accent); }
.m-log-warn .m-log-lvl { background: var(--warn-soft); color: var(--warn); }
.m-log-error .m-log-lvl { background: var(--danger-soft); color: var(--danger); }
.m-log-msg { color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.m-log-error .m-log-msg { color: var(--ink); }

/* ── Toasts ── */
.m-toast-wrap { position: fixed; top: calc(var(--safe-top) + 70px); left: 12px; right: 12px; z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.m-toast {
  background: var(--card-raised); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 14px; font-size: 13px; color: var(--ink);
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px;
  animation: toastIn 0.3s cubic-bezier(0.2,0.9,0.3,1);
  pointer-events: auto;
}
@keyframes toastIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.m-toast.ok   { border-color: color-mix(in oklab, var(--success) 30%, var(--border)); }
.m-toast.err  { border-color: color-mix(in oklab, var(--danger)  30%, var(--border)); }
.m-toast.warn { border-color: color-mix(in oklab, var(--warn)    30%, var(--border)); }
.m-toast-icon { flex-shrink: 0; font-size: 16px; }

/* ── Login ── */
.m-login {
  position: fixed; inset: 0; z-index: 300;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); padding: 24px;
}
.m-login-card { width: 100%; max-width: 360px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 32px 28px; box-shadow: var(--shadow); }
.m-login-title { font-family: var(--serif); font-size: 28px; color: var(--ink); margin-bottom: 6px; }
.m-login-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.m-login-input {
  width: 100%; padding: 12px 14px; border: 1px solid var(--border);
  border-radius: 10px; background: var(--bg-2); color: var(--ink);
  font-family: var(--sans); font-size: 16px; outline: none;
  margin-bottom: 12px; transition: border-color 0.15s;
}
.m-login-input:focus { border-color: var(--accent); }
.m-login-err { font-size: 12px; color: var(--danger); margin-bottom: 10px; }
.m-login-btn {
  width: 100%; height: 46px; border-radius: 10px; border: none;
  background: var(--ink); color: var(--bg); font-family: var(--sans);
  font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.m-login-btn:disabled { opacity: 0.5; }

/* ── Spinner ── */
.m-spinner {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; height: 100%;
  animation: mFadeIn 0.5s cubic-bezier(0.2,0.9,0.3,1) both;
}
.m-spinner-ring {
  width: 36px; height: 36px;
  border: 2.5px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s cubic-bezier(0.4,0,0.2,1) infinite;
}
.m-spinner-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted);
  animation: breathe 2s ease-in-out infinite;
}
.m-spinner-label::after {
  content: '';
  animation: loadDots 1.5s steps(4, end) infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes breathe { 0%,100%{opacity:0.4} 55%{opacity:1} }
@keyframes loadDots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
@keyframes mFadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

/* ── Empty state ── */
.m-empty { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 48px 24px; gap: 10px; }
.m-empty-icon { font-size: 36px; }
.m-empty-title { font-size: 15px; font-weight: 600; color: var(--ink); }
.m-empty-sub { font-size: 13px; color: var(--muted); }

/* ── Peer filter pills ── */
.m-filter-row { display: flex; gap: 6px; padding: 0 14px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.m-filter-row::-webkit-scrollbar { display: none; }

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
{% raw %}
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── Helpers ─── */
const BASE = document.body.dataset.base || '';
const HS_TIMEOUT = 130;

async function api(path, opts = {}) {
  const res = await fetch(BASE + path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  let data = null;
  try { data = await res.json(); } catch (_) {}
  if (res.status === 401) throw Object.assign(new Error('Unauthorized'), { status: 401 });
  if (!res.ok) throw new Error((data?.hint || data?.error) || `HTTP ${res.status}`);
  return data;
}

function fmtBytes(b) {
  if (!b) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return `${(b / 1024 ** i).toFixed(i ? 1 : 0)} ${u[i]}`;
}
function fmtRate(bps) {
  if (!bps) return '0 B/s';
  const u = ['B/s','KB/s','MB/s','GB/s'];
  const i = Math.min(3, Math.floor(Math.log(Math.max(bps,1)) / Math.log(1024)));
  return `${(bps / 1024 ** i).toFixed(i ? 2 : 0)} ${u[i]}`;
}
function fmtRel(ms) {
  if (!ms) return '—';
  const d = Date.now() - ms;
  if (d < 60_000) return `${Math.floor(d/1000)}s ago`;
  if (d < 3_600_000) return `${Math.floor(d/60_000)}m ago`;
  if (d < 86_400_000) return `${Math.floor(d/3_600_000)}h ago`;
  return `${Math.floor(d/86_400_000)}d ago`;
}
function fmtUptime(startedMs) {
  if (!startedMs) return null;
  const s = Math.floor((Date.now() - startedMs) / 1000);
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60);
  if (h < 24) return `${h}h ${m}m`;
  return `${Math.floor(h/24)}d ${h%24}h`;
}
function mapPeers(issued, live) {
  const now = Date.now();
  return (issued||[]).map(iss => {
    const lv = (live||[]).find(l => l.name === iss.name);
    const hs = lv ? (lv.last_handshake || 0) : 0;
    const online = hs > 0 && (now/1000 - hs) < HS_TIMEOUT;
    return {
      name: iss.name,
      addr: iss.ip || '—',
      status: iss.paused ? 'paused' : online ? 'online' : 'offline',
      bytesIn:  lv ? (lv.bytes_recv || 0) : 0,
      bytesOut: lv ? (lv.bytes_sent || 0) : 0,
      lastHs: hs > 0 ? hs * 1000 : null,
      endpoint: lv?.remote || '—',
      pubKey: iss.public_key || '',
      paused: iss.paused || false,
    };
  });
}
const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function parseLogs(lines) {
  const now = Date.now(), yr = new Date().getFullYear();
  return (lines||[]).map((line, i) => {
    const lo = line.toLowerCase();
    const lvl = (lo.includes('error')||lo.includes('failed')) ? 'error'
               : (lo.includes('warn')||lo.includes('delayed')) ? 'warn' : 'info';
    let t = now - (lines.length - i) * 1000;
    const m = line.match(/^([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{2}):(\d{2}):(\d{2})/);
    if (m) {
      const d = new Date(yr, MONTHS[m[1]]??0, +m[2], +m[3], +m[4], +m[5]);
      if (!isNaN(d)) t = d.getTime();
    }
    const msg = line.replace(/^[A-Z][a-z]{2}\s+\d{1,2}\s+[\d:.]+\s+\S+\s+\S+:\s*/, '').trim() || line;
    return { t, lvl, msg };
  });
}
function timeStr(ms) {
  const d = new Date(ms);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

    trash:   <><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {paths[n]}
    </svg>
  );
};

/* ─── Toast ─── */
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='ok', dur=3000) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), dur);
  }, []);
  return { toasts, add };
}
function Toasts({ toasts }) {
  const icons = { ok:'✓', err:'✕', warn:'⚠' };
  return (
    <div className="m-toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`m-toast ${t.type}`}>
          <span className="m-toast-icon">{icons[t.type]}</span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

/* ─── Login ─── */
function Login({ onAuth }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);
  const submit = async e => {
    e.preventDefault();
    setBusy(true); setErr('');
    try {
      await api('/api/auth/login', { method:'POST', body: JSON.stringify({ password: pw }) });
      onAuth();
    } catch (_) {
      setErr('Wrong password');
    } finally {
      setBusy(false);
    }
  };
  return (
    <div className="m-login">
      <div className="m-login-card">
        <div className="m-login-title">WG-Quick</div>
        <div className="m-login-sub">Enter your password to login</div>
        <form onSubmit={submit}>
          <input
            className="m-login-input" type="password" placeholder="Password"
            value={pw} onChange={e => setPw(e.target.value)} autoFocus
          />
          {err && <div className="m-login-err">{err}</div>}
          <button className="m-login-btn" disabled={busy || !pw}>
            {busy ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
      </div>
    </div>
  );
}

/* ─── Home tab ─── */
function HomeTab({ status, rxBps, txBps, trafficSamples, chartTweaks, onService, svcBusy, peers, sessionStarts, sparks, onSeeAllPeers, onPeerClick }) {
  const svc    = status?.service || {};
  const active  = svc.active;
  const uptime  = fmtUptime(svc.started_at);
  const totalPeers  = peers.length;
  const onlinePeers = peers.filter(p => p.status === 'online').length;
  const pct = totalPeers ? Math.round((onlinePeers / totalPeers) * 100) : 0;
  const topPeers = peers.filter(p => p.status === 'online').sort((a,b) => (b.bytesIn + b.bytesOut) - (a.bytesIn + a.bytesOut));

  return (
    <div className="m-scroll-pad">

      {/* Service card */}
      <div className="m-section">
        <div className="m-section-label">Service</div>
        <div className="m-card m-svc-card">
          <div className="m-svc-row">
            <div className="m-svc-info">
              <div className="m-svc-name">{svc.unit || 'wg-quick@wg0'}</div>
              {uptime && active && <div className="m-svc-uptime">Uptime: {uptime}</div>}
              {!active && <div className="m-svc-uptime" style={{color:'var(--danger)'}}>Inactive</div>}
            </div>
            {active ? (
              <button className="m-btn primary" onClick={() => onService('stop')} disabled={!!svcBusy} style={{flex:'0 0 auto', minWidth:100}}>
                <Icon n="pause" size={14}/> Stop
              </button>
            ) : (
              <button className="m-btn primary" onClick={() => onService('start')} disabled={!!svcBusy} style={{flex:'0 0 auto', minWidth:100}}>
                <Icon n="play" size={14}/> Start
              </button>
            )}
          </div>
        </div>
      </div>

      {/* Traffic */}
      <div className="m-section" style={{marginTop:14}}>
        <div className="m-card m-traffic-card">
          <div className="m-traffic-head">
            <span className="m-section-label" style={{marginBottom:0}}>Live Throughput</span>
            <span className="m-range-badge">
              <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="currentColor"/></svg>
              1m
            </span>
          </div>
          <div className="m-traffic-total">
            <span className="m-traffic-big">{fmtRate(rxBps + txBps).split(' ')[0]}</span>
            <span className="m-traffic-unit">{fmtRate(rxBps + txBps).split(' ')[1]}</span>
          </div>
          <div className="m-traffic-breakdown">
            <span className="m-legend-item">
              <span className="m-legend-sq" style={{background:'var(--accent)'}}/>
              ↓ {fmtRate(rxBps)}
            </span>
            <span className="m-legend-item">
              <span className="m-legend-sq" style={{background:'var(--accent-2)'}}/>
              ↑ {fmtRate(txBps)}
            </span>
          </div>
          <div style={{marginLeft:-16, marginRight:-16}}>
            <ThroughputChart samples={trafficSamples} height={130} range="1m" spline={chartTweaks.spline} smoothScroll={chartTweaks.smoothScroll} smoothScale={chartTweaks.smoothScale} />
          </div>
        </div>
      </div>

      {/* Active Sessions */}
      <div className="m-section" style={{marginTop:14}}>
        <div className="m-card" style={{padding:'14px 16px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: onlinePeers > 0 ? 14 : 0}}>
            <span className="m-section-label" style={{marginBottom:0}}>Active Sessions</span>
            <span style={{fontFamily:'var(--mono)', fontSize:13}}>
              <span style={{fontWeight:700, color:'var(--ink)'}}>{onlinePeers}</span>
              <span style={{color:'var(--muted)'}}> / {totalPeers}</span>
            </span>
          </div>
          <SessionDurationBars peers={peers} sessionStarts={sessionStarts} />
        </div>
      </div>

      {/* Active Peers */}
      <div className="m-section" style={{marginTop:14, marginBottom:0}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <span className="m-section-label" style={{marginBottom:0}}>Active Peers</span>
          <button onClick={onSeeAllPeers} style={{fontFamily:'var(--sans)', fontSize:13, color:'var(--accent)', background:'none', border:'none', cursor:'pointer', padding:'0 2px', WebkitTapHighlightColor:'transparent'}}>
            See all →
          </button>
        </div>
        {topPeers.length === 0 ? (
          <div style={{textAlign:'center', padding:'24px', color:'var(--muted)', fontSize:13}}>No peers online</div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {topPeers.map(p => (
              <HomePeerRow key={p.name} peer={p} spark={sparks[p.name] || []} onPeerClick={onPeerClick}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Config modal ─── */
function ConfigModal({ peerName, onClose, toast }) {
  const [config, setConfig] = useState('');
  const [loading, setLoading] = useState(true);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    api(`/api/users/${encodeURIComponent(peerName)}/ovpn`)
      .then(d => setConfig(d.profile || ''))
      .catch(e => { toast(e.message, 'err'); onClose(); })
      .finally(() => setLoading(false));
  }, [peerName]);

  const copy = () => {
    navigator.clipboard?.writeText(config).then(() => {
      setCopied(true); toast('Config copied to clipboard', 'ok');
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => toast('Copy failed', 'err'));
  };

  const download = () => {
    const blob = new Blob([config], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `${peerName}.conf`; a.click();
    URL.revokeObjectURL(url);
    toast('Download started', 'ok');
  };

  return (
    <div className="m-modal-scrim" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="m-modal">
        <div className="m-modal-handle"/>
        <div className="m-modal-title">{peerName}.conf</div>
        {loading ? <div className="m-spinner" style={{height:'auto', padding:'32px 0'}}>
            <div className="m-spinner-ring"/>
            <div className="m-spinner-label">Loading</div>
          </div>
          : <pre className="m-config-pre">{config}</pre>
        }
        <div className="m-modal-btns">
          <button className="m-btn" onClick={copy} style={{flex:1}}>
            <Icon n={copied ? 'check' : 'copy'} size={14}/>
            {copied ? 'Copied!' : 'Copy'}
          </button>
          <button className="m-btn primary" onClick={download} style={{flex:1}}>
            <Icon n="dl" size={14}/> Download
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── Peer drawer ─── */
function PeerDrawer({ peer, history, onClose, onAction, toast }) {
  const [busy, setBusy] = useState(false);
  const [copied, setCopied] = useState(null);
  const [dragY, setDragY] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const startYRef = useRef(0);

  const chartSamples = history.length >= 2
    ? history.slice(1).map((s, i) => {
        const dt = (s.ts - history[i].ts) / 1000 || 3;
        return {
          ts: s.ts,
          rx: Math.max(0, (s.bytesIn  - history[i].bytesIn)  / dt),
          tx: Math.max(0, (s.bytesOut - history[i].bytesOut) / dt),
        };
      })
    : [];
  const latest = chartSamples[chartSamples.length - 1] || {};
  const rxBps = latest.rx || 0;
  const txBps = latest.tx || 0;

  const doAction = async (action) => {
    setBusy(true);
    try {
      await onAction(peer.name, action);
      toast(action === 'pause' ? `${peer.name} paused` : `${peer.name} resumed`, 'ok');
    } catch(e) { toast(e.message, 'err'); }
    finally { setBusy(false); }
  };

  const copyText = async (text, key) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(key);
      setTimeout(() => setCopied(null), 2000);
    } catch { toast('Copy failed', 'err'); }
  };

  const onTouchStart = e => {
    startYRef.current = e.touches[0].clientY;
    setIsDragging(true);
  };
  const onTouchMove = e => {
    const dy = Math.max(0, e.touches[0].clientY - startYRef.current);
    setDragY(dy);
  };
  const onTouchEnd = () => {
    setIsDragging(false);
    if (dragY > 80) {
      setDragY(700);
      setTimeout(onClose, 260);
    } else {
      setDragY(0);
    }
  };

  const statusColor = peer.status === 'online' ? 'var(--success)' : peer.status === 'paused' ? 'var(--warn)' : 'var(--muted-2)';
  const statusText  = peer.status === 'online' ? 'connected'     : peer.status === 'paused' ? 'paused'    : 'offline';

  const InfoCell = ({ label, value, mono }) => (
    <div style={{padding:'12px 16px'}}>
      <div style={{fontFamily:'var(--mono)', fontSize:9.5, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:5}}>{label}</div>
      <div style={{fontFamily: mono ? 'var(--mono)' : 'var(--serif)', fontSize: mono ? 13 : 20, color:'var(--ink)', lineHeight:1.2, wordBreak:'break-all'}}>{value}</div>
    </div>
  );

  return (
    <div className="m-modal-scrim" onClick={e => e.target === e.currentTarget && onClose()}>
      <div
        className="m-modal"
        style={{
          padding: 0,
          display: 'flex',
          flexDirection: 'column',
          transform: `translateY(${dragY}px)`,
          transition: isDragging ? 'none' : 'transform 0.28s cubic-bezier(0.2,0.9,0.3,1)',
          touchAction: 'none',
        }}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        {/* Drag handle */}
        <div style={{padding:'10px 0 4px', display:'flex', justifyContent:'center', flexShrink:0, cursor:'grab'}}>
          <div className="m-modal-handle" style={{margin:0}}/>
        </div>

        {/* Body */}
        <div style={{padding:'4px 20px 16px', overflowY:'auto', flex:1}}>

          {/* Header */}
          <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16, marginTop:4}}>
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontFamily:'var(--serif)', fontSize:26, color:'var(--ink)', lineHeight:1.15}}>{peer.name}</div>
              <div style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--muted)', marginTop:3}}>{peer.addr}</div>
            </div>
            <button onClick={onClose} style={{width:38, height:38, borderRadius:10, border:'1px solid var(--border)', background:'var(--bg-2)', display:'grid', placeItems:'center', cursor:'pointer', flexShrink:0, color:'var(--ink-2)', marginLeft:12}}>
              <Icon n="x" size={16}/>
            </button>
          </div>

          <div style={{height:1, background:'var(--border)', margin:'0 -20px 16px'}}/>

          {/* Status row */}
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
            <div style={{display:'flex', alignItems:'center', gap:7}}>
              <span style={{width:8, height:8, borderRadius:'50%', background:statusColor, display:'inline-block', flexShrink:0}}/>
              <span style={{fontFamily:'var(--mono)', fontSize:13, color:statusColor}}>{statusText}</span>
            </div>
            {peer.lastHs && (
              <span style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--muted)'}}>handshake {fmtRel(peer.lastHs)}</span>
            )}
          </div>

          {/* Rate cards */}
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14}}>
            {[['↓ Down', rxBps], ['↑ Up', txBps]].map(([lbl, bps]) => (
              <div key={lbl} style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px'}}>
                <div style={{fontFamily:'var(--mono)', fontSize:9.5, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:6}}>{lbl}</div>
                <div style={{fontFamily:'var(--serif)', fontSize:22, color:'var(--ink)', lineHeight:1}}>{fmtRate(bps)}</div>
              </div>
            ))}
          </div>

          {/* Per-peer throughput chart */}
          {chartSamples.length >= 4 && (
            <div style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:14}}>
              <ThroughputChart samples={chartSamples} height={130} range="3m" spline={true} smoothScroll={false} smoothScale={false}/>
            </div>
          )}

          {/* Info grid */}
          <div style={{border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:16}}>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr'}}>
              <div style={{borderRight:'1px solid var(--border)', ...(peer.endpoint !== '—' ? {borderBottom:'1px solid var(--border)'} : {})}}>
                <InfoCell label="Bytes In"  value={fmtBytes(peer.bytesIn)}/>
              </div>
              <div style={{...(peer.endpoint !== '—' ? {borderBottom:'1px solid var(--border)'} : {})}}>
                <InfoCell label="Bytes Out" value={fmtBytes(peer.bytesOut)}/>
              </div>
              {peer.endpoint !== '—' && (
                <div style={{gridColumn:'1 / -1'}}>
                  <InfoCell label="Endpoint" value={peer.endpoint} mono/>
                </div>
              )}
            </div>
          </div>

          {peer.pubKey && (
            <>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px', gap:12}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontFamily:'var(--mono)', fontSize:9.5, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:4}}>Public Key</div>
                  <div style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{peer.pubKey}</div>
                </div>
                <button onClick={() => copyText(peer.pubKey, 'pubkey')} style={{background:'none', border:'none', color: copied === 'pubkey' ? 'var(--success)' : 'var(--muted)', cursor:'pointer', flexShrink:0, padding:4, display:'grid', placeItems:'center'}}>
                  <Icon n={copied === 'pubkey' ? 'check' : 'copy'} size={16}/>
                </button>
              </div>
            </>
          )}
        </div>

        {/* Footer buttons */}
        <div style={{flexShrink:0, padding:'12px 20px', paddingBottom:'calc(12px + var(--safe-bot))', borderTop:'1px solid var(--border)', display:'flex', gap:10}}>
          <button
            className={`m-btn ${peer.paused ? 'success' : ''}`}
            style={{flex:1, height:52, borderRadius:14, fontSize:15}}
            disabled={busy}
            onClick={() => doAction(peer.paused ? 'resume' : 'pause')}
          >
            <Icon n={peer.paused ? 'play' : 'pause'} size={16}/>
            {peer.paused ? 'Resume' : 'Pause'}
          </button>
          <button
            className="m-btn danger"
            style={{flex:1, height:52, borderRadius:14, fontSize:15}}
            disabled={busy}
            onClick={() => toast('Remove is not available on mobile', 'warn')}
          >
            <Icon n="trash" size={16}/> Remove
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── Session Duration Bars ─── */
function SessionDurationBars({ peers, sessionStarts }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 30000);
    return () => clearInterval(id);
  }, []);

  const online = peers
    .filter(p => p.status === 'online')
    .map(p => ({ ...p, since: sessionStarts[p.name] || now }))
    .sort((a, b) => a.since - b.since);

  if (online.length === 0) {
    return (
      <div style={{padding:'12px 0 4px', textAlign:'center', color:'var(--muted)', fontFamily:'var(--mono)', fontSize:12}}>
        No active sessions
      </div>
    );
  }

  const maxDur = now - online[0].since || 1;
  const shown = online.slice(0, 5);
  const extra = online.length - shown.length;

  return (
    <div style={{display:'flex', flexDirection:'column', gap:10}}>
      {shown.map(p => {
        const pct = Math.max(0.05, (now - p.since) / maxDur);
        return (
          <div key={p.name} style={{display:'flex', alignItems:'center', gap:10}}>
            <span style={{width:7, height:7, borderRadius:'50%', background:'var(--success)', flexShrink:0}}/>
            <div style={{flex:1, minWidth:0}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4}}>
                <span style={{fontSize:12, fontWeight:600, color:'var(--ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', paddingRight:8}}>{p.name}</span>
                <span style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', flexShrink:0}}>{fmtUptime(p.since)}</span>
              </div>
              <div style={{height:3, background:'var(--border)', borderRadius:2}}>
                <div style={{height:'100%', width:`${pct * 100}%`, background:'var(--accent)', borderRadius:2}}/>
              </div>
            </div>
          </div>
        );
      })}
      {extra > 0 && (
        <div style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', textAlign:'right'}}>+{extra} more</div>
      )}
    </div>
  );
}

/* ─── Home peer row ─── */
function HomePeerRow({ peer, spark, onPeerClick }) {
  const initials = peer.name.slice(0,2).toUpperCase();
  const avatarClass = peer.status === 'paused' ? 'paused' : peer.status === 'offline' ? 'offline' : '';
  const gid = `ps${peer.name.replace(/[^a-zA-Z0-9]/g,'')}`;
  const nonZero = (spark || []).some(v => v > 0);
  const maxD = Math.max(...(spark || []), 1);
  const toX = i => (i / Math.max((spark||[]).length - 1, 1)) * 100;
  const toY = v => 46 - (v / maxD) * 40;
  const sparkLine = nonZero
    ? (spark||[]).map((v,i) => `${i===0?'M':'L'} ${toX(i)} ${toY(v)}`).join(' ')
    : '';
  const sparkFill = sparkLine ? `${sparkLine} L 100 50 L 0 50 Z` : '';
  return (
    <div className="m-card" style={{padding:'12px 14px', display:'flex', alignItems:'center', gap:12, cursor:'pointer', WebkitTapHighlightColor:'transparent'}} onClick={() => onPeerClick(peer.name)}>
      <div className={`m-peer-avatar ${avatarClass}`} style={{flexShrink:0}}>{initials}</div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:14, fontWeight:600, color:'var(--ink)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{peer.name}</div>
        <div style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', marginTop:1}}>{peer.addr}</div>
        <div style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', marginTop:2}}>↓ {fmtBytes(peer.bytesIn)} &nbsp;↑ {fmtBytes(peer.bytesOut)}</div>
      </div>
      {sparkLine ? (
        <svg viewBox="0 0 100 50" preserveAspectRatio="none" style={{width:110, height:44, flexShrink:0}}>
          <defs>
            <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3"/>
              <stop offset="100%" stopColor="var(--accent)" stopOpacity="0.02"/>
            </linearGradient>
          </defs>
          <path d={sparkFill} fill={`url(#${gid})`}/>
          <path d={sparkLine} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      ) : <div style={{width:110, height:44, flexShrink:0}}/>}
    </div>
  );
}

/* ─── Peers tab ─── */
function PeersTab({ peers, sparks, onAction, toast, onPeerClick }) {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('all');
  const ref = useRef(null);

  const filtered = useMemo(() => {
    return peers.filter(p => {
      if (filter === 'online' && p.status !== 'online') return false;
      if (filter === 'offline' && p.status === 'online') return false;
      if (q && !p.name.toLowerCase().includes(q.toLowerCase()) && !p.addr.includes(q)) return false;
      return true;
    });
  }, [peers, q, filter]);

  const counts = useMemo(() => ({
    all: peers.length,
    online: peers.filter(p => p.status === 'online').length,
    offline: peers.filter(p => p.status !== 'online').length,
  }), [peers]);

  return (
    <div className="m-scroll-pad">
      <div className="m-search-wrap">
        <div className="m-search">
          <Icon n="search" size={16}/>
          <input
            ref={ref} value={q} onChange={e => setQ(e.target.value)}
            placeholder="Search peers…" type="search"
          />
          {q && (
            <button className="m-search-clear" onClick={() => setQ('')}>
              <Icon n="x" size={15}/>
            </button>
          )}
        </div>
      </div>

      <div className="m-filter-row">
        {[['all','All',counts.all],['online','Online',counts.online],['offline','Offline / Paused',counts.offline]].map(([k,l,c]) => (
          <button key={k} className={`m-filter-pill ${filter===k?'on':''}`} onClick={() => setFilter(k)}>
            {l} {c}
          </button>
        ))}
      </div>

      {peers.length === 0 ? (
        <div className="m-empty">
          <div className="m-empty-title">No peers yet</div>
          <div className="m-empty-sub">Add peers from the desktop dashboard</div>

        <div className="m-peer-list">
          {filtered.map(p => (
            <HomePeerRow key={p.name} peer={p} spark={sparks[p.name] || []} onPeerClick={onPeerClick}/>
          ))}
        </div>
      )}
    </div>
  );
}

function MobileApp() {
  const [authState, setAuthState] = useState('checking'); // checking | login | ok
  const [authRequired, setAuthRequired] = useState(false);
  const [tab, setTab] = useState('home');
  const [theme, setTheme] = useState(() => localStorage.getItem('WG_THEME') || 'light');
  const [accent, setAccent] = useState(() => localStorage.getItem('WG_ACCENT') || 'terracotta');
  const [chartTweaks, setChartTweaks] = useState(() => { try { return JSON.parse(localStorage.getItem('WG_CHART_TWEAKS') || '{}'); } catch { return {}; } });
  const [status, setStatus] = useState(null);
  const [rxBps, setRxBps] = useState(0);
  const [txBps, setTxBps] = useState(0);
  const [trafficSamples, setTrafficSamples] = useState([]);
  const [logs, setLogs] = useState([]);
  const [peers, setPeers] = useState([]);
  const [sessionStarts, setSessionStarts] = useState({});
  const [sparks, setSparks] = useState({});
  const [peerByteHistory, setPeerByteHistory] = useState({});
  const [drawerPeerName, setDrawerPeerName] = useState(null);
  const [svcBusy, setSvcBusy] = useState(false);
  const prevNetRef = useRef(null);
  const prevPeerBytesRef = useRef({});
  const { toasts, add: toast } = useToast();

  /* Theme + accent */
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('WG_THEME', theme);
  }, [theme]);
  useEffect(() => {
    const el = document.documentElement;
    el.className = el.className.replace(/\baccent-\S+/g, '').trim();
    if (accent !== 'terracotta') el.classList.add('accent-' + accent);
    localStorage.setItem('WG_ACCENT', accent);
  }, [accent]);
  useEffect(() => {
    localStorage.setItem('WG_CHART_TWEAKS', JSON.stringify(chartTweaks));
  }, [chartTweaks]);

  /* Auth check */
  useEffect(() => {
    api('/api/auth/check').then(d => {
      setAuthRequired(true);
      setAuthState(d.authenticated ? 'ok' : 'login');
    }).catch(() => setAuthState('ok')); // if no auth required, proceed
  }, []);

  /* Poll /api/status */
  useEffect(() => {
    if (authState !== 'ok') return;
    const fetch = () => {
      api('/api/status').then(s => {
        setStatus(s);
        const net = s.network || {};
        const prev = prevNetRef.current;
        if (prev) {
          const dt = 3;
          setRxBps(Math.max(0, ((net.rx||0) - (prev.rx||0)) / dt));
          setTxBps(Math.max(0, ((net.tx||0) - (prev.tx||0)) / dt));
        }
        prevNetRef.current = net;
        const { issued, live } = s.clients || {};
        const _mapped = mapPeers(issued, live);
        const _now = Date.now();
        setSessionStarts(prev => {
          const next = {};
          _mapped.forEach(p => {
            if (p.status === 'online') next[p.name] = prev[p.name] || _now;
          });
          return next;
        });
        setPeers(_mapped);
        const serverSparks = (s.clients || {}).spark_history || {};
        const prevBytes = prevPeerBytesRef.current;
        const nextBytes = {};
        const deltas = {};
        _mapped.forEach(p => {
          nextBytes[p.name] = { rx: p.bytesIn, tx: p.bytesOut };
          const pr = prevBytes[p.name];
          if (p.status === 'online' && pr !== undefined) {
            deltas[p.name] = Math.max(0, p.bytesIn - pr.rx) + Math.max(0, p.bytesOut - pr.tx);
          }
        });
        prevPeerBytesRef.current = nextBytes;
        setSparks(prev => {
          const out = { ...prev };
          _mapped.forEach(p => {
            const seeded = (serverSparks[p.name] || []).slice(-20);
            const seed = seeded.length ? [...new Array(Math.max(0, 20 - seeded.length)).fill(0), ...seeded] : new Array(20).fill(0);
            const buf = out[p.name] || seed;
            out[p.name] = p.name in deltas ? [...buf.slice(1), deltas[p.name]] : buf;
          });
          return out;
        });
        setPeerByteHistory(prev => {
          const next = {};
          (issued||[]).forEach(iss => {
            const lv = (live||[]).find(l => l.name === iss.name);
            const bytesIn  = lv ? (lv.bytes_recv || 0) : 0;
            const bytesOut = lv ? (lv.bytes_sent || 0) : 0;
            const cutoff = _now - 5 * 60 * 1000;
            next[iss.name] = [...(prev[iss.name] || []).filter(s => s.ts >= cutoff), { ts: _now, bytesIn, bytesOut }];
          });
          return next;
        });
      }).catch(e => {
        if (e.status === 401) setAuthState('login');
      });
    };
    fetch();
    const id = setInterval(fetch, 3000);
    return () => clearInterval(id);
  }, [authState]);

  /* Poll /api/traffic + load history */
  useEffect(() => {
    if (authState !== 'ok') return;
    let cancelled = false;
    api('/api/traffic/history?range=5m&max_points=3000').then(h => {
      if (cancelled) return;
      setTrafficSamples((h.samples || []).map(s => ({
        ts: Number(s.ts) * 1000,
        rx: Math.max(0, Number(s.rx_bps) || 0),
        tx: Math.max(0, Number(s.tx_bps) || 0),
      })));
    }).catch(() => {});
    const poll = () => {
      api('/api/traffic').then(t => {
        if (cancelled) return;
        const sample = {
          ts: Number(t.ts) * 1000,
          rx: Math.max(0, Number(t.rx_bps) || 0),
          tx: Math.max(0, Number(t.tx_bps) || 0),
        };
        setRxBps(sample.rx);
        setTxBps(sample.tx);
        setTrafficSamples(prev => {
          if (prev.length && sample.ts <= prev[prev.length - 1].ts) return prev;
          const cutoff = Date.now() - 5 * 60 * 1000;
          return [...prev.filter(s => s.ts >= cutoff), sample];
        });
      }).catch(() => {});
    };
    poll();
    const id = setInterval(poll, 3000);
    return () => { cancelled = true; clearInterval(id); };
  }, [authState]);

  /* Poll /api/logs */
  useEffect(() => {
    if (authState !== 'ok') return;
    const fetch = () => {
      api('/api/logs?n=100').then(d => setLogs(parseLogs(d.lines))).catch(() => {});
    };
    fetch();
    const id = setInterval(fetch, 8000);
    return () => clearInterval(id);
  }, [authState]);

  /* Service control */
  const handleService = async (action) => {
    setSvcBusy(action);
    try {
      const r = await api('/api/service', { method:'POST', body: JSON.stringify({ action }) });
      if (!r.ok) throw new Error(r.out || 'Failed');
      toast(`Service ${action}ed`, 'ok');
    } catch(e) {
      toast(e.message, 'err');
    } finally {
      setSvcBusy(null);
    }
  };

  /* Peer pause/resume */
  const handlePeerAction = async (name, action) => {
    await api(`/api/users/${encodeURIComponent(name)}/${action}`, { method: 'POST' });
    // Refresh status immediately
    const s = await api('/api/status');
    setStatus(s);
    const { issued, live } = s.clients || {};
    const _mapped = mapPeers(issued, live);
    const _now = Date.now();
    setSessionStarts(prev => {
      const next = {};
      _mapped.forEach(p => { if (p.status === 'online') next[p.name] = prev[p.name] || _now; });
      return next;
    });
    setPeers(_mapped);
  };

  const handleLogout = async () => {
    try { await api('/api/auth/logout', { method: 'POST' }); } catch {}
    setAuthState('login');
  };

  if (authState === 'checking') {
    return (
      <div className="m-app" style={{alignItems:'center', justifyContent:'center'}}>
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:28, animation:'mFadeIn 0.5s cubic-bezier(0.2,0.9,0.3,1) both'}}>
          <div style={{width:56, height:56, borderRadius:16, background:'var(--accent-soft)', color:'var(--accent)', border:'1px solid var(--border)', display:'grid', placeItems:'center'}}>
            <Icon n="shield" size={24}/>
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:16}}>
            <div className="m-spinner-ring"/>
            <div className="m-spinner-label">Connecting</div>
          </div>
        </div>
      </div>
    );
  }
  if (authState === 'login') {
    return <Login onAuth={() => setAuthState('ok')}/>;
  }

  const tabs = [
    { id:'home',     label:'Home',     icon:'home'     },
    { id:'peers',    label:'Peers',    icon:'users'    },
    { id:'logs',     label:'Logs',     icon:'list'     },
    { id:'settings', label:'Settings', icon:'settings' },
  ];

  return (
    <div className="m-app">
      {/* Header */}
      <div className="m-header">
        <div className="m-brand">
          <div className="m-brand-mark">
            <Icon n="shield" size={16}/>
          </div>
          WG-Quick
        </div>
        <div className="m-header-right">
          {status && (
            <div className={`m-status-pill ${status.service?.active ? 'active' : 'inactive'}`}>
              <div className="m-status-dot"/>
              {status.service?.active ? 'Active' : 'Down'}
            </div>
          )}
        </div>
      </div>

      {/* Content */}
      <div className="m-content">
        {tab === 'settings' ? (
          <SettingsTab theme={theme} setTheme={setTheme} accent={accent} setAccent={setAccent} chartTweaks={chartTweaks} setChartTweaks={setChartTweaks} onLogout={authRequired ? handleLogout : null} />
        ) : !status && tab !== 'logs' ? (
          <div className="m-spinner">
            <div className="m-spinner-ring"/>
            <div className="m-spinner-label">Loading</div>
          </div>
        ) : tab === 'home' ? (
          <HomeTab status={status} rxBps={rxBps} txBps={txBps} trafficSamples={trafficSamples} chartTweaks={chartTweaks} onService={handleService} svcBusy={svcBusy} peers={peers} sessionStarts={sessionStarts} sparks={sparks} onSeeAllPeers={() => setTab('peers')} onPeerClick={n => setDrawerPeerName(n)}/>
        ) : tab === 'peers' ? (
          <PeersTab peers={peers} sparks={sparks} onAction={handlePeerAction} toast={toast} onPeerClick={n => setDrawerPeerName(n)}/>
        ) : (
          <LogsTab logs={logs}/>
        )}
      </div>

      {/* Bottom nav */}
      <nav className="m-nav">
        {tabs.map(t => (
          <button key={t.id} className={`m-nav-btn ${tab===t.id?'on':''}`} onClick={() => setTab(t.id)}>
            <Icon n={t.icon} size={22}/>
            {t.label}
          </button>
        ))}
      </nav>

      {drawerPeerName && (() => {
        const dp = peers.find(p => p.name === drawerPeerName);
        return dp ? (
          <PeerDrawer
            peer={dp}
            history={peerByteHistory[dp.name] || []}
            onClose={() => setDrawerPeerName(null)}
            onAction={handlePeerAction}
            toast={toast}
          />
        ) : null;
      })()}

      <Toasts toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MobileApp/>);
{% endraw %}
</script>
</body>
</html>
