<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#F5EEE2" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WG Dashboard" />
<link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.json" />
<title>WG-Quick</title>
<script>
(function () {
  var t = localStorage.getItem('WG_THEME');
  if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
  var mt = document.querySelector('meta[name="theme-color"]');
  if (mt) mt.setAttribute('content', t === 'dark' ? '#14100C' : '#F5EEE2');
  var a = localStorage.getItem('WG_ACCENT');
  if (a && a !== 'terracotta') document.documentElement.classList.add('accent-' + a);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js', { scope: '/' }).catch(function () {});
  }
  function setAppH() {
    var h = (window.visualViewport && window.visualViewport.height >= window.innerHeight)
      ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-h', h + 'px');
  }
  setAppH();
  window.addEventListener('resize', setAppH);
  window.addEventListener('pageshow', setAppH);
  window.addEventListener('orientationchange', function() { setTimeout(setAppH, 300); });
}());
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  color-scheme: light;
  --bg:          #F5EEE2;
  --bg-2:        #EFE7D8;
  --card:        #FBF6EC;
  --card-raised: #FFFCF4;
  --ink:         #2A2520;
  --ink-2:       #4A4238;
  --muted:       #8A7F72;
  --muted-2:     #A89C8C;
  --border:      #E6DCC8;
  --border-strong: #D6C9B0;
  --accent:      oklch(59% 0.15 33);
  --accent-soft: oklch(89% 0.06 33);
  --accent-2:    oklch(55% 0.09 150);
  --success:     oklch(58% 0.12 150);
  --warn:        oklch(68% 0.14 70);
  --danger:      oklch(56% 0.17 25);
  --success-soft: oklch(90% 0.06 150);
  --warn-soft:   oklch(92% 0.07 70);
  --danger-soft: oklch(92% 0.05 25);
  --shadow:      0 1px 3px rgba(80,60,30,0.08), 0 4px 14px rgba(80,60,30,0.06);
  --shadow-sm:   0 1px 2px rgba(80,60,30,0.06);
  --radius:      12px;
  --nav-h:       60px;
  --safe-bot:    env(safe-area-inset-bottom, 0px);
  --safe-top:    env(safe-area-inset-top, 0px);
}
[data-theme="dark"] {
  color-scheme: dark;
  --bg:          #14100C;
  --bg-2:        #1C1611;
  --card:        #241D16;
  --card-raised: #2F2619;
  --ink:         #EFE6D8;
  --ink-2:       #C8BEAE;
  --muted:       #8A7F72;
  --muted-2:     #6B6256;
  --border:      #3A2F24;
  --border-strong: #4D3E2C;
  --accent:      oklch(68% 0.15 33);
  --accent-soft: oklch(32% 0.08 33);
  --accent-2:    oklch(70% 0.10 150);
  --success:     oklch(72% 0.13 150);
  --success-soft: oklch(30% 0.07 150);
  --warn:        oklch(72% 0.14 70);
  --warn-soft:   oklch(32% 0.08 70);
  --danger:      oklch(64% 0.17 25);
  --danger-soft: oklch(30% 0.07 25);
  --shadow:      0 1px 3px rgba(0,0,0,0.5), 0 4px 14px rgba(0,0,0,0.4);
  --shadow-sm:   0 1px 2px rgba(0,0,0,0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
html, body { height: 100%; overscroll-behavior: none; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
#root { height: 100%; display: flex; flex-direction: column; }

/* ── App shell ── */
.m-app { display: flex; flex-direction: column; height: var(--app-h, 100vh); background: var(--bg); }
@supports (height: 100dvh) {
  .m-app { height: 100dvh; }
}
.m-header {
  flex-shrink: 0;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.m-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--serif); font-size: 20px; color: var(--ink); line-height: 1;
}
.m-brand-mark {
  width: 32px; height: 32px;
  background: var(--accent-soft); color: var(--accent);
  border: 1px solid var(--border); border-radius: 8px;
  display: grid; place-items: center; flex-shrink: 0;
}
.m-status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 99px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
}
.m-status-pill.active   { background: var(--success-soft); color: var(--success); }
.m-status-pill.inactive { background: var(--danger-soft);  color: var(--danger); }
.m-status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.m-status-pill.active .m-status-dot { animation: mpulse 1.8s infinite; }
@keyframes mpulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.m-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.m-icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--card); border: 1px solid var(--border);
  display: grid; place-items: center; cursor: pointer; color: var(--ink-2);
  -webkit-tap-highlight-color: transparent;
}
.m-icon-btn:active { background: var(--bg-2); }

.m-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  position: relative;
}
.m-ptr {
  position: absolute; top: -44px; left: 50%;
  transform: translate(-50%, 0);
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--card-raised); border: 1px solid var(--border);
  box-shadow: var(--shadow);
  display: grid; place-items: center;
  color: var(--accent); opacity: 0;
  z-index: 5; pointer-events: none;
  will-change: transform, opacity;
}
.m-ptr.spin svg { animation: spin 0.8s linear infinite; }
.m-scroll-pad { padding-bottom: calc(var(--nav-h) + var(--safe-bot) + 16px); }

/* ── Bottom nav ── */
.m-nav {
  flex-shrink: 0;
  display: flex;
  height: calc(var(--nav-h) + var(--safe-bot));
  padding-bottom: var(--safe-bot);
  background: var(--card);
  border-top: 1px solid var(--border);
}
.m-nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: none; cursor: pointer; color: var(--muted);
  font-family: var(--sans); font-size: 10px; font-weight: 500; letter-spacing: 0.02em;
  -webkit-tap-highlight-color: transparent; transition: color 0.15s;
  position: relative;
}
.m-nav-btn.on { color: var(--accent); }
.m-nav-btn svg { width: 22px; height: 22px; stroke: currentColor; }
.m-nav-dot {
  position: absolute; top: 8px; left: calc(50% + 8px);
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); border: 1.5px solid var(--card);
}

/* ── Cards ── */
.m-section { padding: 0px 14px 0; }
.m-section:last-child { padding-bottom: 0; }
.m-section-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 8px;
}
.m-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden;
}
.m-card + .m-card { margin-top: 10px; }

/* ── Service card ── */
.m-svc-card { padding: 16px; }
.m-svc-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.m-svc-info { flex: 1; min-width: 0; }
.m-svc-name { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.m-svc-uptime { font-size: 13px; color: var(--ink-2); margin-top: 2px; }
.m-btn {
  flex: 1; height: 38px; border-radius: 9px; border: 1px solid var(--border);
  background: var(--bg-2); color: var(--ink); font-family: var(--sans);
  font-size: 13px; font-weight: 500; cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 6px;
  -webkit-tap-highlight-color: transparent; transition: background 0.1s;
}
.m-btn:active { background: var(--border); }
.m-btn:disabled { opacity: 0.4; pointer-events: none; }
.m-btn.danger { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger) 25%, var(--border)); color: var(--danger); }
.m-btn.success { background: var(--success-soft); border-color: color-mix(in oklab, var(--success) 25%, var(--border)); color: var(--success); }
.m-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* ── Stat grid ── */
.m-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.m-stat-card { padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
.m-stat-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.m-stat-val { font-family: var(--serif); font-size: 30px; color: var(--ink); letter-spacing: -0.02em; line-height: 1; margin-top: 6px; }
.m-stat-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Traffic chart card ── */
.m-traffic-card { padding: 16px 16px 0; overflow: hidden; }
.m-traffic-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.m-traffic-total { display: flex; align-items: baseline; gap: 5px; margin-bottom: 10px; }
.m-traffic-big { font-family: var(--serif); font-size: 42px; letter-spacing: -0.02em; color: var(--ink); font-weight: 400; line-height: 1; font-variant-numeric: tabular-nums; }
.m-traffic-unit { font-family: var(--mono); font-size: 13px; color: var(--muted); }
.m-traffic-breakdown { display: flex; gap: 18px; margin-bottom: 10px; }
.m-legend-item { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
.m-legend-sq { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.m-range-badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; color: var(--success); }

/* ── Budget bar ── */
.m-budget-card { padding: 16px; }
.m-budget-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.m-budget-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.m-budget-pct { font-family: var(--mono); font-size: 13px; color: var(--muted); }
.m-budget-bar-bg { height: 8px; background: var(--bg-2); border-radius: 4px; border: 1px solid var(--border); overflow: hidden; }
.m-budget-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease, background 0.3s; }
.m-budget-foot { display: flex; justify-content: space-between; margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* ── Peers ── */
.m-search-wrap {
  padding: 12px 14px 8px; position: sticky; top: 0; z-index: 2;
  background: var(--bg);
}
.m-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 0 12px; height: 40px;
  box-shadow: var(--shadow-sm);
}
.m-search svg { flex-shrink: 0; color: var(--muted); }
.m-search input {
  flex: 1; border: none; background: none; outline: none;
  font-family: var(--sans); font-size: 16px; color: var(--ink);
}
.m-search input::placeholder { color: var(--muted); }
.m-search-clear { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px; display: grid; place-items: center; }

.m-peer-list { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
.m-peer-avatar {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
}
.m-peer-avatar.offline { background: var(--border); color: var(--muted); }
.m-peer-avatar.paused { background: var(--warn-soft); color: var(--warn); }
.m-peer-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.m-peer-status-dot.online { background: var(--success); }
.m-peer-status-dot.offline { background: var(--muted-2); }
.m-peer-status-dot.paused { background: var(--warn); animation: mpulse 1.4s steps(1) infinite; }

/* ── Swipeable peer rows ── */
.m-swipe-wrap { position: relative; border-radius: var(--radius); overflow: hidden; }
.m-swipe-actions {
  position: absolute; top: 0; bottom: 0; right: 0;
  display: flex; align-items: stretch;
  opacity: 0; /* shown imperatively while swiping/open, else it peeks through the card's rounded corners */
}
.m-swipe-btn {
  width: 76px; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  font-family: var(--sans); font-size: 10.5px; font-weight: 600;
  -webkit-tap-highlight-color: transparent;
}
.m-swipe-btn.qr     { background: var(--accent-soft);  color: var(--accent); }
.m-swipe-btn.pause  { background: var(--warn-soft);    color: var(--warn); }
.m-swipe-btn.resume { background: var(--success-soft); color: var(--success); }
.m-swipe-row {
  position: relative; z-index: 1;
  touch-action: pan-y;
  -webkit-user-select: none; user-select: none;
}

/* ── Sheets (bottom drawers) ── */
.m-sheet-wrap {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: flex-end;
}
.m-sheet-scrim {
  position: absolute; inset: 0;
  background: rgba(20,15,10,0.5);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  animation: scrimIn 0.22s ease;
}
@keyframes scrimIn { from { opacity: 0; } to { opacity: 1; } }
.m-sheet {
  position: relative;
  width: 100%; background: var(--card); border-radius: 20px 20px 0 0;
  border: 1px solid var(--border); border-bottom: none;
  max-height: 92dvh; display: flex; flex-direction: column;
  animation: slideUp 0.3s cubic-bezier(0.2,0.9,0.3,1);
  will-change: transform;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.m-modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; }
.m-sheet-grab { padding: 10px 0 4px; display: flex; justify-content: center; flex-shrink: 0; }
.m-sheet-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 4px 20px 12px; flex-shrink: 0; gap: 12px; }
.m-sheet-title { font-family: var(--serif); font-size: 24px; color: var(--ink); line-height: 1.15; word-break: break-word; }
.m-sheet-sub { font-family: var(--mono); font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.m-sheet-x {
  width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg-2); display: grid; place-items: center; cursor: pointer;
  color: var(--ink-2); flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
.m-sheet-body { padding: 0 20px 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; min-height: 0; }
.m-sheet-foot {
  flex-shrink: 0; padding: 12px 20px calc(12px + var(--safe-bot));
  border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--card);
}
.m-sheet-foot .m-btn { height: 48px; border-radius: 12px; font-size: 14px; }
.m-sheet-divider { height: 1px; background: var(--border); margin: 16px -20px; }

/* ── Forms ── */
.m-field { margin-bottom: 14px; }
.m-flabel {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
}
.m-input {
  width: 100%; padding: 11px 13px; border: 1px solid var(--border);
  border-radius: 10px; background: var(--bg-2); color: var(--ink);
  font-family: var(--sans); font-size: 16px; outline: none;
  transition: border-color 0.15s; -webkit-appearance: none; appearance: none;
}
.m-input:focus { border-color: var(--accent); }
.m-input.mono { font-family: var(--mono); font-size: 14px; }
.m-input:disabled { opacity: 0.5; }
select.m-input { background-image: none; }
.m-hint { font-size: 11.5px; color: var(--muted); margin-top: 5px; line-height: 1.45; }
.m-err-text { font-size: 12px; color: var(--danger); margin-top: 5px; }
.m-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.m-chip {
  padding: 7px 13px; border-radius: 99px; border: 1px solid var(--border);
  background: var(--bg-2); font-family: var(--sans); font-size: 12.5px; color: var(--ink-2);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  display: inline-flex; align-items: center; gap: 6px;
}
.m-chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.m-chip:disabled { opacity: 0.4; pointer-events: none; }

/* ── Row lists (settings-style) ── */
.m-row-btn {
  display: flex; align-items: center; gap: 12px; width: 100%;
  padding: 13px 16px; background: none; border: none; cursor: pointer;
  text-align: left; -webkit-tap-highlight-color: transparent;
  color: var(--ink); font-family: var(--sans); font-size: 14px;
}
.m-row-btn:active { background: var(--bg-2); }
.m-row-btn + .m-row-btn { border-top: 1px solid var(--border); }
.m-row-ic {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center; flex-shrink: 0;
}
.m-row-main { flex: 1; min-width: 0; }
.m-row-title { font-size: 14px; font-weight: 500; color: var(--ink); }
.m-row-sub { font-size: 11.5px; color: var(--muted); margin-top: 1px; font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.m-row-chev { color: var(--muted-2); flex-shrink: 0; }
.m-badge {
  font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 99px;
  background: var(--accent-soft); color: var(--accent); flex-shrink: 0;
}
.m-badge.warn { background: var(--warn-soft); color: var(--warn); }
.m-badge.ok { background: var(--success-soft); color: var(--success); }
.m-badge.err { background: var(--danger-soft); color: var(--danger); }

/* ── Checklist ── */
.m-check-row {
  display: flex; align-items: center; gap: 10px; padding: 11px 0;
  border-bottom: 1px solid var(--border); font-size: 13px; color: var(--ink);
}
.m-check-row:last-child { border-bottom: none; }
.m-check-ic { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }
.m-check-ic.ok   { background: var(--success-soft); color: var(--success); }
.m-check-ic.bad  { background: var(--danger-soft); color: var(--danger); }
.m-check-ic.warn { background: var(--warn-soft); color: var(--warn); }
.m-check-val { margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: right; word-break: break-all; }

/* ── Port check (Network & firewall) ── */
.m-pc-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 10px; }
.m-pc-count { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
.m-pc-rerun {
  background: none; border: none; padding: 0; cursor: pointer;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--accent); -webkit-tap-highlight-color: transparent;
}
.m-pc-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.m-pc-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.35s ease; }
.m-check-row.pending { color: var(--muted); }
.m-check-ic.idle { background: var(--bg-2); border: 1px solid var(--border); }

.m-confirm-scrim {

}
.m-confirm {
  width: 100%; max-width: 340px; background: var(--card-raised);

.m-confirm-title { font-family: var(--serif); font-size: 21px; color: var(--ink); margin-bottom: 8px; }
.m-confirm-body { font-size: 13px; color: var(--ink-2); line-height: 1.55; margin-bottom: 18px; }
.m-confirm-btns { display: flex; gap: 8px; }
.m-confirm-btns .m-btn { height: 44px; border-radius: 11px; }

/* ── QR ── */
.m-qr-wrap { display: flex; justify-content: center; padding: 16px 0 6px; }
.m-qr-box { background: #ffffff; padding: 14px; border-radius: 14px; border: 1px solid var(--border); line-height: 0; }

.m-prog { height: 8px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.m-prog-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

.m-stepper {
  display: inline-flex; align-items: center; border: 1px solid var(--border);
  border-radius: 10px; background: var(--bg-2); overflow: hidden;
}
.m-stepper button {
  width: 42px; height: 42px; border: none; background: none; color: var(--ink);

}

.m-stepper input {

  font-family: var(--mono); font-size: 16px; color: var(--ink);

/* ─── Toast ─── */
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='ok', dur=3000) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), dur);
  }, []);
  return { toasts, add };
}
function Toasts({ toasts }) {
  const icons = { ok:'✓', err:'✕', warn:'⚠' };
  return (
    <div className="m-toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`m-toast ${t.type}`}>
          <span className="m-toast-icon">{icons[t.type]}</span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

/* ─── Login ─── */
function Login({ onAuth }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);
  const submit = async e => {
    e.preventDefault();
    setBusy(true); setErr('');
    try {
      await api('/api/auth/login', { method:'POST', body: JSON.stringify({ password: pw }) });
      onAuth();
    } catch (_) {
      setErr('Wrong password');
    } finally {
      setBusy(false);
    }
  };
  return (
    <div className="m-login">
      <div className="m-login-card">
        <div className="m-login-title">WG-Quick</div>
        <div className="m-login-sub">Enter your password to login</div>
        <form onSubmit={submit}>
          <input
            className="m-login-input" type="password" placeholder="Password"
            value={pw} onChange={e => setPw(e.target.value)} autoFocus
          />
          {err && <div className="m-login-err">{err}</div>}
          <button className="m-login-btn" disabled={busy || !pw}>
            {busy ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
      </div>
    </div>
  );
}

/* ─── Generic bottom sheet ─── */
function Sheet({ title, sub, onClose, children, footer, headerExtra }) {
  const sheetRef = useRef(null);
  const scrimRef = useRef(null);
  const drag = useRef({ active: false, closing: false, startY: 0, y: 0, lastY: 0, lastT: 0, vel: 0, raf: 0 });

  // Drag visuals are written straight to the DOM (rAF-batched) so touchmove
  // never re-renders the sheet contents.
  const paint = () => {
    const d = drag.current, sheet = sheetRef.current, scrim = scrimRef.current;
    d.raf = 0;
    if (!sheet) return;
    sheet.style.transform = `translate3d(0, ${d.y}px, 0)`;
    if (scrim) scrim.style.opacity = String(Math.min(1, Math.max(0, 1 - d.y / (sheet.offsetHeight || 1))));
  };

  const animateClose = () => {
    const d = drag.current;
    if (d.closing) return;
    d.closing = true;
    const sheet = sheetRef.current, scrim = scrimRef.current;
    const h = sheet ? sheet.offsetHeight : 700;
    if (sheet) {
      sheet.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
      sheet.style.transform = `translate3d(0, ${h + 24}px, 0)`;
    }
    if (scrim) {
      scrim.style.transition = 'opacity 0.3s ease';
      scrim.style.opacity = '0';
    }
    setTimeout(onClose, 300);
  };

  const onTouchStart = e => {
    const d = drag.current;
    if (d.closing) return;
    d.active = true;
    d.startY = d.lastY = e.touches[0].clientY;
    d.lastT = e.timeStamp; d.y = 0; d.vel = 0;
    if (sheetRef.current) sheetRef.current.style.transition = 'none';
    if (scrimRef.current) scrimRef.current.style.transition = 'none';
  };

  const onTouchMove = e => {
    const d = drag.current;
    if (!d.active || d.closing) return;
    const cy = e.touches[0].clientY;
    const dt = e.timeStamp - d.lastT;
    if (dt > 0) d.vel = (cy - d.lastY) / dt;
    d.lastY = cy; d.lastT = e.timeStamp;
    d.y = Math.max(0, cy - d.startY);
    if (!d.raf) d.raf = requestAnimationFrame(paint);
  };

  const onTouchEnd = () => {
    const d = drag.current;
    if (!d.active || d.closing) return;
    d.active = false;
    if (d.raf) { cancelAnimationFrame(d.raf); paint(); }
    const h = sheetRef.current ? sheetRef.current.offsetHeight : 700;
    if (d.y > h * 0.35 || (d.vel > 0.55 && d.y > 30)) { animateClose(); return; }
    d.y = 0;
    if (sheetRef.current) {
      sheetRef.current.style.transition = 'transform 0.32s cubic-bezier(0.2,0.9,0.3,1)';
      sheetRef.current.style.transform = 'translate3d(0, 0, 0)';
    }
    if (scrimRef.current) {
      scrimRef.current.style.transition = 'opacity 0.25s ease';
      scrimRef.current.style.opacity = '1';
    }
  };

  return (
    <div className="m-sheet-wrap">
      <div className="m-sheet-scrim" ref={scrimRef} onClick={animateClose}/>
      <div className="m-sheet" ref={sheetRef}>
        <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onTouchCancel={onTouchEnd} style={{touchAction:'none', flexShrink:0, cursor:'grab'}}>
          <div className="m-sheet-grab"><div className="m-modal-handle"/></div>
          <div className="m-sheet-head">
            <div style={{flex:1, minWidth:0}}>
              <div className="m-sheet-title">{title}</div>
              {sub && <div className="m-sheet-sub">{sub}</div>}
            </div>
            {headerExtra}
            <button className="m-sheet-x" onClick={animateClose}><Icon n="x" size={16}/></button>
          </div>
        </div>
        <div className="m-sheet-body">{children}</div>
        {footer && <div className="m-sheet-foot">{footer}</div>}
      </div>
    </div>
  );
}

function Stepper({ value, onChange, min=1, max=100000, step=5 }) {
  const clamp = v => Math.max(min, Math.min(max, v));
  return (
    <div className="m-stepper">
      <button onClick={() => onChange(clamp((parseInt(value,10)||min) - step))}>−</button>
      <input
        type="number" inputMode="numeric" value={value}
        onChange={e => onChange(e.target.value)}
        onBlur={e => onChange(clamp(parseInt(e.target.value,10) || min))}
      />
      <button onClick={() => onChange(clamp((parseInt(value,10)||min) + step))}>+</button>
    </div>
  );
}

/* ─── QR code (QRious) ─── */
function QRCanvas({ text, size=224 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.QRious && text) {
      try {
        new QRious({
          element: ref.current, value: text, size: size * 2,
          level: 'M', background: '#ffffff', foreground: '#141008', padding: 0,
        });
      } catch (_) {}
    }
  }, [text, size]);
  return <canvas ref={ref} style={{width:size, height:size}}/>;
}
