/* ─── Root app ─── */
function MobileApp() {
  const [authState, setAuthState] = useState('checking'); // checking | login | ok
  const [authRequired, setAuthRequired] = useState(false);
  const [tab, setTab] = useState('home');
  const [theme, setTheme] = useState(() => localStorage.getItem('WG_THEME') || 'light');
  const [accent, setAccent] = useState(() => localStorage.getItem('WG_ACCENT') || 'terracotta');
  const [chartTweaks, setChartTweaks] = useState(() => { try { return JSON.parse(localStorage.getItem('WG_CHART_TWEAKS') || '{}'); } catch { return {}; } });
  const [status, setStatus] = useState(null);
  const [rxBps, setRxBps] = useState(0);
  const [txBps, setTxBps] = useState(0);
  const [trafficSamples, setTrafficSamples] = useState([]);
  const [peers, setPeers] = useState([]);
  const [sparks, setSparks] = useState({});
  const [peerByteHistory, setPeerByteHistory] = useState({});
  const [svcBusy, setSvcBusy] = useState(null);
  const [updateInfo, setUpdateInfo] = useState(null);

  /* Sheets */
  const [drawerPeerName, setDrawerPeerName] = useState(null);
  const [cfgPeerName, setCfgPeerName] = useState(null);
  const [editPeerName, setEditPeerName] = useState(null);
  const [addOpen, setAddOpen] = useState(false);
  const [sheet, setSheet] = useState(null); // budget | dyndns | network | update | password
  const [confirm, setConfirm] = useState(null);
  const [confirmBusy, setConfirmBusy] = useState(false);

  const prevNetRef = useRef(null);
  const prevPeerBytesRef = useRef({});
  const contentRef = useRef(null);
  const ptrRef = useRef(null);
  const { toasts, add: toast } = useToast();

  /* Theme + accent */
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('WG_THEME', theme);
    const mt = document.querySelector('meta[name="theme-color"]');
    if (mt) mt.setAttribute('content', theme === 'dark' ? '#14100C' : '#F5EEE2');
  }, [theme]);
  useEffect(() => {
    const el = document.documentElement;
    el.className = el.className.replace(/\baccent-\S+/g, '').trim();
    if (accent !== 'terracotta') el.classList.add('accent-' + accent);
    localStorage.setItem('WG_ACCENT', accent);
  }, [accent]);
  useEffect(() => {
    localStorage.setItem('WG_CHART_TWEAKS', JSON.stringify(chartTweaks));
  }, [chartTweaks]);

  /* Auth check */
  useEffect(() => {
    api('/api/auth/check').then(d => {
      setAuthRequired(true);
      setAuthState(d.authenticated ? 'ok' : 'login');
    }).catch(() => setAuthState('ok')); // if no auth required, proceed
  }, []);

  /* Apply a /api/status payload to all derived state */
  const applyStatus = useCallback((s) => {
    setStatus(s);
    const net = s.network || {};
    const prev = prevNetRef.current;
    if (prev) {
      const dt = 3;
      setRxBps(Math.max(0, ((net.rx||0) - (prev.rx||0)) / dt));
      setTxBps(Math.max(0, ((net.tx||0) - (prev.tx||0)) / dt));
    }
    prevNetRef.current = net;
    const { issued, live } = s.clients || {};
    const _mapped = mapPeers(issued, live);
    const _now = Date.now();
    setPeers(_mapped);
    const serverSparks = (s.clients || {}).spark_history || {};
    const prevBytes = prevPeerBytesRef.current;
    const nextBytes = {};
    const deltas = {};
    _mapped.forEach(p => {
      nextBytes[p.name] = { rx: p.bytesIn, tx: p.bytesOut };
      const pr = prevBytes[p.name];
      if (p.status === 'online' && pr !== undefined) {
        deltas[p.name] = Math.max(0, p.bytesIn - pr.rx) + Math.max(0, p.bytesOut - pr.tx);
      }
    });
    prevPeerBytesRef.current = nextBytes;
    setSparks(prev => {
      const out = { ...prev };
      _mapped.forEach(p => {
        const seeded = (serverSparks[p.name] || []).slice(-20);
        const seed = seeded.length ? [...new Array(Math.max(0, 20 - seeded.length)).fill(0), ...seeded] : new Array(20).fill(0);
        const buf = out[p.name] || seed;
        out[p.name] = p.name in deltas ? [...buf.slice(1), deltas[p.name]] : buf;
      });
      return out;
    });
    setPeerByteHistory(prev => {
      const next = {};
      (issued||[]).forEach(iss => {
        const lv = (live||[]).find(l => l.name === iss.name);
        const bytesIn  = lv ? (lv.bytes_recv || 0) : 0;
        const bytesOut = lv ? (lv.bytes_sent || 0) : 0;
        const cutoff = _now - 5 * 60 * 1000;
        next[iss.name] = [...(prev[iss.name] || []).filter(s => s.ts >= cutoff), { ts: _now, bytesIn, bytesOut }];
      });
      return next;
    });
  }, []);

  const refreshStatus = useCallback(() => {
    return api('/api/status').then(applyStatus).catch(e => {
      if (e.status === 401) setAuthState('login');
    });
  }, [applyStatus]);

  /* Poll /api/status */
  useEffect(() => {
    if (authState !== 'ok') return;
    refreshStatus();
    const id = setInterval(refreshStatus, 3000);
    return () => clearInterval(id);
  }, [authState, refreshStatus]);

  /* Poll /api/traffic + load history */
  useEffect(() => {
    if (authState !== 'ok') return;
    let cancelled = false;
    api('/api/traffic/history?range=5m&max_points=3000').then(h => {
      if (cancelled) return;
      setTrafficSamples((h.samples || []).map(s => ({
        ts: Number(s.ts) * 1000,
        rx: Math.max(0, Number(s.rx_bps) || 0),
        tx: Math.max(0, Number(s.tx_bps) || 0),
      })));
    }).catch(() => {});
    const poll = () => {
      api('/api/traffic').then(t => {
        if (cancelled) return;
        const sample = {
          ts: Number(t.ts) * 1000,
          rx: Math.max(0, Number(t.rx_bps) || 0),
          tx: Math.max(0, Number(t.tx_bps) || 0),
        };
        setRxBps(sample.rx);
        setTxBps(sample.tx);
        setTrafficSamples(prev => {
          if (prev.length && sample.ts <= prev[prev.length - 1].ts) return prev;
          const cutoff = Date.now() - 5 * 60 * 1000;
          return [...prev.filter(s => s.ts >= cutoff), sample];
        });
      }).catch(() => {});
    };
    poll();
    const id = setInterval(poll, 3000);
    return () => { cancelled = true; clearInterval(id); };
  }, [authState]);

  /* Update check (once per session) */
  useEffect(() => {
    if (authState !== 'ok') return;
    const dev = localStorage.getItem('WG_DEV_UPDATES') === '1';
    api(`/api/update/check${dev ? '?dev=1' : ''}`).then(setUpdateInfo).catch(() => {});
  }, [authState]);

  /* Pull-to-refresh (Home & Peers tabs) */
  const ptrEnabled = tab === 'home' || tab === 'peers';
  useEffect(() => {
    const el = contentRef.current;
    if (authState !== 'ok' || !ptrEnabled || !el) return;
    const TRIGGER = 58;   // pull distance (after damping) that fires a refresh
    const REST = 52;      // where the spinner parks while refreshing
    let startY = 0, startX = 0, pull = 0, dir = null, armed = false, busy = false;

    const paint = (animate) => {
      const ind = ptrRef.current;
      if (!ind) return;
      ind.style.transition = animate ? 'transform 0.3s cubic-bezier(0.2,0.9,0.3,1), opacity 0.3s ease' : 'none';
      ind.style.opacity = String(Math.min(1, pull / TRIGGER));
      ind.style.transform = `translate(-50%, ${pull}px) rotate(${pull * 2.2}deg)`;
    };
    const reset = (animate) => {
      pull = 0;
      paint(animate);
      ptrRef.current && ptrRef.current.classList.remove('spin');
    };

    const onStart = (e) => {
      if (busy) return;
      armed = el.scrollTop <= 0;
      dir = null;
      startY = e.touches[0].clientY;
      startX = e.touches[0].clientX;
    };
    const onMove = (e) => {
      if (busy || !armed) return;
      if (el.scrollTop > 0) { armed = false; reset(false); return; }
      const dy = e.touches[0].clientY - startY;
      const dx = e.touches[0].clientX - startX;
      if (!dir) {
        if (Math.abs(dy) < 8 && Math.abs(dx) < 8) return;
        dir = Math.abs(dy) > Math.abs(dx) ? 'v' : 'h';
        if (dir === 'h') { armed = false; return; }
      }
      if (dy <= 0) { pull = 0; paint(false); return; }
      if (e.cancelable) e.preventDefault();
      pull = Math.min(90, dy * 0.45);
      paint(false);
    };
    const onEnd = () => {
      if (busy || !armed) return;
      armed = false;
      if (dir !== 'v') return;
      if (pull >= TRIGGER) {
        busy = true;
        pull = REST;
        ptrRef.current && ptrRef.current.classList.add('spin');
        paint(true);
        const started = Date.now();
        Promise.resolve(refreshStatus()).catch(() => {}).then(() => {
          const wait = Math.max(0, 500 - (Date.now() - started));
          setTimeout(() => { busy = false; reset(true); }, wait);
        });
      } else {
        reset(true);
      }
    };

    el.addEventListener('touchstart', onStart, { passive: true });
    el.addEventListener('touchmove', onMove, { passive: false });
    el.addEventListener('touchend', onEnd);
    el.addEventListener('touchcancel', onEnd);
    return () => {
      el.removeEventListener('touchstart', onStart);
      el.removeEventListener('touchmove', onMove);
      el.removeEventListener('touchend', onEnd);
      el.removeEventListener('touchcancel', onEnd);
      reset(false);
    };
  }, [authState, ptrEnabled, refreshStatus]);

  /* Service control */
  const svcMsg = { start: 'started', stop: 'stopped', restart: 'restarted', reload: 'config reloaded' };
  const handleService = async (action) => {
    setSvcBusy(action);
    try {
      const r = await api('/api/service', { method:'POST', body: JSON.stringify({ action }) });
      if (!r.ok) throw new Error(r.out || 'Failed');
      toast(`Service ${svcMsg[action] || action}`, 'ok');
      await refreshStatus();
    } catch(e) {
      toast(e.message, 'err');
    } finally {
      setSvcBusy(null);
    }
  };

  /* Peer pause/resume */
  const handlePeerAction = async (name, action) => {
    await api(`/api/users/${encodeURIComponent(name)}/${action}`, { method: 'POST' });
    await refreshStatus();
  };

  /* Same, but self-contained with toasts (used by swipe actions) */
  const quickPeerAction = async (name, action) => {
    try {
      await handlePeerAction(name, action);
      toast(action === 'pause' ? `${name} paused` : `${name} resumed`, 'ok');
    } catch(e) {
      toast(e.message, 'err');
    }
  };

  /* Peer revoke (with confirm) */
  const askRemovePeer = (name) => {
    setConfirm({
      title: `Remove ${name}?`,
      body: 'This permanently deletes the peer and its keys. Devices using this config will lose access immediately.',
      label: 'Remove peer',
      danger: true,
      action: async () => {
        await api(`/api/users/${encodeURIComponent(name)}/revoke`, { method: 'POST' });
        toast(`Peer '${name}' removed`, 'ok');
        setDrawerPeerName(null);
        setEditPeerName(null);
        setCfgPeerName(null);
        await refreshStatus();
      },
    });
  };

  const askConfirm = (opts) => setConfirm(opts);
  const runConfirm = async () => {
    if (!confirm) return;
    setConfirmBusy(true);
    try {
      await confirm.action();
      setConfirm(null);
    } catch(e) {
      toast(e.message, 'err');
    } finally {
      setConfirmBusy(false);
    }
  };

  const handleLogout = async () => {
    try { await api('/api/auth/logout', { method: 'POST' }); } catch {}
    setAuthState('login');
  };

  if (authState === 'checking') {
    return (
      <div className="m-app" style={{alignItems:'center', justifyContent:'center'}}>
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:28, animation:'mFadeIn 0.5s cubic-bezier(0.2,0.9,0.3,1) both'}}>
          <div style={{width:56, height:56, borderRadius:16, background:'var(--accent-soft)', color:'var(--accent)', border:'1px solid var(--border)', display:'grid', placeItems:'center'}}>
            <Icon n="shield" size={24}/>
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:16}}>
            <div className="m-spinner-ring"/>
            <div className="m-spinner-label">Connecting</div>
          </div>
        </div>
      </div>
    );
  }
  if (authState === 'login') {
    return <Login onAuth={() => setAuthState('ok')}/>;
  }

  const tabs = [
    { id:'home',     label:'Home',     icon:'home'     },
    { id:'peers',    label:'Peers',    icon:'users'    },
    { id:'logs',     label:'Logs',     icon:'list'     },
    { id:'settings', label:'Settings', icon:'settings' },
  ];

  const drawerPeer = drawerPeerName ? peers.find(p => p.name === drawerPeerName) : null;
  const editPeer   = editPeerName   ? peers.find(p => p.name === editPeerName)   : null;

  return (
    <div className="m-app">
      {/* Header */}
      <div className="m-header">
        <div className="m-brand">
          <div className="m-brand-mark">
            <Icon n="shield" size={16}/>
          </div>
          WG-Quick
        </div>
        <div className="m-header-right">
          {status && (
            <div className={`m-status-pill ${status.service?.active ? 'active' : 'inactive'}`}>
              <div className="m-status-dot"/>
              {status.service?.active ? 'Active' : 'Down'}
            </div>
          )}
        </div>
      </div>

      {/* Content */}
      <div className="m-content" ref={contentRef}>
        {ptrEnabled && (
          <div className="m-ptr" ref={ptrRef} aria-hidden="true">
            <Icon n="refresh" size={16}/>
          </div>
        )}
        {tab === 'settings' ? (
          <SettingsTab
            theme={theme} setTheme={setTheme}
            accent={accent} setAccent={setAccent}
            chartTweaks={chartTweaks} setChartTweaks={setChartTweaks}
            onLogout={authRequired ? handleLogout : null}
            status={status} updateInfo={updateInfo}
            openSheet={setSheet} onService={handleService}
            askConfirm={askConfirm} svcBusy={svcBusy}
          />
        ) : tab === 'logs' ? (
          <LogsTab toast={toast}/>
        ) : !status ? (
          <div className="m-spinner">
            <div className="m-spinner-ring"/>
            <div className="m-spinner-label">Loading</div>
          </div>
        ) : tab === 'home' ? (
          <HomeTab
            status={status} rxBps={rxBps} txBps={txBps}
            trafficSamples={trafficSamples} chartTweaks={chartTweaks}
            onService={handleService} svcBusy={svcBusy}
            peers={peers} sparks={sparks}
            onSeeAllPeers={() => setTab('peers')}
            onPeerClick={n => setDrawerPeerName(n)}
            onPeerAction={quickPeerAction}
            onPeerConfig={n => setCfgPeerName(n)}
            onOpenBudget={() => setSheet('budget')}
            onRestart={() => askConfirm({
              title: 'Restart WireGuard?',
              body: 'Connected peers will briefly disconnect and reconnect automatically.',
              label: 'Restart',
              action: async () => { await handleService('restart'); },
            })}
          />
        ) : (
          <PeersTab
            peers={peers} sparks={sparks}
            onPeerClick={n => setDrawerPeerName(n)}
            onPeerAction={quickPeerAction}
            onPeerConfig={n => setCfgPeerName(n)}
            onAddPeer={() => setAddOpen(true)}
          />
        )}
      </div>

      {/* FAB — add peer */}
      {tab === 'peers' && !addOpen && (
        <button className="m-fab" onClick={() => setAddOpen(true)} aria-label="Add peer">
          <Icon n="plus" size={24}/>
        </button>
      )}

      {/* Bottom nav */}
      <nav className="m-nav">
        {tabs.map(t => (
          <button key={t.id} className={`m-nav-btn ${tab===t.id?'on':''}`} onClick={() => setTab(t.id)}>
            <Icon n={t.icon} size={22}/>
            {t.label}
            {t.id === 'settings' && updateInfo?.available && <span className="m-nav-dot"/>}
          </button>
        ))}
      </nav>

      {/* ── Sheets ── */}
      {drawerPeer && (
        <PeerSheet
          peer={drawerPeer}
          history={peerByteHistory[drawerPeer.name] || []}
          onClose={() => setDrawerPeerName(null)}
          onAction={handlePeerAction}
          onEdit={() => setEditPeerName(drawerPeer.name)}
          onShowConfig={() => setCfgPeerName(drawerPeer.name)}
          onRemove={() => askRemovePeer(drawerPeer.name)}
          toast={toast}
        />
      )}

      {editPeer && (
        <PeerEditSheet
          peer={editPeer} peers={peers}
          onClose={() => setEditPeerName(null)}
          onSaved={(newName) => {
            setEditPeerName(null);
            if (drawerPeerName && newName !== drawerPeerName) setDrawerPeerName(newName);
            refreshStatus();
          }}
          toast={toast}
        />
      )}

      {cfgPeerName && (
        <ConfigSheet peerName={cfgPeerName} onClose={() => setCfgPeerName(null)} toast={toast}/>
      )}

      {addOpen && (
        <AddPeerSheet
          peers={peers}
          onClose={() => setAddOpen(false)}
          onCreated={refreshStatus}
          toast={toast}
        />
      )}

      {sheet === 'budget'   && <BudgetSheet onClose={() => setSheet(null)} toast={toast} refreshStatus={refreshStatus}/>}
      {sheet === 'dyndns'   && <DynDNSSheet onClose={() => setSheet(null)} toast={toast}/>}
      {sheet === 'network'  && <NetworkSheet peers={peers} onClose={() => setSheet(null)} toast={toast}/>}
      {sheet === 'update'   && <UpdateSheet onClose={() => setSheet(null)} toast={toast} updateInfo={updateInfo} setUpdateInfo={setUpdateInfo}/>}
      {sheet === 'password' && <PasswordSheet onClose={() => setSheet(null)} toast={toast}/>}

      {confirm && (
        <Confirm
          title={confirm.title} body={confirm.body}
          label={confirm.label} danger={confirm.danger}
          busy={confirmBusy}
          onConfirm={runConfirm}
          onCancel={() => setConfirm(null)}
        />
      )}

      <Toasts toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MobileApp/>);
{% endraw %}
</script>
</body>
</html>
