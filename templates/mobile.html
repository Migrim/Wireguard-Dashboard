      {budget && (
        <div className="m-section" style={{marginTop:14}}>
          <div className="m-card m-budget-card" onClick={onOpenBudget} style={{cursor:'pointer', WebkitTapHighlightColor:'transparent'}}>
            <div className="m-budget-head">
              <span className="m-budget-title">Data today</span>
              {budgetOn && <span className="m-budget-pct">{Math.round(budget.pct || 0)}%</span>}
            </div>
            {budgetOn && (
              <div className="m-budget-bar-bg">
                <div className="m-budget-bar-fill" style={{width:`${pct}%`, background:barColor}}/>
              </div>
            )}
            <div className="m-budget-foot">
              <span>{fmtBytes(budget.total || 0)} used</span>
              <span>{budgetOn ? `of ${budget.settings?.budget_gb ?? '—'} GB · ` : ''}resets {budget.settings?.reset_time || '00:00'}</span>
            </div>
          </div>
        </div>
      )}

      {/* Active Sessions */}
      <div className="m-section" style={{marginTop:14}}>
        <div className="m-card" style={{padding:'14px 16px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: onlinePeers > 0 ? 14 : 0}}>
            <span className="m-section-label" style={{marginBottom:0}}>Active Sessions</span>
            <span style={{fontFamily:'var(--mono)', fontSize:13}}>
              <span style={{fontWeight:700, color:'var(--ink)'}}>{onlinePeers}</span>
              <span style={{color:'var(--muted)'}}> / {totalPeers}</span>
            </span>
          </div>
          <SessionDurationBars peers={peers} />
        </div>
      </div>

      {/* Active Peers */}
      <div className="m-section" style={{marginTop:14, marginBottom:0}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <span className="m-section-label" style={{marginBottom:0}}>Active Peers</span>
          <button onClick={onSeeAllPeers} style={{fontFamily:'var(--sans)', fontSize:13, color:'var(--accent)', background:'none', border:'none', cursor:'pointer', padding:'0 2px', WebkitTapHighlightColor:'transparent'}}>
            See all →
          </button>
        </div>
        {topPeers.length === 0 ? (
          <div style={{textAlign:'center', padding:'24px', color:'var(--muted)', fontSize:13}}>No peers online</div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {topPeers.map(p => (
              <HomePeerRow key={p.name} peer={p} spark={sparks[p.name] || []} onPeerClick={onPeerClick} onPeerAction={onPeerAction} onPeerConfig={onPeerConfig}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Config sheet (QR + text + share) ─── */
function ConfigSheet({ peerName, onClose, toast }) {
  const [config, setConfig] = useState('');
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('qr');
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    api(`/api/users/${encodeURIComponent(peerName)}/ovpn`)
      .then(d => setConfig(d.profile || ''))
      .catch(e => { toast(e.message, 'err'); onClose(); })
      .finally(() => setLoading(false));
  }, [peerName]);

  const copy = () => {
    navigator.clipboard?.writeText(config).then(() => {
      setCopied(true); toast('Config copied to clipboard', 'ok');
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => toast('Copy failed', 'err'));
  };
  const download = () => {
    downloadText(`${peerName}.conf`, config);
    toast('Download started', 'ok');
  };
  const share = async () => {
    const ok = await shareText(`${peerName}.conf`, config, `WireGuard config · ${peerName}`);
    if (!ok) { copy(); }
  };

  return (
    <Sheet
      title={`${peerName}.conf`}
      sub="Scan with the WireGuard app or share the file"
      onClose={onClose}
      footer={<>
        <button className="m-btn" onClick={copy}>
          <Icon n={copied ? 'check' : 'copy'} size={14}/> {copied ? 'Copied!' : 'Copy'}
        </button>
        <button className="m-btn" onClick={download}><Icon n="dl" size={14}/> Save</button>
        <button className="m-btn primary" onClick={share}><Icon n="share" size={14}/> Share</button>
      </>}
    >
      {loading ? (
        <div className="m-spinner" style={{height:'auto', padding:'40px 0'}}>
          <div className="m-spinner-ring"/>
          <div className="m-spinner-label">Loading</div>
        </div>
      ) : (
        <>
          <div style={{display:'flex', justifyContent:'center', marginBottom:4}}>
            <Seg
              options={[{value:'qr', label:'QR code'}, {value:'text', label:'Text'}]}
              value={view} onChange={setView}
            />
          </div>
          {view === 'qr' ? (
            <div className="m-qr-wrap">
              <div className="m-qr-box"><QRCanvas text={config}/></div>
            </div>
          ) : (
            <pre className="m-config-pre" style={{marginTop:12}}>{config}</pre>
          )}
        </>
      )}
    </Sheet>
  );
}

/* ─── Peer sheet ─── */
function PeerSheet({ peer, history, onClose, onAction, onEdit, onShowConfig, onRemove, toast }) {
  const [busy, setBusy] = useState(false);
  const [copied, setCopied] = useState(null);
  const [diag, setDiag] = useState(null);
  const [diagBusy, setDiagBusy] = useState(false);

  const chartSamples = history.length >= 2
    ? history.slice(1).map((s, i) => {
        const dt = (s.ts - history[i].ts) / 1000 || 3;
        return {
          ts: s.ts,
          rx: Math.max(0, (s.bytesIn  - history[i].bytesIn)  / dt),
          tx: Math.max(0, (s.bytesOut - history[i].bytesOut) / dt),
        };
      })
    : [];
  const latest = chartSamples[chartSamples.length - 1] || {};
  const rxBps = latest.rx || 0;
  const txBps = latest.tx || 0;

  const doAction = async (action) => {
    setBusy(true);
    try {
      await onAction(peer.name, action);
      toast(action === 'pause' ? `${peer.name} paused` : `${peer.name} resumed`, 'ok');
    } catch(e) { toast(e.message, 'err'); }
    finally { setBusy(false); }
  };

  const copyText = async (text, key) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(key);
      setTimeout(() => setCopied(null), 2000);
    } catch { toast('Copy failed', 'err'); }
  };

  const runDiag = async () => {
    setDiagBusy(true);
    try {
      const d = await api(`/api/users/${encodeURIComponent(peer.name)}/diag`);
      setDiag(d);
    } catch(e) { toast(e.message, 'err'); }
    finally { setDiagBusy(false); }
  };

  const statusColor = peer.status === 'online' ? 'var(--success)' : peer.status === 'paused' ? 'var(--warn)' : 'var(--muted-2)';
  const statusText  = peer.status === 'online' ? 'connected'     : peer.status === 'paused' ? 'paused'    : 'offline';

  return (
    <Sheet
      title={peer.name}
      sub={`${peer.addr}${peer.device ? ' · ' + peer.device : ''}${peer.created ? ' · added ' + peer.created : ''}`}
      onClose={onClose}
      headerExtra={
        <button className="m-sheet-x" onClick={onEdit} aria-label="Edit peer">
          <Icon n="edit" size={15}/>
        </button>
      }
      footer={<>
        <button
          className={`m-btn ${peer.paused ? 'success' : ''}`}
          disabled={busy}
          onClick={() => doAction(peer.paused ? 'resume' : 'pause')}
        >
          <Icon n={peer.paused ? 'play' : 'pause'} size={15}/>
          {peer.paused ? 'Resume' : 'Pause'}
        </button>
        <button className="m-btn danger" disabled={busy} onClick={onRemove}>
          <Icon n="trash" size={15}/> Remove
        </button>
      </>}
    >
      {/* Status row */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14, marginTop:2}}>
        <div style={{display:'flex', alignItems:'center', gap:7}}>
          <span style={{width:8, height:8, borderRadius:'50%', background:statusColor, display:'inline-block', flexShrink:0}}/>
          <span style={{fontFamily:'var(--mono)', fontSize:13, color:statusColor}}>{statusText}</span>
          {peer.throttled && <span className="m-badge warn">throttled</span>}
        </div>
        {peer.lastHs && (
          <span style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--muted)'}}>handshake {fmtRel(peer.lastHs)}</span>
        )}
      </div>

      {/* Rate cards */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14}}>
        {[['↓ Down', rxBps], ['↑ Up', txBps]].map(([lbl, bps]) => (
          <div key={lbl} style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px'}}>
            <div style={{fontFamily:'var(--mono)', fontSize:9.5, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:6}}>{lbl}</div>
            <div style={{fontFamily:'var(--serif)', fontSize:22, color:'var(--ink)', lineHeight:1}}>{fmtRate(bps)}</div>
          </div>
        ))}
      </div>

      {/* Per-peer throughput chart */}
      {chartSamples.length >= 4 && (
        <div style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:14}}>
          <ThroughputChart samples={chartSamples} height={130} range="3m" spline={true} smoothScroll={false} smoothScale={false}/>
        </div>
      )}

      {/* Info grid */}
      <div style={{border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:14}}>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr'}}>
          <div style={{borderRight:'1px solid var(--border)', ...(peer.endpoint !== '—' ? {borderBottom:'1px solid var(--border)'} : {})}}>
            <KV k="Bytes In"  v={fmtBytes(peer.bytesIn)} mono={false}/>
          </div>
          <div style={{...(peer.endpoint !== '—' ? {borderBottom:'1px solid var(--border)'} : {})}}>
            <KV k="Bytes Out" v={fmtBytes(peer.bytesOut)} mono={false}/>
          </div>
          {peer.endpoint !== '—' && (
            <div style={{gridColumn:'1 / -1'}}>
              <KV k="Endpoint" v={peer.endpoint}/>
            </div>
          )}
        </div>
      </div>

      {/* Owner / note */}
      {(peer.owner || peer.note) && (
        <div style={{border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:14}}>
          {peer.owner && <KV k="Owner" v={peer.owner} mono={false}/>}
          {peer.note && (
            <div style={peer.owner ? {borderTop:'1px solid var(--border)'} : null}>
              <KV k="Note" v={peer.note} mono={false}/>
            </div>
          )}
        </div>
      )}

      {/* Diagnostics */}
      <div style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px', marginBottom:14}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:10}}>
          <div>
            <div style={{fontFamily:'var(--mono)', fontSize:9.5, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)'}}>Diagnostics</div>
            {diag ? (
              <div style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--ink)', marginTop:5, lineHeight:1.7}}>
                <div>
                  ping: <span style={{color: diag.ping_status === 'ok' ? 'var(--success)' : 'var(--danger)'}}>
                    {diag.ping_status === 'ok' ? `${diag.ping_ms} ms` : diag.ping_status}
                  </span>
                  {diag.ping_ip ? ` · ${diag.ping_ip}` : ''}
                </div>
                {diag.location?.label && diag.location.label !== '—' && <div>location: {diag.location.label}</div>}
              </div>
            ) : (
              <div style={{fontSize:12, color:'var(--muted)', marginTop:3}}>Ping the peer inside the tunnel</div>
            )}
          </div>
          <button className="m-btn" style={{flex:'0 0 auto', minWidth:82}} onClick={runDiag} disabled={diagBusy}>
            {diagBusy ? <div className="m-spinner-ring sm"/> : <><Icon n="activity" size={14}/> Test</>}
          </button>
        </div>
      </div>

      {/* Public key */}
      {peer.pubKey && (
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px', gap:12, marginBottom:14}}>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontFamily:'var(--mono)', fontSize:9.5, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:4}}>Public Key</div>
            <div style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{peer.pubKey}</div>
          </div>
          <button onClick={() => copyText(peer.pubKey, 'pubkey')} style={{background:'none', border:'none', color: copied === 'pubkey' ? 'var(--success)' : 'var(--muted)', cursor:'pointer', flexShrink:0, padding:4, display:'grid', placeItems:'center'}}>
            <Icon n={copied === 'pubkey' ? 'check' : 'copy'} size={16}/>
          </button>
        </div>
      )}

      {/* Config button */}
      <button className="m-btn" style={{width:'100%', height:46, borderRadius:12}} onClick={onShowConfig}>
        <Icon n="qr" size={15}/> Show config &amp; QR code
      </button>
    </Sheet>
  );
}

/* ─── Peer edit sheet ─── */
const DEVICE_KINDS = ['phone', 'laptop', 'tablet', 'desktop', 'server', 'tv', 'other'];

function routingPreset(clientAllowedIps, subnet) {
  const v = String(clientAllowedIps || '').replace(/\s+/g, '');
  if (!v || v === '0.0.0.0/0,::/0' || v === '0.0.0.0/0') return 'all';
  if (v === subnet.replace(/\s+/g, '')) return 'subnet';
  return 'custom';
}

function PeerEditSheet({ peer, peers, onClose, onSaved, toast }) {
  const subnet = subnetFromPeers(peers);
  const [name, setName] = useState(peer.name);
  const [owner, setOwner] = useState(peer.owner);
  const [note, setNote] = useState(peer.note);
  const [device, setDevice] = useState(peer.device);
  const [dns, setDns] = useState(peer.dns);
  const [routing, setRouting] = useState(() => routingPreset(peer.clientAllowedIps, subnet));
  const [customIps, setCustomIps] = useState(peer.clientAllowedIps || '0.0.0.0/0, ::/0');
  const [keepalive, setKeepalive] = useState(peer.keepalive || '25');
  const [mtu, setMtu] = useState(peer.mtu);
  const [endpoint, setEndpoint] = useState(peer.endpointOverride);
  const [monitorDns, setMonitorDns] = useState(peer.monitorDns);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const nameValid = NAME_RE.test(name.trim());

  const save = async () => {
    setErr('');
    if (!nameValid) { setErr('Name: only A-Z a-z 0-9 . _ - (max 64)'); return; }
    setBusy(true);
    try {
      let finalName = peer.name;
      if (name.trim() !== peer.name) {
        const r = await api(`/api/users/${encodeURIComponent(peer.name)}/rename`, {
          method: 'POST', body: JSON.stringify({ name: name.trim() }),
        });
        finalName = r.name;
      }
      const patch = {};
      if (owner !== peer.owner) patch.owner = owner;
      if (note !== peer.note) patch.note = note;
      if (device !== peer.device) patch.device = device;
      if (dns !== peer.dns) patch.dns = dns;
      const wantIps = routing === 'all' ? '0.0.0.0/0, ::/0' : routing === 'subnet' ? subnet : customIps;
      if (wantIps.replace(/\s+/g,'') !== String(peer.clientAllowedIps || '').replace(/\s+/g,'')) patch.client_allowed_ips = wantIps;
      if (String(keepalive) !== String(peer.keepalive)) patch.keepalive = keepalive;
      if (String(mtu) !== String(peer.mtu)) patch.mtu = mtu;
      if (endpoint !== peer.endpointOverride) patch.endpoint = endpoint;
      if (monitorDns !== peer.monitorDns) patch.monitor_dns = monitorDns;
      if (Object.keys(patch).length) {
        await api(`/api/users/${encodeURIComponent(finalName)}/settings`, {
          method: 'PATCH', body: JSON.stringify(patch),
        });
      }
      toast('Peer settings saved', 'ok');
      onSaved(finalName);
    } catch(e) {
      setErr(e.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <Sheet
      title={`Edit ${peer.name}`}
      sub="Changes apply to newly exported configs"
      onClose={onClose}
      footer={<>
        <button className="m-btn" onClick={onClose} disabled={busy}>Cancel</button>
        <button className="m-btn primary" onClick={save} disabled={busy || !nameValid}>
          {busy ? 'Saving…' : 'Save changes'}
        </button>
      </>}
    >
      <Field label="Name" error={!nameValid ? 'Only A-Z a-z 0-9 . _ - (max 64)' : ''}>
        <input className="m-input mono" value={name} onChange={e => setName(e.target.value)} autoCapitalize="none" autoCorrect="off"/>
      </Field>

      <Field label="Device">
        <div className="m-chips">
          {DEVICE_KINDS.map(k => (
            <button key={k} className={`m-chip ${device === k ? 'on' : ''}`} onClick={() => setDevice(device === k ? '' : k)}>{k}</button>
          ))}
        </div>
      </Field>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
        <Field label="Owner">
          <input className="m-input" value={owner} onChange={e => setOwner(e.target.value)} placeholder="Who uses it"/>
        </Field>
        <Field label="Note">
          <input className="m-input" value={note} onChange={e => setNote(e.target.value)} placeholder="Short note"/>
        </Field>
      </div>

      <div className="m-sheet-divider"/>
      <div className="m-section-label" style={{marginTop:0}}>Tunnel config</div>

      <Field label="Routing">
        <div className="m-chips" style={{marginBottom: routing === 'custom' ? 8 : 0}}>
          <button className={`m-chip ${routing === 'all' ? 'on' : ''}`} onClick={() => setRouting('all')}>All traffic</button>
          <button className={`m-chip ${routing === 'subnet' ? 'on' : ''}`} onClick={() => setRouting('subnet')}>VPN subnet only</button>
          <button className={`m-chip ${routing === 'custom' ? 'on' : ''}`} onClick={() => setRouting('custom')}>Custom</button>
        </div>
        {routing === 'custom' && (
          <input className="m-input mono" value={customIps} onChange={e => setCustomIps(e.target.value)} placeholder="0.0.0.0/0, ::/0" autoCapitalize="none" autoCorrect="off"/>
        )}
        {routing === 'subnet' && <div className="m-hint">Routes only {subnet} through the tunnel</div>}
      </Field>

      <Field label="DNS" hint="Comma-separated IPs, or 'none' to omit the DNS line">
        <input className="m-input mono" value={dns} onChange={e => setDns(e.target.value)} placeholder="Server default" autoCapitalize="none" autoCorrect="off"/>
      </Field>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
        <Field label="Keepalive (s)">
          <input className="m-input mono" type="number" inputMode="numeric" value={keepalive} onChange={e => setKeepalive(e.target.value)} placeholder="25"/>
        </Field>
        <Field label="MTU">
          <input className="m-input mono" type="number" inputMode="numeric" value={mtu} onChange={e => setMtu(e.target.value)} placeholder="auto"/>
        </Field>
      </div>

      <Field label="Endpoint override" hint="host:port — leave empty to use the server default">
        <input className="m-input mono" value={endpoint} onChange={e => setEndpoint(e.target.value)} placeholder="vpn.example.com:51820" autoCapitalize="none" autoCorrect="off"/>
      </Field>

      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'4px 2px 2px'}}>
        <div>
          <div className="m-settings-lbl">Monitor DNS activity</div>
          <div className="m-settings-sub">Capture top queried domains</div>
        </div>
        <Toggle value={monitorDns} onChange={setMonitorDns}/>
      </div>

      {err && <div className="m-err-text" style={{marginTop:12}}>{err}</div>}
    </Sheet>
  );
}

/* ─── Add peer sheet ─── */
function AddPeerSheet({ peers, onClose, onCreated, toast }) {
  const subnet = subnetFromPeers(peers);
  const [name, setName] = useState('');
  const [ip, setIp] = useState('');
  const [device, setDevice] = useState('phone');
  const [dns, setDns] = useState('');
  const [routing, setRouting] = useState('all');
  const [customIps, setCustomIps] = useState('0.0.0.0/0, ::/0');
  const [keepalive, setKeepalive] = useState('25');
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [created, setCreated] = useState(null); // { name, profile, address }

  const nameValid = NAME_RE.test(name.trim());
  const nameTaken = peers.some(p => p.name === name.trim());

  const submit = async () => {
    setErr('');
    if (!nameValid) { setErr('Name: only A-Z a-z 0-9 . _ - (max 64)'); return; }
    if (nameTaken) { setErr('A peer with that name already exists'); return; }
    setBusy(true);
    try {
      const body = { name: name.trim(), device };
      if (ip.trim()) body.ip = ip.trim();
      if (dns.trim()) body.dns = dns.trim();
      if (routing === 'subnet') body.client_allowed_ips = subnet;
      else if (routing === 'custom') body.client_allowed_ips = customIps;
      if (keepalive && keepalive !== '25') body.keepalive = keepalive;
      const r = await api('/api/users', { method: 'POST', body: JSON.stringify(body) });
      const profile = r.profile || '';
      const address = (profile.match(/Address\s*=\s*([^\n]+)/) || [])[1] || ip.trim() || '';
      setCreated({ name: r.name, profile, address: address.trim() });
      onCreated();
      toast(`Peer '${r.name}' created`, 'ok');
    } catch(e) {
      setErr(e.message);
    } finally {
      setBusy(false);
    }
  };

  const copy = () => {
    navigator.clipboard?.writeText(created.profile)
      .then(() => toast('Config copied to clipboard', 'ok'))
      .catch(() => toast('Copy failed', 'err'));
  };
  const share = async () => {
    const ok = await shareText(`${created.name}.conf`, created.profile, `WireGuard config · ${created.name}`);
    if (!ok) copy();
  };

  if (created) {
    return (
      <Sheet
        title={`${created.name} is ready`}
        sub={created.address ? `Address ${created.address}` : 'Peer created'}
        onClose={onClose}
        footer={<>
          <button className="m-btn" onClick={copy}><Icon n="copy" size={14}/> Copy</button>
          <button className="m-btn" onClick={() => { downloadText(`${created.name}.conf`, created.profile); toast('Download started', 'ok'); }}>
            <Icon n="dl" size={14}/> Save
          </button>
          <button className="m-btn primary" onClick={share}><Icon n="share" size={14}/> Share</button>
        </>}
      >
        {created.profile ? (
          <>
            <div className="m-qr-wrap">
              <div className="m-qr-box"><QRCanvas text={created.profile}/></div>
            </div>
            <div className="m-hint" style={{textAlign:'center', marginBottom:14}}>
              Scan with the WireGuard app on the new device — the private key is only shown once.
            </div>
            <button
              className="m-btn" style={{width:'100%'}}
              onClick={() => { setCreated(null); setName(''); setIp(''); setErr(''); }}
            >
              <Icon n="plus" size={14}/> Add another peer
            </button>
          </>
        ) : (
          <div className="m-hint" style={{padding:'20px 0'}}>
            The peer was created, but the config could not be generated. Open the peer and use “Show config”.
          </div>
        )}
      </Sheet>
    );
  }

  return (
    <Sheet
      title="Add peer"
      sub="Generates keys and a ready-to-scan config"
      onClose={onClose}
      footer={
        <button className="m-btn primary" style={{flex:1}} onClick={submit} disabled={busy || !name.trim()}>
          {busy ? 'Creating…' : 'Create peer'}
        </button>
      }
    >
      <Field label="Name" error={name.trim() && !nameValid ? 'Only A-Z a-z 0-9 . _ - (max 64)' : (nameTaken ? 'Name already exists' : '')}>
        <input
          className="m-input mono" value={name} onChange={e => setName(e.target.value)}
          placeholder="e.g. bastis-iphone" autoCapitalize="none" autoCorrect="off" autoFocus
        />
      </Field>

      <Field label="Device">
        <div className="m-chips">
          {DEVICE_KINDS.map(k => (
            <button key={k} className={`m-chip ${device === k ? 'on' : ''}`} onClick={() => setDevice(k)}>{k}</button>
          ))}
        </div>
      </Field>

      <Field label="Routing">
        <div className="m-chips" style={{marginBottom: routing === 'custom' ? 8 : 0}}>
          <button className={`m-chip ${routing === 'all' ? 'on' : ''}`} onClick={() => setRouting('all')}>All traffic</button>
          <button className={`m-chip ${routing === 'subnet' ? 'on' : ''}`} onClick={() => setRouting('subnet')}>VPN subnet only</button>
          <button className={`m-chip ${routing === 'custom' ? 'on' : ''}`} onClick={() => setRouting('custom')}>Custom</button>
        </div>
        {routing === 'custom' && (
          <input className="m-input mono" value={customIps} onChange={e => setCustomIps(e.target.value)} placeholder="0.0.0.0/0, ::/0" autoCapitalize="none" autoCorrect="off"/>
        )}
        {routing === 'subnet' && <div className="m-hint">Routes only {subnet} through the tunnel</div>}
      </Field>

      <button
        onClick={() => setShowAdvanced(v => !v)}
        style={{background:'none', border:'none', color:'var(--accent)', fontSize:13, cursor:'pointer', padding:'2px 0 12px', display:'flex', alignItems:'center', gap:5, WebkitTapHighlightColor:'transparent'}}
      >
        <span style={{display:'inline-flex', transform: showAdvanced ? 'rotate(180deg)' : 'none', transition:'transform 0.2s'}}><Icon n="chev" size={14}/></span>
        Advanced options
      </button>

      {showAdvanced && (
        <>
          <Field label="Static IP" hint="Leave empty for the next free address">
            <input className="m-input mono" value={ip} onChange={e => setIp(e.target.value)} placeholder="e.g. 10.8.0.23" autoCapitalize="none" autoCorrect="off" inputMode="decimal"/>
          </Field>
          <Field label="DNS" hint="Comma-separated IPs, or 'none'">
            <input className="m-input mono" value={dns} onChange={e => setDns(e.target.value)} placeholder="Server default" autoCapitalize="none" autoCorrect="off"/>
          </Field>
          <Field label="Keepalive (s)">
            <input className="m-input mono" type="number" inputMode="numeric" value={keepalive} onChange={e => setKeepalive(e.target.value)} placeholder="25"/>
          </Field>
        </>
      )}

      {err && <div className="m-err-text" style={{marginBottom:8}}>{err}</div>}
    </Sheet>
  );
}

/* ─── Data budget sheet ─── */
function BudgetSheet({ onClose, toast, refreshStatus }) {
  const [state, setState] = useState(null);
  const [settings, setSettings] = useState(null);
  const [dirty, setDirty] = useState(false);
  const [busy, setBusy] = useState(false);
  const [editPeer, setEditPeer] = useState(null);

  const load = () => {
    api('/api/data-budget').then(d => {
      setState(d);
      setSettings({
        enabled: d.settings?.enabled !== false,
        budget_gb: d.settings?.budget_gb ?? 50,
        alerts: d.settings?.alerts !== false,
        reset_time: d.settings?.reset_time || '00:00',
        peer_budgets: { ...(d.settings?.peer_budgets || {}) },
        enforcement: {
          action: d.settings?.enforcement?.action || 'none',
          throttle_mbps: d.settings?.enforcement?.throttle_mbps || 5,
        },
      });
    }).catch(e => { toast(e.message, 'err'); onClose(); });
  };
  useEffect(load, []);

  const set = (k, v) => { setSettings(s => ({ ...s, [k]: v })); setDirty(true); };
  const setEnf = (k, v) => { setSettings(s => ({ ...s, enforcement: { ...s.enforcement, [k]: v } })); setDirty(true); };
  const setPeerBudget = (name, v) => {
    setSettings(s => {
      const pb = { ...s.peer_budgets };
      if (v === 'inf' || v === '' || v == null) delete pb[name];
      else pb[name] = Math.max(1, Math.min(100000, parseInt(v, 10) || 1));
      return { ...s, peer_budgets: pb };
    });
    setDirty(true);
  };

  const save = async () => {
    setBusy(true);
    try {
      const body = {
        enabled: settings.enabled,
        budget_gb: Math.max(1, Math.min(100000, parseInt(settings.budget_gb, 10) || 1)),
        alerts: settings.alerts,
        reset_time: settings.reset_time,
        peer_budgets: settings.peer_budgets,
        enforcement: {
          action: settings.enforcement.action,
          throttle_mbps: Math.max(1, Math.min(1000, parseInt(settings.enforcement.throttle_mbps, 10) || 5)),
        },
      };
      const d = await api('/api/data-budget', { method: 'POST', body: JSON.stringify(body) });
      setState(d);
      setDirty(false);
      toast('Budget settings saved', 'ok');
      refreshStatus();
    } catch(e) { toast(e.message, 'err'); }
    finally { setBusy(false); }
  };

  const exportCsv = async () => {
    try {
      const d = await api('/api/data-budget/export', { method: 'POST' });
      const shared = await shareText(d.filename || 'data-budget.csv', d.csv || '', 'Data budget export');
      if (!shared) downloadText(d.filename || 'data-budget.csv', d.csv || '', 'text/csv');
      toast('Export ready', 'ok');
    } catch(e) { toast(e.message, 'err'); }
  };

  if (!state || !settings) {
    return (
      <Sheet title="Data budget" onClose={onClose}>
        <div className="m-spinner" style={{height:'auto', padding:'40px 0'}}>
          <div className="m-spinner-ring"/><div className="m-spinner-label">Loading</div>
        </div>
      </Sheet>
    );
  }

  const pct = Math.min(100, Math.max(0, state.pct || 0));
  const barColor = pct >= 90 ? 'var(--danger)' : pct >= 70 ? 'var(--warn)' : 'var(--accent)';
  const enfState = state.enforce_state || {};
  const globalCapBytes = (parseInt(settings.budget_gb, 10) || 1) * 1024 ** 3;

  return (
    <Sheet
      title="Data budget"
      sub={`Period since ${state.period_start_iso ? state.period_start_iso.slice(11,16) : settings.reset_time}`}
      onClose={onClose}
      footer={dirty ? <>
        <button className="m-btn" onClick={load} disabled={busy}>Discard</button>
        <button className="m-btn primary" onClick={save} disabled={busy}>{busy ? 'Saving…' : 'Save changes'}</button>
      </> : (
        <button className="m-btn" style={{flex:1}} onClick={exportCsv}><Icon n="share" size={14}/> Export usage CSV</button>
      )}
    >
      {/* Usage summary */}
      <div style={{marginBottom:16}}>
        <div style={{display:'flex', alignItems:'baseline', gap:6, marginBottom:8}}>
          <span style={{fontFamily:'var(--serif)', fontSize:34, color:'var(--ink)', lineHeight:1}}>{fmtBytes(state.total || 0)}</span>
          <span style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--muted)'}}>{settings.enabled ? `of ${settings.budget_gb} GB · ${Math.round(pct)}%` : 'used today'}</span>
        </div>
        {settings.enabled && (
          <div className="m-budget-bar-bg">
            <div className="m-budget-bar-fill" style={{width:`${pct}%`, background:barColor}}/>
          </div>
        )}
      </div>

      {/* Settings */}
      <div className="m-settings-card" style={{marginBottom:16}}>
        <div className="m-settings-row">
          <span className="m-settings-lbl">Daily budget</span>
          <Toggle value={settings.enabled} onChange={v => set('enabled', v)}/>
        </div>
        {settings.enabled && (
          <div className="m-settings-row">
            <span className="m-settings-lbl">Daily budget (GB)</span>
            <Stepper value={settings.budget_gb} onChange={v => set('budget_gb', v)} min={1} max={100000} step={5}/>
          </div>
        )}
        {settings.enabled && (
          <div className="m-settings-row">
            <span className="m-settings-lbl">Usage alerts</span>
            <Toggle value={settings.alerts} onChange={v => set('alerts', v)}/>
          </div>
        )}
        <div className="m-settings-row">
          <span className="m-settings-lbl">Reset time</span>
          <input
            type="time" className="m-input" value={settings.reset_time}
            onChange={e => set('reset_time', e.target.value)}
            style={{width:110, padding:'8px 10px', fontFamily:'var(--mono)', fontSize:14}}
          />
        </div>
      </div>

      {/* Enforcement */}
      {settings.enabled && <>
      <div className="m-section-label" style={{marginTop:0}}>When a budget is exceeded</div>
      <div className="m-settings-card" style={{marginBottom:16}}>
        <div className="m-settings-row">
          <Seg
            options={[
              {value:'none', label:'Off'},
              {value:'throttle', label:'Throttle'},
              {value:'pause', label:'Pause'},
              {value:'combined', label:'Both'},
            ]}
            value={settings.enforcement.action}
            onChange={v => setEnf('action', v)}
          />
        </div>
        {(settings.enforcement.action === 'throttle' || settings.enforcement.action === 'combined') && (
          <div className="m-settings-row">
            <span className="m-settings-lbl">Throttle speed (Mbps)</span>
            <Stepper value={settings.enforcement.throttle_mbps} onChange={v => setEnf('throttle_mbps', v)} min={1} max={1000} step={1}/>
          </div>
        )}
      </div>
      </>}

      {/* Per-peer */}
      <div className="m-section-label" style={{marginTop:0}}>{settings.enabled ? <>Per-peer usage &amp; limits</> : 'Per-peer usage today'}</div>
      <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:6}}>
        {(state.peers || []).length === 0 && (
          <div className="m-hint" style={{padding:'8px 0'}}>No usage recorded this period yet.</div>
        )}
        {(state.peers || []).map(row => {
          const cap = settings.peer_budgets[row.name];
          const capBytes = cap ? cap * 1024 ** 3 : globalCapBytes;
          const ppct = Math.min(100, capBytes ? (row.bytes / capBytes) * 100 : 0);
          const pColor = ppct >= 90 ? 'var(--danger)' : ppct >= 70 ? 'var(--warn)' : 'var(--accent)';
          const enf = enfState[row.name];
          const editing = editPeer === row.name;
          return (
            <div key={row.name} style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'11px 13px'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:8, marginBottom:7}}>
                <span style={{fontSize:13, fontWeight:600, color:'var(--ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{row.name}</span>
                <span style={{display:'flex', alignItems:'center', gap:6, flexShrink:0}}>
                  {enf && enf !== 'none' && <span className={`m-badge ${enf === 'paused' ? 'err' : 'warn'}`}>{enf}</span>}
                  {settings.enabled && (
                    <button
                      className="m-chip" style={{padding:'3px 10px', fontSize:11.5}}
                      onClick={() => setEditPeer(editing ? null : row.name)}
                    >
                      {cap ? `${cap} GB` : '∞'} <Icon n="edit" size={10}/>
                    </button>
                  )}
                </span>
              </div>
              {settings.enabled && (
                <div className="m-budget-bar-bg" style={{height:6}}>
                  <div className="m-budget-bar-fill" style={{width:`${ppct}%`, background:pColor}}/>
                </div>
              )}
              <div style={{display:'flex', justifyContent:'space-between', marginTop:5, fontFamily:'var(--mono)', fontSize:10.5, color:'var(--muted)'}}>
                <span>{fmtBytes(row.bytes)} used</span>
                <span>{!settings.enabled ? '' : cap ? `limit ${cap} GB` : 'no individual limit'}</span>
              </div>
              {settings.enabled && editing && (
                <div style={{display:'flex', gap:8, marginTop:10, alignItems:'center'}}>
                  <input
                    className="m-input mono" type="number" inputMode="numeric" placeholder="GB"
                    defaultValue={cap || ''}
                    style={{flex:1, padding:'8px 10px'}}
                    onBlur={e => { if (e.target.value) setPeerBudget(row.name, e.target.value); }}
                    onKeyDown={e => { if (e.key === 'Enter') { setPeerBudget(row.name, e.target.value); setEditPeer(null); } }}
                  />
                  <button className="m-chip" onClick={() => { setPeerBudget(row.name, 'inf'); setEditPeer(null); }}>∞ unlimited</button>
                  <button className="m-chip on" onClick={() => setEditPeer(null)}>Done</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </Sheet>
  );
}

/* ─── DynDNS sheet ─── */
const DYNDNS_PROVIDERS = [
  { id: 'duckdns', label: 'Duck DNS', domainLabel: 'Subdomain', domainHelp: 'Subdomain only — e.g. "myhome" for myhome.duckdns.org', tokenLabel: 'Token', tokenHelp: 'Token from your Duck DNS account page' },
  { id: 'noip',    label: 'No-IP (soon)', disabled: true },
  { id: 'dynu',    label: 'Dynu (soon)', disabled: true },
  { id: 'custom',  label: 'Custom URL' },
];

function DynDNSSheet({ onClose, toast }) {
  const [cfg, setCfg] = useState(null);
  const [form, setForm] = useState(null);
  const [dirty, setDirty] = useState(false);
  const [busy, setBusy] = useState(false);
  const [pushing, setPushing] = useState(false);
  const [checking, setChecking] = useState(false);
  const [resolved, setResolved] = useState(null);

  const load = () => {
    api('/api/dyndns').then(d => {
      setCfg(d);
      setForm({
        mode: d.mode === 'dyndns' ? 'dyndns' : 'static',
        hostname: d.hostname || '',
        provider: d.provider || '',
        domain: d.domain || '',
        custom_url: d.custom_url || '',
        token: '',
      });
      setDirty(false);
    }).catch(e => { toast(e.message, 'err'); onClose(); });
  };
  useEffect(load, []);

  const set = (k, v) => { setForm(f => ({ ...f, [k]: v })); setDirty(true); };

  const save = async () => {
    setBusy(true);
    try {
      const body = {
        mode: form.mode,
        hostname: form.hostname,
        provider: form.provider || null,
        domain: form.domain,
        custom_url: form.custom_url,
      };
      if (form.token) body.token = form.token;
      await api('/api/dyndns', { method: 'POST', body: JSON.stringify(body) });
      toast('DynDNS settings saved', 'ok');
      load();
    } catch(e) { toast(e.message, 'err'); }
    finally { setBusy(false); }
  };

  const pushNow = async () => {
    setPushing(true);
    try {
      await api('/api/dyndns/update', { method: 'POST' });
      toast('IP pushed to provider', 'ok');
      load();
    } catch(e) { toast(e.message, 'err', 4500); }
    finally { setPushing(false); }
  };

  const check = async () => {
    if (!form.hostname) { toast('Enter a hostname first', 'warn'); return; }
    setChecking(true); setResolved(null);
    try {
      const r = await api('/api/dyndns/resolve', { method: 'POST', body: JSON.stringify({ hostname: form.hostname }) });
      setResolved(r);
    } catch(e) { toast(e.message, 'err'); }
    finally { setChecking(false); }
  };

  if (!cfg || !form) {
    return (
      <Sheet title="Dynamic DNS" onClose={onClose}>
        <div className="m-spinner" style={{height:'auto', padding:'40px 0'}}>
          <div className="m-spinner-ring"/><div className="m-spinner-label">Loading</div>
        </div>
      </Sheet>
    );
  }

  const provInfo = DYNDNS_PROVIDERS.find(p => p.id === form.provider);
  const last = cfg.last_update;
  const match = resolved && resolved.ip && resolved.public_ip && resolved.ip === resolved.public_ip;

  return (
    <Sheet
      title="Dynamic DNS"
      sub="Keep peers connected when your public IP changes"
      onClose={onClose}
      footer={<>
        {form.provider && (
          <button className="m-btn" onClick={pushNow} disabled={pushing || busy}>
            {pushing ? 'Pushing…' : <><Icon n="upload" size={14}/> Update now</>}
          </button>
        )}
        <button className="m-btn primary" onClick={save} disabled={busy || !dirty}>
          {busy ? 'Saving…' : 'Save'}
        </button>
      </>}
    >
      {/* Status */}
      <div style={{border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:16}}>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr'}}>
          <div style={{borderRight:'1px solid var(--border)', borderBottom:'1px solid var(--border)'}}>
            <KV k="Public IP" v={cfg.public_ip || '—'}/>
          </div>
          <div style={{borderBottom:'1px solid var(--border)'}}>
            <KV k="Endpoint host" v={cfg.endpoint_host || '—'}/>
          </div>
          <div style={{gridColumn:'1 / -1'}}>
            <KV k="Last push" v={
              last ? `${last.ok ? '✓' : '✕'} ${last.provider || ''} · ${fmtRelSec(last.ts)}${last.ip ? ' · ' + last.ip : ''}` : 'never'
            }/>
          </div>
        </div>
      </div>

      {/* Mode */}
      <Field label="Server endpoint">
        <Seg
          options={[{value:'static', label:'Static IP'}, {value:'dyndns', label:'DynDNS hostname'}]}
          value={form.mode} onChange={v => set('mode', v)}
        />
      </Field>

      {form.mode === 'dyndns' && (
        <Field label="Hostname" hint="Used as the Endpoint in generated peer configs">
          <div style={{display:'flex', gap:8}}>
            <input className="m-input mono" value={form.hostname} onChange={e => set('hostname', e.target.value)} placeholder="myhome.duckdns.org" autoCapitalize="none" autoCorrect="off" style={{flex:1}}/>
            <button className="m-btn" style={{flex:'0 0 auto', width:76, height:'auto'}} onClick={check} disabled={checking}>
              {checking ? '…' : 'Check'}
            </button>
          </div>
          {resolved && (
            <div className="m-hint" style={{color: match ? 'var(--success)' : 'var(--warn)'}}>
              resolves to {resolved.ip} {match ? '· matches your public IP ✓' : `· public IP is ${resolved.public_ip || 'unknown'}`}
            </div>
          )}
        </Field>
      )}

      <div className="m-sheet-divider"/>
      <div className="m-section-label" style={{marginTop:0}}>Auto-update provider</div>

      <Field label="Provider" hint="Pushes your current IP to the DNS provider">
        <div className="m-chips">
          <button className={`m-chip ${!form.provider ? 'on' : ''}`} onClick={() => set('provider', '')}>None</button>
          {DYNDNS_PROVIDERS.map(p => (
            <button key={p.id} className={`m-chip ${form.provider === p.id ? 'on' : ''}`} disabled={p.disabled} onClick={() => set('provider', p.id)}>{p.label}</button>
          ))}
        </div>
      </Field>

      {form.provider && form.provider !== 'custom' && (
        <>
          <Field label={provInfo?.domainLabel || 'Domain'} hint={provInfo?.domainHelp}>
            <input className="m-input mono" value={form.domain} onChange={e => set('domain', e.target.value)} autoCapitalize="none" autoCorrect="off"/>
          </Field>
          <Field label={provInfo?.tokenLabel || 'Token'} hint={cfg.has_token && !form.token ? 'A token is saved — leave empty to keep it' : provInfo?.tokenHelp}>
            <input className="m-input mono" type="password" value={form.token} onChange={e => set('token', e.target.value)} placeholder={cfg.has_token ? '••••  (saved)' : ''} autoCapitalize="none"/>
          </Field>
        </>
      )}

      {form.provider === 'custom' && (
        <Field label="Update URL" hint="Called via GET on every IP change">
          <input className="m-input mono" value={form.custom_url} onChange={e => set('custom_url', e.target.value)} placeholder="https://example.com/update?ip=…" autoCapitalize="none" autoCorrect="off"/>
        </Field>
      )}
    </Sheet>
  );
}

/* ─── Network & firewall sheet ─── */
function NetworkSheet({ peers, onClose, toast }) {
  const [diag, setDiag] = useState(null);
  const [health, setHealth] = useState(null);
  const [pc, setPc] = useState({ running: false, revealed: 0, done: false });
  const [showRaw, setShowRaw] = useState(false);
  const alive = useRef(true);
  useEffect(() => () => { alive.current = false; }, []);

  // Step results are derived from diag/health at render time
  const steps = [
    { id: 'iface',     label: 'Service active',                          res: () => diag.service_active ? 'ok' : 'fail' },
    { id: 'listen',    label: `Listening on UDP ${diag ? diag.port : ''}`, res: () => diag.listening ? 'ok' : 'fail' },
    { id: 'fw-in',     label: 'Firewall allows the port',                res: () => diag.ufw_allowed ? 'ok' : 'warn' },
    { id: 'fw-fwd',    label: 'IP forwarding enabled',                   res: () => diag.ip_forward ? 'ok' : 'fail' },
    { id: 'nat',       label: 'NAT rules (PostUp)',                      res: () => diag.has_postup ? 'ok' : 'warn' },
    { id: 'dns',       label: 'External connectivity',                   res: () => health && health.ping_ok ? 'ok' : 'warn' },
    { id: 'handshake', label: 'Peer handshakes',                         res: () => (health && health.live_clients > 0) ? 'ok' : ((peers || []).length ? 'warn' : 'ok') },
  ];

  const runCheck = async () => {
    setPc({ running: true, revealed: 0, done: false });
    const [d, h] = await Promise.all([
      api('/api/diag/vpn').catch(e => { toast(e.message, 'err'); return null; }),
      api('/api/health').catch(() => null),
    ]);
    if (!alive.current) return;
    if (d) setDiag(d);
    setHealth(h);
    if (!d) { setPc({ running: false, revealed: 0, done: false }); return; }
    for (let i = 0; i < steps.length; i++) {
      await new Promise(r => setTimeout(r, 320 + Math.random() * 260));
      if (!alive.current) return;
      setPc({ running: true, revealed: i + 1, done: false });
    }
    setPc({ running: false, revealed: steps.length, done: true });
    api('/api/diag/refresh', { method: 'POST' }).catch(() => {});
  };

  useEffect(() => { runCheck(); }, []);

  if (!diag) {
    return (
      <Sheet title="Network & firewall" onClose={onClose}>
        <div className="m-spinner" style={{height:'auto', padding:'40px 0'}}>
          <div className="m-spinner-ring"/><div className="m-spinner-label">Checking</div>
        </div>
      </Sheet>
    );
  }

  return (
    <Sheet
      title="Network & firewall"
      sub={`wg0 · UDP ${diag.port}`}
      onClose={onClose}
    >
      {/* Port check */}
      <div style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'0 14px 4px', marginBottom:14}}>
        <div className="m-pc-head">
          <span className="m-section-label" style={{margin:0}}>Port check</span>
          {pc.done
            ? <button className="m-pc-rerun" onClick={runCheck}>Re-run</button>
            : <span className="m-pc-count">{pc.revealed}/{steps.length}</span>}
        </div>
        <div className="m-pc-bar"><div className="m-pc-fill" style={{width:`${(pc.revealed / steps.length) * 100}%`}}/></div>
        {steps.map((s, i) => {
          const revealed = pc.done || i < pc.revealed;
          const active = pc.running && i === pc.revealed;
          const r = revealed ? s.res() : null;
          return (
            <div key={s.id} className={`m-check-row ${revealed ? '' : 'pending'}`}>
              {revealed ? (
                <span className={`m-check-ic ${r === 'ok' ? 'ok' : r === 'warn' ? 'warn' : 'bad'}`}>
                  <Icon n={r === 'ok' ? 'check' : r === 'warn' ? 'alert' : 'x'} size={12}/>
                </span>
              ) : (
                <span className="m-check-ic idle">{active ? <span className="m-pc-spin"/> : <span className="m-pc-idle-dot"/>}</span>
              )}
              <span>{s.label}</span>
            </div>
          );
        })}
        <CheckRow ok={!!diag.public_ip} label="Public IP" val={diag.public_ip || 'unknown'}/>
        <CheckRow ok={!!diag.host_ip} label="Host IP" val={diag.host_ip || '—'}/>
      </div>

      {/* First issue found by the check, with how to resolve it */}
      {pc.done && (() => {
        const bad = steps.find(s => s.res() !== 'ok');
        if (!bad) return null;
        const tips = {
          'iface':     { title: 'Service is down', desc: 'The WireGuard service is not active — peers cannot connect. Start it on the server.', cmd: 'sudo systemctl start wg-quick@wg0' },
          'listen':    { title: `UDP ${diag.port} is not bound`, desc: 'Nothing is listening on the WireGuard port. Check ListenPort in the config, then restart the service.', cmd: `sudo ss -ulnp | grep ${diag.port}\nsudo systemctl restart wg-quick@wg0` },
          'fw-in':     { title: 'Firewall may block the port', desc: `No UFW rule found for UDP ${diag.port}. Add an accept rule on the server.`, cmd: `sudo ufw allow ${diag.port}/udp` },
          'fw-fwd':    { title: 'IP forwarding disabled', desc: 'Peers can connect but cannot route traffic. Enable forwarding in the kernel.', cmd: 'sudo sysctl -w net.ipv4.ip_forward=1' },
          'nat':       { title: 'NAT / PostUp rule missing', desc: 'Peer traffic is not masqueraded. Add a MASQUERADE rule for your WAN interface.', cmd: 'sudo iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE' },
          'dns':       { title: 'No internet from server', desc: 'The server cannot reach 1.1.1.1 — peer traffic may not route correctly. Check the default gateway.', cmd: 'ping -c3 1.1.1.1\nip route show' },
          'handshake': { title: 'No recent peer handshakes', desc: 'Verify peer configs point at this server and PersistentKeepalive is set.', cmd: 'sudo wg show wg0 latest-handshakes' },
        };
        const tip = tips[bad.id];
        return (
          <div className="m-pc-tip">
            <div className={`m-pc-tip-ic ${bad.res() === 'fail' ? 'bad' : ''}`}><Icon n="alert" size={13}/></div>
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontSize:13, fontWeight:600, color:'var(--ink)'}}>{tip.title}</div>
              <div className="m-hint" style={{marginTop:2}}>{tip.desc}</div>
              <pre className="m-raw-pre" style={{marginTop:8, marginBottom:0}} onClick={() => { navigator.clipboard?.writeText(tip.cmd); toast('Command copied', 'ok'); }}>{tip.cmd}</pre>
            </div>
          </div>
        );
      })()}

      {/* Raw output */}
      <button
        onClick={() => setShowRaw(v => !v)}
        style={{background:'none', border:'none', color:'var(--accent)', fontSize:13, cursor:'pointer', padding:'2px 0 10px', display:'flex', alignItems:'center', gap:5, WebkitTapHighlightColor:'transparent'}}
      >
        <span style={{display:'inline-flex', transform: showRaw ? 'rotate(180deg)' : 'none', transition:'transform 0.2s'}}><Icon n="chev" size={14}/></span>
        Raw diagnostics
      </button>
      {showRaw && (
        <>
          <div className="m-section-label" style={{marginTop:0}}>wg show</div>
          <pre className="m-raw-pre" style={{marginBottom:12}}>{diag.wg_show || '(empty)'}</pre>
          <div className="m-section-label">journal (last lines)</div>
          <pre className="m-raw-pre">{(diag.journal || []).join('\n') || '(empty)'}</pre>
        </>
      )}
    </Sheet>
  );
}

/* ─── Update sheet ─── */
function UpdateSheet({ onClose, toast, updateInfo, setUpdateInfo }) {
  const [devUpdates, setDevUpdates] = useState(() => localStorage.getItem('WG_DEV_UPDATES') === '1');
  const [checking, setChecking] = useState(false);
  const [applying, setApplying] = useState(false);
  const [prog, setProg] = useState(0);
  const [stage, setStage] = useState('');
  const [done, setDone] = useState(null);
  const [err, setErr] = useState('');

  const check = async (dev = devUpdates) => {
    setChecking(true); setErr('');
    try {
      const d = await api(`/api/update/check${dev ? '?dev=1' : ''}`);
      setUpdateInfo(d);
    } catch(e) { setErr(e.message); }
    finally { setChecking(false); }
  };
  useEffect(() => { check(); }, []);

  const toggleDev = v => {
    setDevUpdates(v);
    localStorage.setItem('WG_DEV_UPDATES', v ? '1' : '0');
    check(v);
  };

  const apply = async () => {
    setApplying(true); setErr(''); setProg(2); setStage('Starting…');
    try {
      const res = await fetch(BASE + `/api/update/apply${devUpdates ? '?dev=1' : ''}`, { method: 'POST' });
      if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { done: rdone, value } = await reader.read();
        if (rdone) break;
        buf += dec.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf('\n\n')) >= 0) {
          const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
          const line = chunk.split('\n').find(l => l.startsWith('data: '));
          if (!line) continue;
          let ev = null;
          try { ev = JSON.parse(line.slice(6)); } catch { continue; }
          if (ev.event === 'stage') {
            setProg(ev.progress || 0);
            setStage(ev.detail ? `${ev.label} — ${ev.detail}` : ev.label);
          } else if (ev.event === 'done') {
            setProg(100);
            setStage(ev.detail || 'Done');
            setDone(ev.version || 'latest');
          } else if (ev.event === 'error') {
            throw new Error(ev.detail || 'Update failed');
          }
        }
      }
      if (!done) setProg(100);
    } catch(e) {
      setErr(e.message);
      setApplying(false);
      return;
    }
    // service restarts itself — reload the page shortly after
    toast('Updated — reloading…', 'ok', 6000);
    setTimeout(() => window.location.reload(), 7000);
  };

  const info = updateInfo;
  return (
    <Sheet
      title="Software update"
      sub={info ? `Installed ${info.local}` : 'Checking…'}
      onClose={onClose}
      footer={<>
        <button className="m-btn" onClick={() => check()} disabled={checking || applying}>
          {checking ? 'Checking…' : <><Icon n="refresh" size={14}/> Check again</>}
        </button>
        <button className="m-btn primary" onClick={apply} disabled={applying || !info?.available}>
          {applying ? 'Updating…' : 'Install update'}
        </button>
      </>}
    >
      <div style={{border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', marginBottom:16}}>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr'}}>
          <div style={{borderRight:'1px solid var(--border)'}}>
            <KV k="Installed" v={info?.local || '…'}/>
          </div>
          <KV k="Latest" v={info?.remote || (checking ? '…' : 'unknown')}/>
        </div>
      </div>

      {info && (
        info.available ? (
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:16}}>
            <span className="m-badge">update available</span>
            {info.remote_is_dev && <span className="m-badge warn">dev build</span>}
          </div>
        ) : (
          <div className="m-hint" style={{marginBottom:16}}>
            {info.remote ? 'You are up to date.' : 'Could not reach the update server.'}
          </div>
        )
      )}

      {(applying || done) && (
        <div style={{marginBottom:16}}>
          <div className="m-prog"><div className="m-prog-fill" style={{width:`${prog}%`}}/></div>
          <div className="m-hint" style={{marginTop:6}}>{done ? `Updated to ${done} — restarting…` : stage}</div>
        </div>
      )}

      {err && <div className="m-err-text" style={{marginBottom:14}}>{err}</div>}

      <div className="m-settings-card">
        <div className="m-settings-row">
          <div>
            <div className="m-settings-lbl">Include dev builds</div>
            <div className="m-settings-sub">Pre-release versions from the repo</div>
          </div>
          <Toggle value={devUpdates} onChange={toggleDev}/>
        </div>
      </div>
    </Sheet>
  );
}

/* ─── Session Duration Bars ─── */
function SessionDurationBars({ peers }) {
  // Bar = handshake freshness (WireGuard's own liveness signal): full right
  // after a handshake, draining as it approaches the HS_TIMEOUT cutoff.
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 10000);
    return () => clearInterval(id);
  }, []);

  const online = peers
    .filter(p => p.status === 'online' && p.lastHs)
    .sort((a, b) => b.lastHs - a.lastHs);

  if (online.length === 0) {
    return (
      <div style={{padding:'12px 0 4px', textAlign:'center', color:'var(--muted)', fontFamily:'var(--mono)', fontSize:12}}>
        No active sessions
      </div>
    );
  }

  const shown = online.slice(0, 5);
  const extra = online.length - shown.length;

  return (
    <div style={{display:'flex', flexDirection:'column', gap:10}}>
      {shown.map(p => {
        const pct = Math.max(0.05, Math.min(1, 1 - (now - p.lastHs) / (HS_TIMEOUT * 1000)));
        return (
          <div key={p.name} style={{display:'flex', alignItems:'center', gap:10}}>
            <span style={{width:7, height:7, borderRadius:'50%', background:'var(--success)', flexShrink:0}}/>
            <div style={{flex:1, minWidth:0}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4}}>
                <span style={{fontSize:12, fontWeight:600, color:'var(--ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', paddingRight:8}}>{p.name}</span>
                <span style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', flexShrink:0}}>hs {fmtRel(p.lastHs)}</span>
              </div>
              <div style={{height:3, background:'var(--border)', borderRadius:2}}>
                <div style={{height:'100%', width:`${pct * 100}%`, background:'var(--accent)', borderRadius:2}}/>
              </div>
            </div>
          </div>
        );
      })}
      {extra > 0 && (
        <div style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', textAlign:'right'}}>+{extra} more</div>
      )}
    </div>
  );
}

/* ─── Swipeable row (swipe left to reveal quick actions) ─── */
let _closeOpenSwipeRow = null; // at most one row open at a time

function SwipeRow({ actions, onTap, children }) {
  const rowRef = useRef(null);
  const actionsRef = useRef(null);
  const hideTimer = useRef(0);
  const drag = useRef({ startX: 0, startY: 0, base: 0, x: 0, dir: null, active: false });
  const [open, setOpen] = useState(false);
  const width = actions.length * 76;

  const setX = (x, animate) => {
    const el = rowRef.current;
    if (!el) return;
    el.style.transition = animate ? 'transform 0.28s cubic-bezier(0.2,0.9,0.3,1)' : 'none';
    el.style.transform = `translate3d(${x}px, 0, 0)`;
  };

  const showActions = () => {
    clearTimeout(hideTimer.current);
    if (actionsRef.current) actionsRef.current.style.opacity = '1';
  };
  const hideActionsSoon = () => {
    clearTimeout(hideTimer.current);
    hideTimer.current = setTimeout(() => {
      if (actionsRef.current) actionsRef.current.style.opacity = '0';
    }, 300); // after the row has slid back over them
  };
  useEffect(() => () => clearTimeout(hideTimer.current), []);

  const close = useCallback(() => {
    drag.current.base = 0;
    setX(0, true);
    setOpen(false);
    hideActionsSoon();
    if (_closeOpenSwipeRow === close) _closeOpenSwipeRow = null;
  }, []);

  useEffect(() => () => { if (_closeOpenSwipeRow === close) _closeOpenSwipeRow = null; }, [close]);

  const onTouchStart = e => {
    const d = drag.current;
    d.startX = e.touches[0].clientX;
    d.startY = e.touches[0].clientY;
    d.x = d.base;
    d.dir = null;
    d.active = true;
    if (rowRef.current) rowRef.current.style.transition = 'none';
  };

  const onTouchMove = e => {
    const d = drag.current;
    if (!d.active) return;
    const dx = e.touches[0].clientX - d.startX;
    const dy = e.touches[0].clientY - d.startY;
    if (!d.dir) {
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
      d.dir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      if (d.dir === 'h') {
        showActions();
        if (_closeOpenSwipeRow && _closeOpenSwipeRow !== close) _closeOpenSwipeRow();
      }
    }
    if (d.dir !== 'h') return;
    let x = d.base + dx;
    if (x > 0) x = 0;
    if (x < -width) x = -width + (x + width) / 3; // resistance past the buttons
    d.x = x;
    setX(x, false);
  };

  const onTouchEnd = () => {
    const d = drag.current;
    if (!d.active) return;
    d.active = false;
    if (d.dir !== 'h') return;
    const shouldOpen = d.x < -width * 0.4;
    d.base = shouldOpen ? -width : 0;
    setX(d.base, true);
    setOpen(shouldOpen);
    if (shouldOpen) {
      if (_closeOpenSwipeRow && _closeOpenSwipeRow !== close) _closeOpenSwipeRow();
      _closeOpenSwipeRow = close;
    } else {
      hideActionsSoon();
      if (_closeOpenSwipeRow === close) _closeOpenSwipeRow = null;
    }
  };

  const handleClick = () => {
    const d = drag.current;
    if (d.dir === 'h') { d.dir = null; return; } // click fired by a swipe, ignore
    if (d.base !== 0) { close(); return; }       // tap on an open row just closes it
    onTap && onTap();
  };

  return (
    <div className="m-swipe-wrap">
      <div className="m-swipe-actions" ref={actionsRef} style={{width}}>
        {actions.map(a => (
          <button
            key={a.label} className={`m-swipe-btn ${a.cls || ''}`}
            tabIndex={open ? 0 : -1} aria-hidden={!open}
            onClick={() => { close(); a.onTap(); }}
          >
            <Icon n={a.icon} size={17}/>
            {a.label}
          </button>
        ))}
      </div>
      <div
        className="m-swipe-row" ref={rowRef}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd} onTouchCancel={onTouchEnd}
        onClick={handleClick}
      >
        {children}
      </div>
    </div>
  );
}

/* ─── Home peer row ─── */
function HomePeerRow({ peer, spark, onPeerClick, onPeerAction, onPeerConfig }) {
  const initials = peer.name.slice(0,2).toUpperCase();
  const avatarClass = peer.status === 'paused' ? 'paused' : peer.status === 'offline' ? 'offline' : '';
  const gid = `ps${peer.name.replace(/[^a-zA-Z0-9]/g,'')}`;
  const nonZero = (spark || []).some(v => v > 0);
  const maxD = Math.max(...(spark || []), 1);
  const toX = i => (i / Math.max((spark||[]).length - 1, 1)) * 100;
  const toY = v => 46 - (v / maxD) * 40;
  const sparkLine = nonZero
    ? (spark||[]).map((v,i) => `${i===0?'M':'L'} ${toX(i)} ${toY(v)}`).join(' ')
    : '';
  const sparkFill = sparkLine ? `${sparkLine} L 100 50 L 0 50 Z` : '';
  const actions = [
    { icon:'qr', label:'Config', cls:'qr', onTap: () => onPeerConfig(peer.name) },
    peer.status === 'paused'
      ? { icon:'play',  label:'Resume', cls:'resume', onTap: () => onPeerAction(peer.name, 'resume') }
      : { icon:'pause', label:'Pause',  cls:'pause',  onTap: () => onPeerAction(peer.name, 'pause') },
  ];
  return (
    <SwipeRow actions={actions} onTap={() => onPeerClick(peer.name)}>
    <div className="m-card" style={{padding:'12px 14px', display:'flex', alignItems:'center', gap:12, cursor:'pointer', WebkitTapHighlightColor:'transparent'}}>
      <div className={`m-peer-avatar ${avatarClass}`} style={{flexShrink:0}}>{initials}</div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:14, fontWeight:600, color:'var(--ink)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', display:'flex', alignItems:'center', gap:6}}>
          {peer.name}
          {peer.throttled && <span className="m-badge warn" style={{fontSize:9}}>throttled</span>}
        </div>
        <div style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', marginTop:1}}>{peer.addr}</div>
        <div style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', marginTop:2}}>↓ {fmtBytes(peer.bytesIn)} &nbsp;↑ {fmtBytes(peer.bytesOut)}</div>
      </div>
      {sparkLine ? (
        <svg viewBox="0 0 100 50" preserveAspectRatio="none" style={{width:110, height:44, flexShrink:0}}>
          <defs>
            <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3"/>
              <stop offset="100%" stopColor="var(--accent)" stopOpacity="0.02"/>
            </linearGradient>
          </defs>
          <path d={sparkFill} fill={`url(#${gid})`}/>
          <path d={sparkLine} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      ) : <div style={{width:110, height:44, flexShrink:0}}/>}
    </div>
    </SwipeRow>
  );
}

/* ─── Peers tab ─── */
function PeersTab({ peers, sparks, onPeerClick, onPeerAction, onPeerConfig, onAddPeer }) {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('all');
  const ref = useRef(null);

  const filtered = useMemo(() => {
    return peers.filter(p => {
      if (filter === 'online' && p.status !== 'online') return false;
      if (filter === 'offline' && p.status !== 'offline') return false;
      if (filter === 'paused' && p.status !== 'paused') return false;
      if (q && !p.name.toLowerCase().includes(q.toLowerCase()) && !p.addr.includes(q)) return false;
      return true;
    });
  }, [peers, q, filter]);

  const counts = useMemo(() => ({
    all: peers.length,
    online: peers.filter(p => p.status === 'online').length,
    offline: peers.filter(p => p.status === 'offline').length,
    paused: peers.filter(p => p.status === 'paused').length,
  }), [peers]);

  return (
    <div className="m-scroll-pad">
      <div className="m-search-wrap">
        <div className="m-search">
          <Icon n="search" size={16}/>
          <input
            ref={ref} value={q} onChange={e => setQ(e.target.value)}
            placeholder="Search peers…" type="search"
          />
          {q && (
            <button className="m-search-clear" onClick={() => setQ('')}>
              <Icon n="x" size={15}/>
            </button>
          )}
        </div>
      </div>

      <div className="m-filter-row">
        {[['all','All',counts.all],['online','Online',counts.online],['offline','Offline',counts.offline],['paused','Paused',counts.paused]].map(([k,l,c]) => (
          <button key={k} className={`m-filter-pill ${filter===k?'on':''}`} onClick={() => setFilter(k)}>
            {l} {c}
          </button>
        ))}
      </div>

      {peers.length === 0 ? (
        <div className="m-empty">
          <div className="m-empty-title">No peers yet</div>
          <div className="m-empty-sub">Create your first peer to connect a device</div>
          <button className="m-btn primary" style={{flex:'0 0 auto', marginTop:8, padding:'0 20px'}} onClick={onAddPeer}>
            <Icon n="plus" size={14}/> Add peer
          </button>
        </div>
      ) : filtered.length === 0 ? (
        <div className="m-empty">
          <div className="m-empty-title">No matches</div>
          <div className="m-empty-sub">Try a different search or filter</div>
        </div>
      ) : (
        <div className="m-peer-list">
          {filtered.map(p => (
            <HomePeerRow key={p.name} peer={p} spark={sparks[p.name] || []} onPeerClick={onPeerClick} onPeerAction={onPeerAction} onPeerConfig={onPeerConfig}/>
          ))}
        </div>
      )}
    </div>
  );
}

    const fetchLogs = () => {
      api(`/api/logs?n=${nLines}&verbose=${verbose ? 1 : 0}`)
        .then(d => { if (!cancelled) setLogs(parseLogs(d.lines)); })
        .catch(() => {});
    };
    fetchLogs();
    const id = setInterval(fetchLogs, 8000);
    return () => { cancelled = true; clearInterval(id); };
  }, [nLines, verbose]);

  useEffect(() => {
    api('/api/logs/retention').then(d => setRetention(d.retention)).catch(() => {});
  }, []);

  useEffect(() => {
    if (pinned && endRef.current) endRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [logs, pinned]);

  const handleScroll = () => {
    const el = streamRef.current;
    if (!el) return;
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
    setPinned(atBottom);
  };

  const setRet = async (v) => {
    setRetBusy(true);
    const prev = retention;
    setRetention(v);
    try {
      const r = await api('/api/logs/retention', { method: 'POST', body: JSON.stringify({ retention: v }) });
      toast(v === 'forever' ? 'Logs kept forever' : `Journal trimmed to ${v}`, 'ok');
      if (!r.ok) throw new Error(r.out || 'Failed');
    } catch(e) {
      setRetention(prev);
      toast(e.message, 'err');
    } finally {
      setRetBusy(false);
    }
  };

  const share = async () => {
    const text = logs.map(l => `${l.t != null ? timeStr(l.t) : '--:--:--'} [${l.lvl}] ${l.msg}`).join('\n');
    const ok = await shareText('wireguard-logs.txt', text, 'WireGuard logs');
    if (!ok) {
      navigator.clipboard?.writeText(text)
        .then(() => toast('Logs copied to clipboard', 'ok'))
        .catch(() => toast('Share failed', 'err'));
    }
  };

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', overflow:'hidden'}}>
      <div className="m-logs-wrap">
        <div className="m-logs-head">
          <div className="m-logs-title">System Logs</div>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <div className="m-logs-count">{logs.length} lines</div>
            <button className="m-icon-btn" style={{width:30, height:30}} onClick={share} aria-label="Share logs">
              <Icon n="share" size={14}/>
            </button>
            <button className={`m-icon-btn ${showControls ? 'on' : ''}`} style={{width:30, height:30, color: showControls ? 'var(--accent)' : undefined}} onClick={() => setShowControls(v => !v)} aria-label="Log options">
              <Icon n="sliders" size={14}/>
            </button>
          </div>
        </div>

        {showControls && (
          <>
            <div className="m-logs-controls">
              <Seg
                options={[{value:100,label:'100'},{value:250,label:'250'},{value:500,label:'500'}]}
                value={nLines} onChange={setNLines}
              />
              <button className={`m-filter-pill ${verbose ? 'on' : ''}`} onClick={() => setVerbose(v => !v)}>
                verbose
              </button>
            </div>
            <div className="m-logs-controls" style={{alignItems:'center'}}>
              <span style={{fontFamily:'var(--mono)', fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)'}}>Retention</span>
              <Seg
                options={[{value:'1d',label:'1d'},{value:'7d',label:'7d'},{value:'30d',label:'30d'},{value:'forever',label:'∞'}]}
                value={retention} onChange={retBusy ? () => {} : setRet}
              />
            </div>
          </>
        )}

        <div className="m-log-stream" ref={streamRef} onScroll={handleScroll}>
          {logs.length === 0 && <div style={{color:'var(--muted)',fontStyle:'italic'}}>No logs yet…</div>}
          {logs.map((l, i) => (
            <div key={i} className={`m-log-line m-log-${l.lvl}`}>
              <span className="m-log-time">{l.t != null ? timeStr(l.t) : '--:--:--'}</span>
              <span className="m-log-lvl">{l.lvl}</span>
              <span className="m-log-msg">{l.msg}</span>
            </div>
          ))}
          <div ref={endRef}/>
        </div>
        {!pinned && (
          <button
            onClick={() => { setPinned(true); endRef.current?.scrollIntoView({ behavior:'smooth' }); }}
            style={{marginTop:8,width:'100%',height:34,borderRadius:8,border:'1px solid var(--border)',background:'var(--card)',cursor:'pointer',fontSize:12,color:'var(--muted)',flexShrink:0}}
          >
            ↓ Jump to latest
          </button>
        )}
      </div>
    </div>
  );
}
