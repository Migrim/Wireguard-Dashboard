services:
  wg-dashboard:
    build: .
    container_name: wg-dashboard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.src_valid_mark: 1
    ports:
      - "8088:8088/tcp"   
      - "51820:51820/udp" 
    environment:
      APP_PORT: "8088"
      WG_IFACE: wg0
      WG_PORT: "51820"
      SERVER_ADDR: 10.8.0.1/24
      CLIENT_DNS: 1.1.1.1, 1.0.0.1
    volumes:
      - wg_data:/etc/wireguard

volumes:
  wg_data:
